<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>물리 퍼즐</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #e8ecf1;
  font-family: 'Segoe UI', -apple-system, sans-serif;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
#wrap {
  position: relative;
  width: 100vmin;
  height: 100vmin;
  max-width: 600px;
  max-height: 600px;
}
canvas {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
#ui {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
}
#ui > * { pointer-events: auto; }
.btn {
  border: none;
  border-radius: 8px;
  padding: 10px 20px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s, box-shadow 0.1s;
  color: #fff;
  box-shadow: 0 3px 8px rgba(0,0,0,0.2);
}
.btn:active { transform: scale(0.95); }
.btn-primary { background: #4a90d9; }
.btn-warn { background: #e67e22; }
.btn-green { background: #27ae60; }
.btn-gray { background: #7f8c8d; }
#topBar {
  position: absolute;
  top: 10px; left: 10px; right: 10px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#levelLabel {
  font-size: 18px;
  font-weight: 700;
  color: #2c3e50;
  background: rgba(255,255,255,0.85);
  padding: 6px 14px;
  border-radius: 8px;
}
#bottomBar {
  position: absolute;
  bottom: 10px; left: 10px; right: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
#starDisplay {
  position: absolute;
  top: 10px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 22px;
  color: #f39c12;
  background: rgba(255,255,255,0.85);
  padding: 4px 12px;
  border-radius: 8px;
  letter-spacing: 4px;
}
#hint {
  position: absolute;
  bottom: 55px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 13px;
  color: #7f8c8d;
  background: rgba(255,255,255,0.8);
  padding: 4px 12px;
  border-radius: 6px;
  white-space: nowrap;
}
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="topBar">
      <div id="levelLabel"></div>
      <button class="btn btn-gray" id="btnMenu" style="padding:8px 14px;font-size:13px;">메뉴</button>
    </div>
    <div id="starDisplay"></div>
    <div id="hint"></div>
    <div id="bottomBar">
      <button class="btn btn-primary" id="btnLaunch">발사</button>
      <button class="btn btn-warn" id="btnReset">리셋</button>
    </div>
  </div>
</div>
<script>
// ====== GAME SPRITES (Canvas 2D pre-rendered assets) ======
const GameSprites = (() => {
  const cache = {};
  function makeCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
  }

  function createBall(r) {
    const pad = 8;
    const sz = (r + pad) * 2;
    const c = makeCanvas(sz, sz);
    const x = c.getContext('2d');
    const cx = sz / 2, cy = sz / 2;

    // Drop shadow
    x.fillStyle = 'rgba(30,60,120,0.18)';
    x.beginPath();
    x.ellipse(cx + 3, cy + 4, r + 1, r * 0.6, 0, 0, Math.PI * 2);
    x.fill();

    // Main body gradient
    const g1 = x.createRadialGradient(cx - r * 0.3, cy - r * 0.3, r * 0.05, cx, cy, r);
    g1.addColorStop(0, '#a8d8ff');
    g1.addColorStop(0.35, '#6cb3f5');
    g1.addColorStop(0.75, '#3a7bd5');
    g1.addColorStop(1, '#2a5faa');
    x.fillStyle = g1;
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.fill();

    // Rim edge (subtle dark ring)
    const g2 = x.createRadialGradient(cx, cy, r * 0.85, cx, cy, r);
    g2.addColorStop(0, 'rgba(0,0,0,0)');
    g2.addColorStop(1, 'rgba(20,50,100,0.25)');
    x.fillStyle = g2;
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.fill();

    // Primary highlight (top-left crescent)
    x.save();
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.clip();
    const g3 = x.createRadialGradient(cx - r * 0.35, cy - r * 0.35, 0, cx - r * 0.35, cy - r * 0.35, r * 0.7);
    g3.addColorStop(0, 'rgba(255,255,255,0.55)');
    g3.addColorStop(0.5, 'rgba(255,255,255,0.15)');
    g3.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g3;
    x.fillRect(0, 0, sz, sz);
    x.restore();

    // Specular dot
    x.fillStyle = 'rgba(255,255,255,0.7)';
    x.beginPath();
    x.ellipse(cx - r * 0.28, cy - r * 0.3, r * 0.18, r * 0.12, -0.5, 0, Math.PI * 2);
    x.fill();

    return c;
  }

  function createBumper(r) {
    const pad = r * 0.8;
    const sz = (r + pad) * 2;
    const c = makeCanvas(sz, sz);
    const x = c.getContext('2d');
    const cx = sz / 2, cy = sz / 2;

    // Outer glow
    const g0 = x.createRadialGradient(cx, cy, r * 0.5, cx, cy, r + pad);
    g0.addColorStop(0, 'rgba(230,126,34,0.35)');
    g0.addColorStop(0.6, 'rgba(230,126,34,0.1)');
    g0.addColorStop(1, 'rgba(230,126,34,0)');
    x.fillStyle = g0;
    x.beginPath();
    x.arc(cx, cy, r + pad, 0, Math.PI * 2);
    x.fill();

    // Body gradient
    const g1 = x.createRadialGradient(cx - r * 0.25, cy - r * 0.25, r * 0.05, cx, cy, r);
    g1.addColorStop(0, '#fbc67a');
    g1.addColorStop(0.4, '#e67e22');
    g1.addColorStop(0.85, '#c0611a');
    g1.addColorStop(1, '#a04e12');
    x.fillStyle = g1;
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.fill();

    // Inner ring pattern
    x.strokeStyle = 'rgba(255,200,100,0.25)';
    x.lineWidth = 1.5;
    x.beginPath();
    x.arc(cx, cy, r * 0.65, 0, Math.PI * 2);
    x.stroke();

    // Highlight
    const g2 = x.createRadialGradient(cx - r * 0.3, cy - r * 0.3, 0, cx - r * 0.3, cy - r * 0.3, r * 0.6);
    g2.addColorStop(0, 'rgba(255,255,255,0.45)');
    g2.addColorStop(0.5, 'rgba(255,255,255,0.1)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g2;
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.fill();

    // Specular
    x.fillStyle = 'rgba(255,255,255,0.55)';
    x.beginPath();
    x.ellipse(cx - r * 0.22, cy - r * 0.28, r * 0.16, r * 0.1, -0.5, 0, Math.PI * 2);
    x.fill();

    return c;
  }

  function createTarget() {
    const sz = 80;
    const c = makeCanvas(sz, sz);
    const x = c.getContext('2d');
    const cx = sz / 2, cy = sz / 2;
    const outerR = 18, innerR = 9;

    // Soft glow background
    const g0 = x.createRadialGradient(cx, cy, 4, cx, cy, 38);
    g0.addColorStop(0, 'rgba(241,196,15,0.5)');
    g0.addColorStop(0.6, 'rgba(241,196,15,0.15)');
    g0.addColorStop(1, 'rgba(241,196,15,0)');
    x.fillStyle = g0;
    x.beginPath();
    x.arc(cx, cy, 38, 0, Math.PI * 2);
    x.fill();

    // Star path
    x.beginPath();
    for (let i = 0; i < 10; i++) {
      const r = i % 2 === 0 ? outerR : innerR;
      const a = (i * Math.PI / 5) - Math.PI / 2;
      if (i === 0) x.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
      else x.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    }
    x.closePath();

    // Star body gradient
    const g1 = x.createLinearGradient(cx - outerR, cy - outerR, cx + outerR, cy + outerR);
    g1.addColorStop(0, '#ffe066');
    g1.addColorStop(0.5, '#f1c40f');
    g1.addColorStop(1, '#e6a800');
    x.fillStyle = g1;
    x.fill();

    // Star stroke
    x.strokeStyle = '#d4940a';
    x.lineWidth = 2;
    x.stroke();

    // Inner highlight on star
    x.save();
    x.clip();
    const g2 = x.createLinearGradient(cx - outerR, cy - outerR, cx, cy);
    g2.addColorStop(0, 'rgba(255,255,255,0.45)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g2;
    x.fillRect(cx - outerR, cy - outerR, outerR * 2, outerR * 2);
    x.restore();

    return c;
  }

  function createPortal() {
    const sz = 50;
    const c = makeCanvas(sz, sz);
    const x = c.getContext('2d');
    const cx = sz / 2, cy = sz / 2;

    // Outer ring glow
    const g0 = x.createRadialGradient(cx, cy, 10, cx, cy, 24);
    g0.addColorStop(0, 'rgba(155,89,182,0.35)');
    g0.addColorStop(1, 'rgba(155,89,182,0)');
    x.fillStyle = g0;
    x.beginPath();
    x.arc(cx, cy, 24, 0, Math.PI * 2);
    x.fill();

    // Outer ring
    const g1 = x.createLinearGradient(cx - 20, cy - 20, cx + 20, cy + 20);
    g1.addColorStop(0, '#c39bd3');
    g1.addColorStop(0.5, '#9b59b6');
    g1.addColorStop(1, '#7d3c98');
    x.strokeStyle = g1;
    x.lineWidth = 3;
    x.beginPath();
    x.arc(cx, cy, 18, 0, Math.PI * 2);
    x.stroke();

    // Inner vortex
    const g2 = x.createRadialGradient(cx, cy, 0, cx, cy, 16);
    g2.addColorStop(0, 'rgba(200,140,230,0.7)');
    g2.addColorStop(0.4, 'rgba(155,89,182,0.5)');
    g2.addColorStop(0.8, 'rgba(125,60,152,0.25)');
    g2.addColorStop(1, 'rgba(155,89,182,0.05)');
    x.fillStyle = g2;
    x.beginPath();
    x.arc(cx, cy, 16, 0, Math.PI * 2);
    x.fill();

    // Inner bright core
    x.fillStyle = 'rgba(220,180,255,0.5)';
    x.beginPath();
    x.arc(cx, cy, 4, 0, Math.PI * 2);
    x.fill();

    return c;
  }

  function createRemovableBlock(w, h) {
    const pad = 4;
    const c = makeCanvas(w + pad * 2, h + pad * 2);
    const x = c.getContext('2d');
    const bx = pad, by = pad;

    // Shadow
    x.fillStyle = 'rgba(180,40,30,0.2)';
    roundRectPath(x, bx + 2, by + 2, w, h, 5);
    x.fill();

    // Body gradient
    const g1 = x.createLinearGradient(bx, by, bx, by + h);
    g1.addColorStop(0, '#f15a4a');
    g1.addColorStop(0.5, '#e74c3c');
    g1.addColorStop(1, '#c0392b');
    x.fillStyle = g1;
    roundRectPath(x, bx, by, w, h, 5);
    x.fill();

    // Top highlight
    x.save();
    roundRectPath(x, bx, by, w, h, 5);
    x.clip();
    const g2 = x.createLinearGradient(bx, by, bx, by + h * 0.4);
    g2.addColorStop(0, 'rgba(255,255,255,0.3)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g2;
    x.fillRect(bx, by, w, h * 0.4);
    x.restore();

    // Border
    x.strokeStyle = 'rgba(150,30,20,0.35)';
    x.lineWidth = 1;
    roundRectPath(x, bx, by, w, h, 5);
    x.stroke();

    // X mark with shadow
    const cx = bx + w / 2, cy = by + h / 2, s = Math.min(w, h) * 0.22;
    x.strokeStyle = 'rgba(0,0,0,0.15)';
    x.lineWidth = 2.5;
    x.lineCap = 'round';
    x.beginPath();
    x.moveTo(cx - s + 1, cy - s + 1); x.lineTo(cx + s + 1, cy + s + 1);
    x.moveTo(cx + s + 1, cy - s + 1); x.lineTo(cx - s + 1, cy + s + 1);
    x.stroke();

    x.strokeStyle = 'rgba(255,255,255,0.8)';
    x.lineWidth = 2;
    x.beginPath();
    x.moveTo(cx - s, cy - s); x.lineTo(cx + s, cy + s);
    x.moveTo(cx + s, cy - s); x.lineTo(cx - s, cy + s);
    x.stroke();

    return c;
  }

  function createPlatform(w, h, color) {
    const pad = 6;
    const c = makeCanvas(w + pad * 2, h + pad * 2);
    const x = c.getContext('2d');
    const bx = pad, by = pad;

    // Shadow
    x.fillStyle = 'rgba(0,0,0,0.12)';
    roundRectPath(x, bx + 2, by + 3, w, h, 4);
    x.fill();

    // Body gradient
    const baseColor = color || '#27ae60';
    const g1 = x.createLinearGradient(bx, by, bx, by + h);
    g1.addColorStop(0, lightenColor(baseColor, 25));
    g1.addColorStop(0.5, baseColor);
    g1.addColorStop(1, darkenColor(baseColor, 20));
    x.fillStyle = g1;
    roundRectPath(x, bx, by, w, h, 4);
    x.fill();

    // Top edge highlight
    x.save();
    roundRectPath(x, bx, by, w, h, 4);
    x.clip();
    const g2 = x.createLinearGradient(bx, by, bx, by + h * 0.35);
    g2.addColorStop(0, 'rgba(255,255,255,0.35)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g2;
    x.fillRect(bx, by, w, h * 0.35);
    x.restore();

    // Subtle surface texture lines
    x.strokeStyle = 'rgba(255,255,255,0.08)';
    x.lineWidth = 1;
    for (let lx = bx + 12; lx < bx + w - 4; lx += 18) {
      x.beginPath();
      x.moveTo(lx, by + 2);
      x.lineTo(lx, by + h - 2);
      x.stroke();
    }

    // Border
    x.strokeStyle = darkenColor(baseColor, 30) + '55';
    x.lineWidth = 1;
    roundRectPath(x, bx, by, w, h, 4);
    x.stroke();

    return c;
  }

  function createBackground(W, H) {
    const c = makeCanvas(W, H);
    const x = c.getContext('2d');

    // Main background gradient
    const g1 = x.createLinearGradient(0, 0, 0, H);
    g1.addColorStop(0, '#eef2f7');
    g1.addColorStop(0.5, '#e8ecf3');
    g1.addColorStop(1, '#dde3ed');
    x.fillStyle = g1;
    x.fillRect(0, 0, W, H);

    // Subtle radial light from top center
    const g2 = x.createRadialGradient(W / 2, 0, 0, W / 2, 0, W * 0.8);
    g2.addColorStop(0, 'rgba(255,255,255,0.25)');
    g2.addColorStop(1, 'rgba(255,255,255,0)');
    x.fillStyle = g2;
    x.fillRect(0, 0, W, H);

    // Grid dots with gradient fade
    for (let gx = 20; gx < W; gx += 40) {
      for (let gy = 20; gy < H; gy += 40) {
        const distFromCenter = Math.sqrt((gx - W / 2) ** 2 + (gy - H / 2) ** 2);
        const alpha = 0.05 + 0.03 * (1 - distFromCenter / (W * 0.7));
        x.fillStyle = `rgba(0,0,0,${Math.max(0.02, alpha)})`;
        x.beginPath();
        x.arc(gx, gy, 1.5, 0, Math.PI * 2);
        x.fill();
      }
    }

    return c;
  }

  function createMenuBg(W, H) {
    const c = makeCanvas(W, H);
    const x = c.getContext('2d');

    const g1 = x.createLinearGradient(0, 0, W, H);
    g1.addColorStop(0, '#f5f7fb');
    g1.addColorStop(0.5, '#eef2f7');
    g1.addColorStop(1, '#e5eaf2');
    x.fillStyle = g1;
    x.fillRect(0, 0, W, H);

    // Decorative circles
    x.globalAlpha = 0.04;
    x.fillStyle = '#4a90d9';
    x.beginPath(); x.arc(W * 0.15, H * 0.85, 120, 0, Math.PI * 2); x.fill();
    x.fillStyle = '#e67e22';
    x.beginPath(); x.arc(W * 0.85, H * 0.2, 80, 0, Math.PI * 2); x.fill();
    x.fillStyle = '#9b59b6';
    x.beginPath(); x.arc(W * 0.5, H * 0.95, 100, 0, Math.PI * 2); x.fill();
    x.globalAlpha = 1;

    return c;
  }

  // Utility: roundRect path without fill/stroke
  function roundRectPath(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function lightenColor(hex, pct) {
    let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + Math.round((255 - r) * pct / 100));
    g = Math.min(255, g + Math.round((255 - g) * pct / 100));
    b = Math.min(255, b + Math.round((255 - b) * pct / 100));
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  function darkenColor(hex, pct) {
    let r = parseInt(hex.slice(1, 3), 16), g = parseInt(hex.slice(3, 5), 16), b = parseInt(hex.slice(5, 7), 16);
    r = Math.max(0, r - Math.round(r * pct / 100));
    g = Math.max(0, g - Math.round(g * pct / 100));
    b = Math.max(0, b - Math.round(b * pct / 100));
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  return {
    init() {
      cache.ball = createBall(14);
      cache.background = createBackground(600, 600);
      cache.menuBg = createMenuBg(600, 600);
      cache.target = createTarget();
      cache.portal = createPortal();
      // Pre-generate bumper sprites for known radii
      for (const r of [18, 20, 22, 24]) {
        cache['bumper_' + r] = createBumper(r);
      }
      // Pre-generate platform and removable sprites per level
      cache.platforms = {};
      cache.removables = {};
    },
    getBall() { return cache.ball; },
    getBackground() { return cache.background; },
    getMenuBg() { return cache.menuBg; },
    getTarget() { return cache.target; },
    getPortal() { return cache.portal; },
    getBumper(r) {
      const key = 'bumper_' + r;
      if (!cache[key]) cache[key] = createBumper(r);
      return cache[key];
    },
    getPlatform(w, h, color) {
      const key = 'plat_' + w + '_' + h + '_' + (color || '#27ae60');
      if (!cache.platforms[key]) cache.platforms[key] = createPlatform(w, h, color);
      return cache.platforms[key];
    },
    getRemovable(w, h) {
      const key = 'rem_' + w + '_' + h;
      if (!cache.removables[key]) cache.removables[key] = createRemovableBlock(w, h);
      return cache.removables[key];
    }
  };
})();

(() => {
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = 600, H = 600;
canvas.width = W;
canvas.height = H;

// Initialize sprites
GameSprites.init();

// ====== STATE ======
let state = 'menu'; // menu, play, launched, complete
let currentLevel = 0;
let stars = [];
let bestStars = JSON.parse(localStorage.getItem('pp_stars') || '[]');
let launchTime = 0;
let removedCount = 0;
let placedObjects = [];
let particles = [];
let trailParticles = [];
let ball = null;
let levelData = null;
let dragging = null; // { idx, ox, oy }
let goalReached = false;
let goalTimer = 0;
let animFrame = 0;

// ====== PHYSICS ======
const GRAVITY = 0.35;
const FRICTION = 0.995;
const GROUND_FRICTION = 0.92;
const RESTITUTION = 0.55;
const BUMPER_FORCE = 1.8;
const DT = 1;

function vec(x,y) { return {x,y}; }
function vadd(a,b) { return {x:a.x+b.x, y:a.y+b.y}; }
function vsub(a,b) { return {x:a.x-b.x, y:a.y-b.y}; }
function vmul(a,s) { return {x:a.x*s, y:a.y*s}; }
function vlen(a) { return Math.sqrt(a.x*a.x+a.y*a.y); }
function vnorm(a) { const l=vlen(a)||1; return {x:a.x/l,y:a.y/l}; }
function vdot(a,b) { return a.x*b.x+a.y*b.y; }
function vrot(v,a) { const c=Math.cos(a),s=Math.sin(a); return {x:v.x*c-v.y*s, y:v.x*s+v.y*c}; }

// ====== LEVELS ======
const levels = [
  // Level 1: Simple drop
  {
    name: "첫 번째 낙하",

// ====== PARTICLE SYSTEM ======
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = (Math.random() * 0.6 + 0.4) * speed;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.015 + Math.random() * 0.02,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  // trail
  if (state === 'launched' && ball) {
    trailParticles.push({
      x: ball.x, y: ball.y,
      life: 1, decay: 0.04,
      r: ball.r * 0.4,
      color: 'rgba(74,144,217,0.5)'
    });
  }
  for (let i = trailParticles.length - 1; i >= 0; i--) {
    trailParticles[i].life -= trailParticles[i].decay;
    if (trailParticles[i].life <= 0) trailParticles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of trailParticles) {
    ctx.globalAlpha = p.life * 0.4;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ====== COLLISION ======
function circleRect(cx, cy, cr, rx, ry, rw, rh, angle) {
  // Transform circle into rect's local space
  const cos = Math.cos(-angle), sin = Math.sin(-angle);
  const rcx = rx + rw / 2, rcy = ry + rh / 2;
  const dx = cx - rcx, dy = cy - rcy;
  const lx = cos * dx - sin * dy + rw / 2;
  const ly = sin * dx + cos * dy + rh / 2;

  const closestX = Math.max(0, Math.min(rw, lx));
  const closestY = Math.max(0, Math.min(rh, ly));

  const distX = lx - closestX;
  const distY = ly - closestY;
  const distSq = distX * distX + distY * distY;

  if (distSq < cr * cr) {
    const dist = Math.sqrt(distSq) || 0.01;
    const nx = distX / dist;
    const ny = distY / dist;
    // rotate normal back
    const wnx = cos * nx + sin * ny;
    const wny = -sin * nx + cos * ny;
    return { nx: wnx, ny: wny, depth: cr - dist };
  }
  return null;
}

function circleCircle(ax, ay, ar, bx, by, br) {
  const dx = ax - bx, dy = ay - by;
  const dist = Math.sqrt(dx * dx + dy * dy) || 0.01;
  const minDist = ar + br;
  if (dist < minDist) {
    return { nx: dx / dist, ny: dy / dist, depth: minDist - dist };
  }
  return null;
}

// ====== LEVEL MANAGEMENT ======
function loadLevel(idx) {
  currentLevel = idx;
  const L = levels[idx];
  levelData = JSON.parse(JSON.stringify(L));
  ball = { x: L.ball.x, y: L.ball.y, vx: 0, vy: 0, r: 14 };
  placedObjects = [];
  particles = [];
  trailParticles = [];
  removedCount = 0;
  goalReached = false;
  goalTimer = 0;
  dragging = null;
  state = 'play';
  document.getElementById('levelLabel').textContent = `레벨 ${idx + 1}`;
  document.getElementById('hint').textContent = levelData.placeables.length > 0
    ? '초록 램프를 드래그하여 배치 후 발사!'
    : levelData.removables.length > 0
      ? '빨간 블록을 클릭하여 제거 후 발사!'
      : '발사 버튼을 눌러 공을 떨어뜨리세요!';
  updateStarDisplay();
}

function resetLevel() {
  loadLevel(currentLevel);
}

function updateStarDisplay() {
  const el = document.getElementById('starDisplay');
  if (state === 'menu') { el.textContent = ''; return; }
  const b = bestStars[currentLevel] || 0;
  el.textContent = (b >= 1 ? '\u2605' : '\u2606') + (b >= 2 ? '\u2605' : '\u2606') + (b >= 3 ? '\u2605' : '\u2606');
}

function calcStars(time) {
  let s = 1; // completed
  if (time < 8000) s++;
  if (removedCount === 0 && placedObjects.length <= (levelData.placeables.length > 0 ? 1 : 0)) s++;
  return s;
}

// ====== INPUT ======
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  const t = e.touches ? e.touches[0] : e;
  return {
    x: (t.clientX - rect.left) / rect.width * W,
    y: (t.clientY - rect.top) / rect.height * H
  };
}

function handleDown(e) {
  e.preventDefault();
  const p = getPos(e);

  if (state === 'menu') {
    handleMenuClick(p);
    return;
  }
  if (state === 'complete') return;

  if (state === 'play') {
    // Check removables
    for (let i = levelData.removables.length - 1; i >= 0; i--) {
      const r = levelData.removables[i];
      if (p.x >= r.x && p.x <= r.x + r.w && p.y >= r.y && p.y <= r.y + r.h) {
        levelData.removables.splice(i, 1);
        removedCount++;
        spawnParticles(r.x + r.w/2, r.y + r.h/2, '#e74c3c', 10, 3);
        return;
      }
    }
    // Check placeables for drag
    for (let i = 0; i < levelData.placeables.length; i++) {
      const pl = levelData.placeables[i];
      if (p.x >= pl.x - 10 && p.x <= pl.x + pl.w + 10 && p.y >= pl.y - 10 && p.y <= pl.y + pl.h + 10) {
        dragging = { idx: i, ox: p.x - pl.x, oy: p.y - pl.y };
        return;
      }
    }
  }
}

function handleMove(e) {
  e.preventDefault();
  if (dragging && state === 'play') {
    const p = getPos(e);
    const pl = levelData.placeables[dragging.idx];
    pl.x = Math.max(0, Math.min(W - pl.w, p.x - dragging.ox));
    pl.y = Math.max(0, Math.min(H - pl.h, p.y - dragging.oy));
  }
}

function handleUp(e) {
  if (dragging) {
    placedObjects.push(dragging.idx);
    dragging = null;
  }
}

canvas.addEventListener('mousedown', handleDown);
canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseup', handleUp);
canvas.addEventListener('touchstart', handleDown, {passive:false});
canvas.addEventListener('touchmove', handleMove, {passive:false});
canvas.addEventListener('touchend', handleUp);

// Menu click
function handleMenuClick(p) {
  const cols = 4, rows = 3;
  const gx = 80, gy = 180, cw = 110, ch = 100;
  for (let i = 0; i < 12; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const bx = gx + col * cw, by = gy + row * ch;
    if (p.x >= bx && p.x <= bx + 90 && p.y >= by && p.y <= by + 75) {
      loadLevel(i);
      return;
    }
  }
}

// ====== PHYSICS UPDATE ======
function physicsTick() {
  if (!ball || state !== 'launched') return;

  ball.vy += GRAVITY;
  ball.vx *= FRICTION;
  ball.vy *= FRICTION;
  ball.x += ball.vx * DT;
  ball.y += ball.vy * DT;

  // Walls
  if (ball.x - ball.r < 0) { ball.x = ball.r; ball.vx = Math.abs(ball.vx) * RESTITUTION; }
  if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.vx = -Math.abs(ball.vx) * RESTITUTION; }
  if (ball.y - ball.r < 0) { ball.y = ball.r; ball.vy = Math.abs(ball.vy) * RESTITUTION; }
  if (ball.y + ball.r > H) {
    ball.y = H - ball.r;
    ball.vy = -Math.abs(ball.vy) * RESTITUTION;
    ball.vx *= GROUND_FRICTION;
  }

  // Platforms
  const allPlats = [...levelData.platforms, ...levelData.placeables];
  for (const plat of allPlats) {
    const col = circleRect(ball.x, ball.y, ball.r, plat.x, plat.y, plat.w, plat.h, plat.a || 0);
    if (col) {
      ball.x += col.nx * col.depth;
      ball.y += col.ny * col.depth;
      const vdot2 = vdot({x:ball.vx,y:ball.vy}, {x:col.nx,y:col.ny});
      ball.vx -= (1 + RESTITUTION) * vdot2 * col.nx;
      ball.vy -= (1 + RESTITUTION) * vdot2 * col.ny;
      ball.vx *= GROUND_FRICTION;
      spawnParticles(ball.x - col.nx * ball.r, ball.y - col.ny * ball.r, '#aab', 3, 2);
    }
  }

  // Removable blocks (solid)
  for (const rem of levelData.removables) {
    const col = circleRect(ball.x, ball.y, ball.r, rem.x, rem.y, rem.w, rem.h, 0);
    if (col) {
      ball.x += col.nx * col.depth;
      ball.y += col.ny * col.depth;
      const vdot2 = vdot({x:ball.vx,y:ball.vy}, {x:col.nx,y:col.ny});
      ball.vx -= (1 + RESTITUTION) * vdot2 * col.nx;
      ball.vy -= (1 + RESTITUTION) * vdot2 * col.ny;
    }
  }

  // Bumpers
  for (const bump of levelData.bumpers) {
    const col = circleCircle(ball.x, ball.y, ball.r, bump.x, bump.y, bump.r);
    if (col) {
      ball.x += col.nx * col.depth;
      ball.y += col.ny * col.depth;
      const speed = vlen({x:ball.vx,y:ball.vy});
      const newSpeed = Math.max(speed, 5) * BUMPER_FORCE;
      ball.vx = col.nx * newSpeed;
      ball.vy = col.ny * newSpeed;
      spawnParticles(bump.x, bump.y, '#e67e22', 12, 4);
    }
  }

  // Portals
  for (const portal of levelData.portals) {
    const d1 = Math.sqrt((ball.x-portal.x1)**2 + (ball.y-portal.y1)**2);
    const d2 = Math.sqrt((ball.x-portal.x2)**2 + (ball.y-portal.y2)**2);
    if (d1 < 22) {
      ball.x = portal.x2;
      ball.y = portal.y2;
      spawnParticles(portal.x1, portal.y1, '#9b59b6', 15, 3);
      spawnParticles(portal.x2, portal.y2, '#9b59b6', 15, 3);
    } else if (d2 < 22) {
      ball.x = portal.x1;
      ball.y = portal.y1;
      spawnParticles(portal.x2, portal.y2, '#9b59b6', 15, 3);
      spawnParticles(portal.x1, portal.y1, '#9b59b6', 15, 3);
    }
  }

  // Target check
  const t = levelData.target;
  if (!goalReached) {
    const td = Math.sqrt((ball.x - t.x)**2 + (ball.y - t.y)**2);
    if (td < ball.r + 18) {
      goalReached = true;
      goalTimer = Date.now();
      const elapsed = goalTimer - launchTime;
      const s = calcStars(elapsed);
      if (!bestStars[currentLevel] || bestStars[currentLevel] < s) {
        bestStars[currentLevel] = s;
        localStorage.setItem('pp_stars', JSON.stringify(bestStars));
      }
      stars = [];
      for (let i = 0; i < s; i++) stars.push(i);
      spawnParticles(t.x, t.y, '#f1c40f', 40, 5);
      spawnParticles(t.x, t.y, '#e67e22', 20, 3);
      state = 'complete';
    }
  }
}

// ====== TRAJECTORY PREVIEW ======
function drawTrajectory() {
  if (state !== 'play' || !ball) return;
  let sx = ball.x, sy = ball.y, svx = 0, svy = 0;
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(74,144,217,0.35)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  for (let i = 0; i < 80; i++) {
    svy += GRAVITY;
    sx += svx;
    sy += svy;
    if (sy > H) break;
    if (i % 2 === 0) ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

// ====== DRAW ======
function drawMenu() {
  // Background (sprite)
  const menuBg = GameSprites.getMenuBg();
  if (menuBg) ctx.drawImage(menuBg, 0, 0);
  else { ctx.fillStyle = '#f0f4f8'; ctx.fillRect(0, 0, W, H); }

  // Title
  ctx.fillStyle = '#2c3e50';
  ctx.font = 'bold 42px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('물리 퍼즐', W/2, 80);
  ctx.font = '18px Segoe UI, sans-serif';
  ctx.fillStyle = '#7f8c8d';
  ctx.fillText('공을 별까지 보내세요!', W/2, 115);

  // Level grid
  const cols = 4, rows = 3;
  const gx = 80, gy = 180, cw = 110, ch = 100;
  for (let i = 0; i < 12; i++) {
    const col = i % cols, row = Math.floor(i / cols);
    const bx = gx + col * cw, by = gy + row * ch;

    // Card
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,0.1)';
    ctx.shadowBlur = 8;
    ctx.shadowOffsetY = 3;
    roundRect(bx, by, 90, 75, 10, true, false);
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Number
    ctx.fillStyle = '#4a90d9';
    ctx.font = 'bold 24px Segoe UI, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(i + 1, bx + 45, by + 35);

    // Stars
    const bs = bestStars[i] || 0;
    ctx.font = '16px sans-serif';
    ctx.fillStyle = '#f39c12';
    let stxt = '';
    for (let s = 0; s < 3; s++) stxt += s < bs ? '\u2605' : '\u2606';
    ctx.fillText(stxt, bx + 45, by + 60);
  }
}

function roundRect(x, y, w, h, r, fill, stroke) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
  if (fill) ctx.fill();
  if (stroke) ctx.stroke();
}

function drawPlatform(p, color) {
  const sprite = GameSprites.getPlatform(p.w, p.h, color || '#27ae60');
  if (sprite) {
    ctx.save();
    const cx = p.x + p.w / 2, cy = p.y + p.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(p.a || 0);
    ctx.drawImage(sprite, -sprite.width / 2, -sprite.height / 2);
    ctx.restore();
  } else {
    // Fallback
    ctx.save();
    const cx = p.x + p.w / 2, cy = p.y + p.h / 2;
    ctx.translate(cx, cy);
    ctx.rotate(p.a || 0);
    ctx.fillStyle = color || '#27ae60';
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    roundRect(-p.w/2, -p.h/2, p.w, p.h, 4, true, false);
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawBumper(b) {
  const sprite = GameSprites.getBumper(b.r);
  if (sprite) {
    ctx.drawImage(sprite, b.x - sprite.width / 2, b.y - sprite.height / 2);
  } else {
    // Fallback
    ctx.save();
    const grd = ctx.createRadialGradient(b.x, b.y, b.r * 0.3, b.x, b.y, b.r * 1.4);
    grd.addColorStop(0, 'rgba(230,126,34,0.3)');
    grd.addColorStop(1, 'rgba(230,126,34,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r * 1.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#e67e22';
    ctx.shadowColor = 'rgba(230,126,34,0.4)';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(b.x - b.r * 0.25, b.y - b.r * 0.25, b.r * 0.45, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawPortal(p, time) {
  const pulse = Math.sin(time * 0.004) * 3;
  const portalSprite = GameSprites.getPortal();
  for (const [px, py] of [[p.x1, p.y1], [p.x2, p.y2]]) {
    if (portalSprite) {
      ctx.save();
      // Scale for pulse effect
      const scale = 1 + pulse / 50;
      ctx.translate(px, py);
      ctx.scale(scale, scale);
      // Rotate base sprite slowly
      ctx.rotate(time * 0.001);
      ctx.drawImage(portalSprite, -portalSprite.width / 2, -portalSprite.height / 2);
      ctx.restore();
      // Spinning dots (animated, can't be pre-rendered)
      for (let i = 0; i < 4; i++) {
        const a = time * 0.003 + i * Math.PI / 2;
        const grd = ctx.createRadialGradient(
          px + Math.cos(a) * 12, py + Math.sin(a) * 12, 0,
          px + Math.cos(a) * 12, py + Math.sin(a) * 12, 3.5
        );
        grd.addColorStop(0, '#bb6bd9');
        grd.addColorStop(1, 'rgba(142,68,173,0)');
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(px + Math.cos(a) * 12, py + Math.sin(a) * 12, 3.5, 0, Math.PI * 2);
        ctx.fill();
      }
    } else {
      // Fallback
      ctx.save();
      ctx.strokeStyle = '#9b59b6';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(px, py, 18 + pulse, 0, Math.PI * 2);
      ctx.stroke();
      const grd = ctx.createRadialGradient(px, py, 0, px, py, 16);
      grd.addColorStop(0, 'rgba(155,89,182,0.6)');
      grd.addColorStop(1, 'rgba(155,89,182,0.1)');
      ctx.fillStyle = grd;
      ctx.beginPath();
      ctx.arc(px, py, 16, 0, Math.PI * 2);
      ctx.fill();
      for (let i = 0; i < 4; i++) {
        const a = time * 0.003 + i * Math.PI / 2;
        ctx.fillStyle = '#8e44ad';
        ctx.beginPath();
        ctx.arc(px + Math.cos(a) * 12, py + Math.sin(a) * 12, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }
  }
  // Connection line
  ctx.save();
  ctx.setLineDash([4, 8]);
  ctx.strokeStyle = 'rgba(155,89,182,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(p.x1, p.y1);
  ctx.lineTo(p.x2, p.y2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function drawTarget(t, time) {
  const pulse = Math.sin(time * 0.005) * 4;
  const targetSprite = GameSprites.getTarget();
  if (targetSprite) {
    ctx.save();
    const scale = 1 + pulse * 0.015;
    ctx.translate(t.x, t.y);
    ctx.scale(scale, scale);
    // Slow rotation
    ctx.rotate(time * 0.0008);
    ctx.drawImage(targetSprite, -targetSprite.width / 2, -targetSprite.height / 2);
    ctx.restore();
    // Dynamic pulsing glow ring (animated, can't be pre-rendered)
    ctx.save();
    ctx.globalAlpha = 0.15 + Math.sin(time * 0.005) * 0.1;
    ctx.strokeStyle = '#f1c40f';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 28 + pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.restore();
  } else {
    // Fallback
    const grd = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, 28 + pulse);
    grd.addColorStop(0, 'rgba(241,196,15,0.5)');
    grd.addColorStop(1, 'rgba(241,196,15,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(t.x, t.y, 28 + pulse, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#f1c40f';
    ctx.strokeStyle = '#f39c12';
    ctx.lineWidth = 2;
    drawStar(t.x, t.y, 5, 16 + pulse * 0.3, 8);
    ctx.fill();
    ctx.stroke();
  }
}

function drawStar(cx, cy, spikes, outerR, innerR) {
  ctx.beginPath();
  for (let i = 0; i < spikes * 2; i++) {
    const r = i % 2 === 0 ? outerR : innerR;
    const a = (i * Math.PI / spikes) - Math.PI / 2;
    if (i === 0) ctx.moveTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
    else ctx.lineTo(cx + Math.cos(a) * r, cy + Math.sin(a) * r);
  }
  ctx.closePath();
}

function drawBall() {
  if (!ball) return;
  const ballSprite = GameSprites.getBall();
  if (ballSprite) {
    ctx.drawImage(ballSprite, ball.x - ballSprite.width / 2, ball.y - ballSprite.height / 2);
  } else {
    // Fallback
    ctx.save();
    ctx.fillStyle = 'rgba(74,144,217,0.2)';
    ctx.beginPath();
    ctx.arc(ball.x + 3, ball.y + 3, ball.r, 0, Math.PI * 2);
    ctx.fill();
    const grd = ctx.createRadialGradient(ball.x - 4, ball.y - 4, 2, ball.x, ball.y, ball.r);
    grd.addColorStop(0, '#6cb3f5');
    grd.addColorStop(1, '#3a7bd5');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath();
    ctx.arc(ball.x - 4, ball.y - 4, ball.r * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

function drawRemovable(r) {
  const sprite = GameSprites.getRemovable(r.w, r.h);
  if (sprite) {
    ctx.drawImage(sprite, r.x - 4, r.y - 4);
  } else {
    // Fallback
    ctx.fillStyle = '#e74c3c';
    ctx.shadowColor = 'rgba(231,76,60,0.3)';
    ctx.shadowBlur = 6;
    roundRect(r.x, r.y, r.w, r.h, 4, true, false);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 2;
    const cx = r.x + r.w/2, cy = r.y + r.h/2, s = 5;
    ctx.beginPath();
    ctx.moveTo(cx - s, cy - s); ctx.lineTo(cx + s, cy + s);
    ctx.moveTo(cx + s, cy - s); ctx.lineTo(cx - s, cy + s);
    ctx.stroke();
  }
}

function drawComplete(time) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.shadowColor = 'rgba(0,0,0,0.2)';
  ctx.shadowBlur = 20;
  roundRect(W/2 - 140, H/2 - 100, 280, 200, 16, true, false);
  ctx.shadowBlur = 0;

  ctx.fillStyle = '#2c3e50';
  ctx.font = 'bold 28px Segoe UI, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('클리어!', W/2, H/2 - 50);

  // Stars
  ctx.font = '36px sans-serif';
  let stxt = '';
  for (let i = 0; i < 3; i++) stxt += i < stars.length ? '\u2605' : '\u2606';
  ctx.fillStyle = '#f39c12';
  ctx.fillText(stxt, W/2, H/2);

  // Buttons drawn on canvas for simplicity
  ctx.fillStyle = '#4a90d9';
  roundRect(W/2 - 120, H/2 + 30, 110, 40, 8, true, false);
  ctx.fillStyle = '#27ae60';
  roundRect(W/2 + 10, H/2 + 30, 110, 40, 8, true, false);

  ctx.fillStyle = '#fff';
  ctx.font = '15px Segoe UI, sans-serif';
  ctx.fillText('다시하기', W/2 - 65, H/2 + 56);
  ctx.fillText('다음 레벨', W/2 + 65, H/2 + 56);
}

// Complete screen click
canvas.addEventListener('click', (e) => {
  if (state !== 'complete') return;
  const p = getPos(e);
  // Retry
  if (p.x >= W/2-120 && p.x <= W/2-10 && p.y >= H/2+30 && p.y <= H/2+70) {
    resetLevel();
  }
  // Next
  if (p.x >= W/2+10 && p.x <= W/2+120 && p.y >= H/2+30 && p.y <= H/2+70) {
    if (currentLevel < 11) loadLevel(currentLevel + 1);
    else { state = 'menu'; updateStarDisplay(); }
  }
});

// ====== MAIN LOOP ======
function frame(time) {
  animFrame = requestAnimationFrame(frame);
  ctx.clearRect(0, 0, W, H);

  if (state === 'menu') {
    drawMenu();
    document.getElementById('levelLabel').textContent = '';
    document.getElementById('bottomBar').style.display = 'none';
    document.getElementById('starDisplay').textContent = '';
    document.getElementById('hint').textContent = '';
  } else {
    document.getElementById('bottomBar').style.display = 'flex';

    // Background (sprite)
    const bgSprite = GameSprites.getBackground();
    if (bgSprite) {
      ctx.drawImage(bgSprite, 0, 0);
    } else {
      ctx.fillStyle = '#f0f4f8';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(0,0,0,0.04)';
      for (let gx = 20; gx < W; gx += 40) {
        for (let gy = 20; gy < H; gy += 40) {
          ctx.beginPath();
          ctx.arc(gx, gy, 1.5, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    // Draw level objects
    for (const p of levelData.platforms) drawPlatform(p);
    for (const p of levelData.placeables) drawPlatform(p, p.color || '#2ecc71');
    for (const r of levelData.removables) drawRemovable(r);
    for (const b of levelData.bumpers) drawBumper(b);
    for (const p of levelData.portals) drawPortal(p, time);
    drawTarget(levelData.target, time);

    // Trajectory
    drawTrajectory();

    // Physics
    physicsTick();

    // Particles
    updateParticles();
    drawParticles();

    // Ball
    drawBall();

    // Complete overlay
    if (state === 'complete') drawComplete(time);

    updateStarDisplay();
  }
}

// Start
state = 'menu';
requestAnimationFrame(frame);
})();
</script>
