<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>스타 스트라이커 - 슈팅 게임</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
canvas { display: block; margin: 0 auto; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

// ── Sprite System ──
const GameSprites = (function() {
    const sprites = {};
    const explosionFrames = [];
    let ready = false;

    function makeCanvas(w, h) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        return c;
    }

    function drawToCanvas(w, h, drawFn) {
        const c = makeCanvas(w, h);
        const x = c.getContext('2d');
        x.translate(w / 2, h / 2);
        drawFn(x, w, h);
        return c;
    }

    function createPlayerShip() {
        sprites.player = drawToCanvas(48, 48, (x) => {
            // Engine glow base
            const eg = x.createRadialGradient(0, 14, 0, 0, 14, 18);
            eg.addColorStop(0, 'rgba(0,170,255,0.5)');
            eg.addColorStop(1, 'transparent');
            x.fillStyle = eg;
            x.fillRect(-18, -4, 36, 36);

            // Engine flame
            x.fillStyle = '#0cf';
            x.globalAlpha = 0.9;
            x.beginPath();
            x.moveTo(-6, 10);
            x.lineTo(0, 22);
            x.lineTo(6, 10);
            x.fill();
            // Inner flame
            x.fillStyle = '#fff';
            x.globalAlpha = 0.7;
            x.beginPath();
            x.moveTo(-3, 10);
            x.lineTo(0, 18);
            x.lineTo(3, 10);
            x.fill();
            x.globalAlpha = 1;

            // Main hull - metallic gradient
            const hullGrad = x.createLinearGradient(-12, -14, 12, 14);
            hullGrad.addColorStop(0, '#cceeff');
            hullGrad.addColorStop(0.3, '#88bbdd');
            hullGrad.addColorStop(0.5, '#aaddff');
            hullGrad.addColorStop(0.7, '#6699bb');
            hullGrad.addColorStop(1, '#88bbdd');
            x.fillStyle = hullGrad;
            x.strokeStyle = '#0af';
            x.lineWidth = 1.5;
            x.beginPath();
            x.moveTo(0, -14);
            x.lineTo(-12, 10);
            x.lineTo(-8, 14);
            x.lineTo(8, 14);
            x.lineTo(12, 10);
            x.closePath();
            x.fill();
            x.stroke();

            // Hull panel lines
            x.strokeStyle = 'rgba(0,170,255,0.3)';
            x.lineWidth = 0.5;
            x.beginPath();
            x.moveTo(-6, 0); x.lineTo(-10, 12);
            x.moveTo(6, 0); x.lineTo(10, 12);
            x.stroke();

            // Cockpit - glass effect
            const cockGrad = x.createLinearGradient(0, -10, 0, 2);
            cockGrad.addColorStop(0, '#66eeff');
            cockGrad.addColorStop(0.5, '#00ccff');
            cockGrad.addColorStop(1, '#004466');
            x.fillStyle = cockGrad;
            x.beginPath();
            x.moveTo(0, -10);
            x.lineTo(-5, 2);
            x.lineTo(5, 2);
            x.closePath();
            x.fill();
            // Cockpit highlight
            x.fillStyle = 'rgba(255,255,255,0.4)';
            x.beginPath();
            x.moveTo(-1, -8);
            x.lineTo(-3, -2);
            x.lineTo(0, -3);
            x.closePath();
            x.fill();

            // Wings - metallic
            const wingGrad = x.createLinearGradient(-18, 5, -8, 14);
            wingGrad.addColorStop(0, '#6699cc');
            wingGrad.addColorStop(1, '#88bbee');
            x.fillStyle = wingGrad;
            x.beginPath();
            x.moveTo(-8, 5); x.lineTo(-18, 12); x.lineTo(-10, 14);
            x.closePath();
            x.fill();
            const wingGrad2 = x.createLinearGradient(8, 5, 18, 14);
            wingGrad2.addColorStop(0, '#88bbee');
            wingGrad2.addColorStop(1, '#6699cc');
            x.fillStyle = wingGrad2;
            x.beginPath();
            x.moveTo(8, 5); x.lineTo(18, 12); x.lineTo(10, 14);
            x.closePath();
            x.fill();

            // Wing tip lights
            x.fillStyle = '#ff4444';
            x.beginPath(); x.arc(-16, 12, 1.5, 0, Math.PI * 2); x.fill();
            x.fillStyle = '#44ff44';
            x.beginPath(); x.arc(16, 12, 1.5, 0, Math.PI * 2); x.fill();
        });
    }

    function createEnemyBasic() {
        sprites.enemyBasic = drawToCanvas(40, 40, (x) => {
            const r = 14;
            // Hull
            const grad = x.createLinearGradient(-r, -r, r, r);
            grad.addColorStop(0, '#ff6688');
            grad.addColorStop(0.5, '#ff4466');
            grad.addColorStop(1, '#aa2244');
            x.fillStyle = grad;
            x.beginPath();
            x.moveTo(0, r);
            x.lineTo(-r, -r * 0.6);
            x.lineTo(0, -r * 0.3);
            x.lineTo(r, -r * 0.6);
            x.closePath();
            x.fill();
            x.strokeStyle = '#ff8899';
            x.lineWidth = 1;
            x.stroke();
            // Engine detail
            x.fillStyle = '#ff2244';
            x.beginPath();
            x.arc(0, r * 0.3, 4, 0, Math.PI * 2);
            x.fill();
            x.fillStyle = '#ffaa88';
            x.beginPath();
            x.arc(0, r * 0.3, 2, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createEnemyZigzag() {
        sprites.enemyZigzag = drawToCanvas(36, 36, (x) => {
            const r = 12;
            const grad = x.createLinearGradient(-r, -r, r, r);
            grad.addColorStop(0, '#ffaa66');
            grad.addColorStop(0.5, '#ff8844');
            grad.addColorStop(1, '#cc6622');
            x.fillStyle = grad;
            x.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (Math.PI * 2 / 6) * i - Math.PI / 2;
                x.lineTo(Math.cos(a) * r, Math.sin(a) * r);
            }
            x.closePath();
            x.fill();
            x.strokeStyle = '#ffbb66';
            x.lineWidth = 1;
            x.stroke();
            // Inner hexagon detail
            x.fillStyle = '#cc5500';
            x.beginPath();
            for (let i = 0; i < 6; i++) {
                const a = (Math.PI * 2 / 6) * i;
                x.lineTo(Math.cos(a) * r * 0.5, Math.sin(a) * r * 0.5);
            }
            x.closePath();
            x.fill();
            // Center eye
            x.fillStyle = '#ffee88';
            x.beginPath();
            x.arc(0, 0, 3, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createEnemyBomber() {
        sprites.enemyBomber = drawToCanvas(44, 44, (x) => {
            const r = 16;
            // Outer ring
            const grad = x.createRadialGradient(0, 0, r * 0.4, 0, 0, r);
            grad.addColorStop(0, '#dd55ff');
            grad.addColorStop(1, '#8822aa');
            x.fillStyle = grad;
            x.beginPath();
            x.arc(0, 0, r, 0, Math.PI * 2);
            x.fill();
            x.strokeStyle = '#ee88ff';
            x.lineWidth = 1.5;
            x.stroke();
            // Inner dark core
            x.fillStyle = '#220033';
            x.beginPath();
            x.arc(0, 0, r * 0.5, 0, Math.PI * 2);
            x.fill();
            // Energy ring
            x.strokeStyle = '#ff88ff';
            x.lineWidth = 1;
            x.beginPath();
            x.arc(0, 0, r * 0.7, 0, Math.PI * 2);
            x.stroke();
            // Center glow
            x.fillStyle = '#ff88dd';
            x.beginPath();
            x.arc(0, 0, 3, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createEnemyShield() {
        sprites.enemyShield = drawToCanvas(48, 48, (x) => {
            const r = 18;
            // Shield ring
            x.strokeStyle = '#66aaff';
            x.lineWidth = 3;
            x.globalAlpha = 0.6;
            x.beginPath();
            x.arc(0, 0, r + 4, 0, Math.PI * 2);
            x.stroke();
            x.globalAlpha = 1;
            // Body diamond
            const grad = x.createLinearGradient(-r, 0, r, 0);
            grad.addColorStop(0, '#2266cc');
            grad.addColorStop(0.5, '#4488ff');
            grad.addColorStop(1, '#2266cc');
            x.fillStyle = grad;
            x.beginPath();
            x.moveTo(0, r);
            x.lineTo(-r, 0);
            x.lineTo(0, -r);
            x.lineTo(r, 0);
            x.closePath();
            x.fill();
            x.strokeStyle = '#88ccff';
            x.lineWidth = 1;
            x.stroke();
            // Inner diamond
            x.fillStyle = '#1144aa';
            x.beginPath();
            x.moveTo(0, r * 0.5);
            x.lineTo(-r * 0.5, 0);
            x.lineTo(0, -r * 0.5);
            x.lineTo(r * 0.5, 0);
            x.closePath();
            x.fill();
            // Center gem
            x.fillStyle = '#88ddff';
            x.beginPath();
            x.arc(0, 0, 3, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createBoss() {
        sprites.boss = drawToCanvas(88, 88, (x) => {
            const r = 36;
            // Cannons
            x.fillStyle = '#662233';
            x.fillRect(-r - 4, -5, 8, 20);
            x.fillRect(r - 4, -5, 8, 20);
            // Cannon tips
            x.fillStyle = '#ff4466';
            x.fillRect(-r - 3, 13, 6, 3);
            x.fillRect(r - 3, 13, 6, 3);

            // Main body - armored plating
            const bodyGrad = x.createLinearGradient(-r, -r, r, r);
            bodyGrad.addColorStop(0, '#aa1133');
            bodyGrad.addColorStop(0.3, '#881122');
            bodyGrad.addColorStop(0.5, '#992233');
            bodyGrad.addColorStop(0.7, '#771122');
            bodyGrad.addColorStop(1, '#661122');
            x.fillStyle = bodyGrad;
            x.beginPath();
            x.moveTo(0, -r);
            x.lineTo(-r * 0.8, -r * 0.3);
            x.lineTo(-r, r * 0.5);
            x.lineTo(-r * 0.4, r);
            x.lineTo(r * 0.4, r);
            x.lineTo(r, r * 0.5);
            x.lineTo(r * 0.8, -r * 0.3);
            x.closePath();
            x.fill();
            x.strokeStyle = '#ff2244';
            x.lineWidth = 2;
            x.stroke();

            // Armor panel lines
            x.strokeStyle = 'rgba(255,34,68,0.3)';
            x.lineWidth = 1;
            x.beginPath();
            x.moveTo(-r * 0.5, -r * 0.5); x.lineTo(-r * 0.6, r * 0.3);
            x.moveTo(r * 0.5, -r * 0.5); x.lineTo(r * 0.6, r * 0.3);
            x.moveTo(-r * 0.2, -r * 0.8); x.lineTo(-r * 0.2, r * 0.5);
            x.moveTo(r * 0.2, -r * 0.8); x.lineTo(r * 0.2, r * 0.5);
            x.stroke();

            // Core
            const coreGrad = x.createRadialGradient(0, 5, 0, 0, 5, 12);
            coreGrad.addColorStop(0, '#ff8888');
            coreGrad.addColorStop(0.5, '#ff4466');
            coreGrad.addColorStop(1, 'rgba(255,68,102,0)');
            x.fillStyle = coreGrad;
            x.beginPath();
            x.arc(0, 5, 12, 0, Math.PI * 2);
            x.fill();
            x.fillStyle = '#ff6688';
            x.beginPath();
            x.arc(0, 5, 6, 0, Math.PI * 2);
            x.fill();

            // Eyes
            x.fillStyle = '#ff0033';
            x.beginPath();
            x.arc(-10, -8, 5, 0, Math.PI * 2);
            x.arc(10, -8, 5, 0, Math.PI * 2);
            x.fill();
            // Eye pupils
            x.fillStyle = '#ff8899';
            x.beginPath();
            x.arc(-10, -8, 2, 0, Math.PI * 2);
            x.arc(10, -8, 2, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createPlayerBullet() {
        sprites.playerBullet = drawToCanvas(16, 16, (x) => {
            // Outer glow
            const g = x.createRadialGradient(0, 0, 0, 0, 0, 8);
            g.addColorStop(0, 'rgba(0,255,255,0.6)');
            g.addColorStop(0.5, 'rgba(0,200,255,0.2)');
            g.addColorStop(1, 'transparent');
            x.fillStyle = g;
            x.fillRect(-8, -8, 16, 16);
            // Core
            x.fillStyle = '#0ff';
            x.beginPath();
            x.arc(0, 0, 3, 0, Math.PI * 2);
            x.fill();
            // White center
            x.fillStyle = '#fff';
            x.beginPath();
            x.arc(0, 0, 1.5, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createEnemyBullet(name, color) {
        sprites[name] = drawToCanvas(20, 20, (x) => {
            // Outer glow
            const g = x.createRadialGradient(0, 0, 0, 0, 0, 10);
            g.addColorStop(0, color.replace(')', ',0.5)').replace('rgb', 'rgba'));
            g.addColorStop(1, 'transparent');
            x.fillStyle = g;
            x.fillRect(-10, -10, 20, 20);
            // Main ball
            x.fillStyle = color;
            x.beginPath();
            x.arc(0, 0, 4, 0, Math.PI * 2);
            x.fill();
            // White center
            x.fillStyle = '#fff';
            x.globalAlpha = 0.7;
            x.beginPath();
            x.arc(0, 0, 1.6, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createExplosionFrames() {
        const frameCount = 8;
        for (let f = 0; f < frameCount; f++) {
            const progress = f / (frameCount - 1);
            const c = drawToCanvas(64, 64, (x) => {
                const maxR = 28;
                // Outer ring
                const r1 = maxR * (0.3 + progress * 0.7);
                const alpha1 = 1 - progress;
                x.globalAlpha = alpha1 * 0.4;
                const g1 = x.createRadialGradient(0, 0, r1 * 0.5, 0, 0, r1);
                g1.addColorStop(0, '#ff8844');
                g1.addColorStop(1, 'transparent');
                x.fillStyle = g1;
                x.beginPath();
                x.arc(0, 0, r1, 0, Math.PI * 2);
                x.fill();

                // Mid ring
                x.globalAlpha = alpha1 * 0.7;
                const r2 = maxR * (0.2 + progress * 0.5);
                const g2 = x.createRadialGradient(0, 0, 0, 0, 0, r2);
                g2.addColorStop(0, '#ffff88');
                g2.addColorStop(0.4, '#ffcc44');
                g2.addColorStop(1, '#ff4444');
                x.fillStyle = g2;
                x.beginPath();
                x.arc(0, 0, r2, 0, Math.PI * 2);
                x.fill();

                // Core flash (early frames)
                if (progress < 0.5) {
                    x.globalAlpha = (1 - progress * 2) * 0.9;
                    const r3 = maxR * (0.1 + progress * 0.3);
                    x.fillStyle = '#fff';
                    x.beginPath();
                    x.arc(0, 0, r3, 0, Math.PI * 2);
                    x.fill();
                }

                // Debris particles (later frames)
                if (progress > 0.2) {
                    x.globalAlpha = alpha1 * 0.8;
                    const debris = 8;
                    for (let i = 0; i < debris; i++) {
                        const a = (Math.PI * 2 / debris) * i + f * 0.3;
                        const dr = r1 * (0.4 + progress * 0.6);
                        const dx = Math.cos(a) * dr;
                        const dy = Math.sin(a) * dr;
                        const ds = 2 * (1 - progress);
                        x.fillStyle = i % 2 === 0 ? '#ffcc44' : '#ff6644';
                        x.fillRect(dx - ds, dy - ds, ds * 2, ds * 2);
                    }
                }
            });
            explosionFrames.push(c);
        }
    }

    function createPowerup(name, color, drawIcon) {
        sprites[name] = drawToCanvas(32, 32, (x) => {
            // Outer glow
            const g = x.createRadialGradient(0, 0, 4, 0, 0, 16);
            g.addColorStop(0, color.replace(')', ',0.4)').replace('rgb', 'rgba'));
            g.addColorStop(1, 'transparent');
            x.fillStyle = g;
            x.fillRect(-16, -16, 32, 32);
            // Ring
            x.strokeStyle = color;
            x.lineWidth = 2;
            x.beginPath();
            x.arc(0, 0, 10, 0, Math.PI * 2);
            x.stroke();
            // Background disc
            x.fillStyle = color.replace(')', ',0.2)').replace('rgb', 'rgba');
            x.beginPath();
            x.arc(0, 0, 9, 0, Math.PI * 2);
            x.fill();
            // Icon
            drawIcon(x, color);
        });
    }

    function createPowerups() {
        // Shield powerup - shield icon
        createPowerup('powerShield', 'rgb(68,68,255)', (x, c) => {
            x.strokeStyle = '#88aaff';
            x.lineWidth = 2;
            x.beginPath();
            x.arc(0, -1, 6, -Math.PI * 0.8, -Math.PI * 0.2);
            x.lineTo(0, 7);
            x.lineTo(-5, 2);
            x.stroke();
        });

        // Weapon upgrade - arrow up
        createPowerup('powerWeapon', 'rgb(255,68,68)', (x, c) => {
            x.fillStyle = '#ff8888';
            x.beginPath();
            x.moveTo(0, -6);
            x.lineTo(-5, 1);
            x.lineTo(-2, 1);
            x.lineTo(-2, 6);
            x.lineTo(2, 6);
            x.lineTo(2, 1);
            x.lineTo(5, 1);
            x.closePath();
            x.fill();
        });

        // Speed - lightning bolt
        createPowerup('powerSpeed', 'rgb(68,255,68)', (x, c) => {
            x.fillStyle = '#88ff88';
            x.beginPath();
            x.moveTo(1, -7);
            x.lineTo(-4, 0);
            x.lineTo(0, 0);
            x.lineTo(-1, 7);
            x.lineTo(4, 0);
            x.lineTo(0, 0);
            x.closePath();
            x.fill();
        });

        // Bomb - bomb icon
        createPowerup('powerBomb', 'rgb(255,255,68)', (x, c) => {
            x.fillStyle = '#ffff88';
            x.beginPath();
            x.arc(0, 1, 5, 0, Math.PI * 2);
            x.fill();
            // Fuse
            x.strokeStyle = '#ffcc44';
            x.lineWidth = 1.5;
            x.beginPath();
            x.moveTo(2, -4);
            x.quadraticCurveTo(5, -7, 3, -7);
            x.stroke();
            // Spark
            x.fillStyle = '#fff';
            x.beginPath();
            x.arc(3, -7, 1.5, 0, Math.PI * 2);
            x.fill();
        });
    }

    function createStarTile() {
        // 64x64 star pattern tile
        sprites.starTile = drawToCanvas(64, 64, (x) => {
            x.translate(-32, -32); // undo the default centering
            for (let i = 0; i < 20; i++) {
                const sx = Math.random() * 64;
                const sy = Math.random() * 64;
                const sr = 0.3 + Math.random() * 1.8;
                const bright = 0.3 + Math.random() * 0.7;
                x.globalAlpha = bright;
                x.fillStyle = '#fff';
                if (sr > 1.2) {
                    // Larger stars get a cross shape
                    x.fillRect(sx - sr, sy - 0.3, sr * 2, 0.6);
                    x.fillRect(sx - 0.3, sy - sr, 0.6, sr * 2);
                    x.beginPath();
                    x.arc(sx, sy, sr * 0.5, 0, Math.PI * 2);
                    x.fill();
                } else {
                    x.fillRect(sx, sy, sr, sr);
                }
            }
        });
    }

    function createAsteroid() {
        sprites.asteroid = drawToCanvas(48, 48, (x) => {
            const r = 18;
            // Irregular rocky shape
            const points = [];
            const segs = 10;
            for (let i = 0; i < segs; i++) {
                const a = (Math.PI * 2 / segs) * i;
                const rr = r * (0.7 + Math.random() * 0.3);
                points.push({ x: Math.cos(a) * rr, y: Math.sin(a) * rr });
            }
            // Body
            const grad = x.createRadialGradient(-4, -4, 0, 0, 0, r);
            grad.addColorStop(0, '#887766');
            grad.addColorStop(0.6, '#665544');
            grad.addColorStop(1, '#443322');
            x.fillStyle = grad;
            x.beginPath();
            x.moveTo(points[0].x, points[0].y);
            for (let i = 1; i < points.length; i++) {
                x.lineTo(points[i].x, points[i].y);
            }
            x.closePath();
            x.fill();
            x.strokeStyle = '#554433';
            x.lineWidth = 1;
            x.stroke();
            // Craters
            x.fillStyle = 'rgba(0,0,0,0.25)';
            x.beginPath(); x.arc(-5, -3, 4, 0, Math.PI * 2); x.fill();
            x.beginPath(); x.arc(4, 5, 3, 0, Math.PI * 2); x.fill();
            x.beginPath(); x.arc(6, -6, 2, 0, Math.PI * 2); x.fill();
            // Crater rims (highlights)
            x.strokeStyle = 'rgba(255,255,255,0.1)';
            x.lineWidth = 0.5;
            x.beginPath(); x.arc(-5, -3, 4, -Math.PI * 0.8, -Math.PI * 0.2); x.stroke();
            x.beginPath(); x.arc(4, 5, 3, -Math.PI * 0.8, 0); x.stroke();
        });
    }

    function init() {
        createPlayerShip();
        createEnemyBasic();
        createEnemyZigzag();
        createEnemyBomber();
        createEnemyShield();
        createBoss();
        createPlayerBullet();
        createEnemyBullet('eBulletRed', '#ff4488');
        createEnemyBullet('eBulletOrange', '#ffaa44');
        createEnemyBullet('eBulletPurple', '#cc66ff');
        createEnemyBullet('eBulletBlue', '#6688ff');
        createEnemyBullet('eBulletBossA', '#ff2266');
        createEnemyBullet('eBulletBossB', '#ff4488');
        createEnemyBullet('eBulletBossC', '#ff6644');
        createEnemyBullet('eBulletBossD', '#ff2288');
        createExplosionFrames();
        createPowerups();
        createStarTile();
        createAsteroid();
        ready = true;
    }

    function get(name) {
        return ready ? sprites[name] : null;
    }

    function getExplosionFrame(index) {
        if (!ready || index < 0 || index >= explosionFrames.length) return null;
        return explosionFrames[index];
    }

    return {
        init: init,
        get: get,
        getExplosionFrame: getExplosionFrame,
        EXPLOSION_FRAMES: 8
    };
})();

// ── Canvas Setup ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, scale = 1;
const BASE_W = 480, BASE_H = 720;

function resize() {
    const dpr = window.devicePixelRatio || 1;
    const iw = window.innerWidth, ih = window.innerHeight;
    const aspect = BASE_W / BASE_H;
    let w, h;
    if (iw / ih < aspect) { w = iw; h = iw / aspect; }
    else { h = ih; w = ih * aspect; }
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    canvas.width = BASE_W * dpr;
    canvas.height = BASE_H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = BASE_W; H = BASE_H;
    scale = w / BASE_W;
}
window.addEventListener('resize', resize);
resize();

// ── Util ──
const rand = (a, b) => Math.random() * (b - a) + a;
const randInt = (a, b) => Math.floor(rand(a, b + 1));
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
const lerp = (a, b, t) => a + (b - a) * t;

// ── Constants ──
const PLAYER_SPEED = 4;
const PLAYER_SLOW = 1.8;
const BULLET_SPEED = 8;
const PLAYER_HITBOX = 3;
const LIVES_INIT = 3;
const INVULN_TIME = 120;
const BOMB_DURATION = 30;

// ── State ──
let state = 'title'; // title, playing, gameover, paused
let score = 0, bestScore = parseInt(localStorage.getItem('shooting_best')) || 0;
let lives = LIVES_INIT;
let wave = 0, waveTimer = 0, waveDelay = 0;
let enemiesInWave = 0, enemiesSpawned = 0;
let bombTimer = 0, bombFlash = 0;
let shakeTimer = 0, shakeX = 0, shakeY = 0;
let streak = 0, multiplier = 1;
let powerLevel = 0; // 0=single, 1=double, 2=triple, 3=spread
let speedBoost = 0;
let playerShield = false;
let invulnTimer = 0;
let fireTimer = 0;
let bossActive = false;
let frame = 0;
let touchId = null, touchX = 0, touchY = 0, touchStartX = 0, touchStartY = 0;
let playerTargetX = 0, playerTargetY = 0, isTouching = false;
let lastTapTime = 0;
let bombs = 3;

// ── Objects ──
let player = { x: W / 2, y: H - 80, w: 24, h: 28 };
let playerBullets = [];
let enemies = [];
let enemyBullets = [];
let particles = [];
let powerups = [];
let stars = [];

// ── Star Field ──
function initStars() {
    stars = [];
    for (let i = 0; i < 120; i++) {
        stars.push({
            x: rand(0, W), y: rand(0, H),
            speed: rand(0.5, 3), size: rand(0.5, 2.5),
            brightness: rand(0.3, 1)
        });
    }
}
initStars();

function updateStars() {
    for (const s of stars) {
        s.y += s.speed;
        if (s.y > H) { s.y = -2; s.x = rand(0, W); }
    }
}

function drawStars() {
    for (const s of stars) {
        ctx.globalAlpha = s.brightness;
        ctx.fillStyle = '#fff';
        ctx.fillRect(s.x, s.y, s.size, s.size);
    }
    ctx.globalAlpha = 1;
}

// ── Keys ──
const keys = {};
window.addEventListener('keydown', e => {
    keys[e.code] = true;
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
    if (state === 'title' && (e.code === 'Space' || e.code === 'Enter')) startGame();
    if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter')) startGame();
    if (state === 'playing' && e.code === 'KeyX') useBomb();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ── Touch ──
canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = canvas.getBoundingClientRect();
    const tx = (t.clientX - rect.left) / scale;
    const ty = (t.clientY - rect.top) / scale;

    if (state === 'title' || state === 'gameover') { startGame(); return; }

    const now = Date.now();
    if (now - lastTapTime < 300) { useBomb(); }
    lastTapTime = now;

    isTouching = true;
    touchId = t.identifier;
    touchStartX = tx; touchStartY = ty;
    touchX = tx; touchY = ty;
    playerTargetX = player.x;
    playerTargetY = player.y;
}, { passive: false });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === touchId) {
            const rect = canvas.getBoundingClientRect();
            const tx = (t.clientX - rect.left) / scale;
            const ty = (t.clientY - rect.top) / scale;
            const dx = tx - touchX, dy = ty - touchY;
            touchX = tx; touchY = ty;
            playerTargetX = clamp(player.x + dx, 12, W - 12);
            playerTargetY = clamp(player.y + dy, 12, H - 12);
        }
    }
}, { passive: false });

canvas.addEventListener('touchend', e => {
    e.preventDefault();
    for (const t of e.changedTouches) {
        if (t.identifier === touchId) { isTouching = false; touchId = null; }
    }
}, { passive: false });

canvas.addEventListener('mousedown', e => {
    if (state === 'title' || state === 'gameover') { startGame(); return; }
});

// ── Game Init ──
function startGame() {
    state = 'playing';
    score = 0; lives = LIVES_INIT; wave = 0; bombs = 3;
    powerLevel = 0; speedBoost = 0; playerShield = false;
    streak = 0; multiplier = 1;
    invulnTimer = 0; bombTimer = 0; bossActive = false;
    player.x = W / 2; player.y = H - 80;
    playerBullets = []; enemies = []; enemyBullets = [];
    particles = []; powerups = [];
    waveTimer = 60;
    waveDelay = 0;
    fireTimer = 0;
    frame = 0;
    nextWave();
}

// ── Wave System ──
function nextWave() {
    wave++;
    waveDelay = 90;
    enemiesSpawned = 0;
    bossActive = false;

    if (wave % 5 === 0) {
        enemiesInWave = 1; // boss wave
    } else {
        enemiesInWave = 4 + wave * 2;
        if (enemiesInWave > 30) enemiesInWave = 30;
    }
}

function spawnEnemy() {
    if (wave % 5 === 0 && !bossActive) {
        spawnBoss();
        return;
    }

    const types = ['basic'];
    if (wave >= 2) types.push('zigzag');
    if (wave >= 3) types.push('bomber');
    if (wave >= 4) types.push('shield');

    const type = types[randInt(0, types.length - 1)];
    const e = {
        x: rand(30, W - 30), y: -30,
        type, alive: true, timer: 0,
        fireTimer: randInt(40, 120)
    };

    switch (type) {
        case 'basic':
            e.hp = 1; e.maxHp = 1; e.speed = 1.2 + wave * 0.1;
            e.radius = 14; e.score = 100; e.color = '#ff4466';
            break;
        case 'zigzag':
            e.hp = 2; e.maxHp = 2; e.speed = 1.5 + wave * 0.08;
            e.radius = 12; e.score = 150; e.color = '#ff8844';
            e.amp = rand(30, 60); e.freq = rand(0.02, 0.04);
            e.baseX = e.x;
            break;
        case 'bomber':
            e.hp = 3; e.maxHp = 3; e.speed = 0.8 + wave * 0.05;
            e.radius = 16; e.score = 200; e.color = '#cc44ff';
            break;
        case 'shield':
            e.hp = 5 + wave; e.maxHp = 5 + wave; e.speed = 0.6 + wave * 0.04;
            e.radius = 18; e.score = 300; e.color = '#4488ff';
            e.shieldAlpha = 1;
            break;
    }
    enemies.push(e);
}

function spawnBoss() {
    bossActive = true;
    const e = {
        x: W / 2, y: -50, type: 'boss', alive: true,
        hp: 50 + wave * 20, maxHp: 50 + wave * 20,
        speed: 0.5, radius: 36, score: 2000 + wave * 500,
        color: '#ff2244', timer: 0, fireTimer: 0,
        phase: 0, phaseTimer: 0, targetX: W / 2, targetY: 80,
        entering: true
    };
    enemies.push(e);
}

// ── Player Fire ──
function playerFire() {
    const bspd = -BULLET_SPEED;
    const cx = player.x, cy = player.y - 14;

    switch (powerLevel) {
        case 0: // single
            playerBullets.push({ x: cx, y: cy, vx: 0, vy: bspd, r: 3 });
            break;
        case 1: // double
            playerBullets.push({ x: cx - 6, y: cy, vx: 0, vy: bspd, r: 3 });
            playerBullets.push({ x: cx + 6, y: cy, vx: 0, vy: bspd, r: 3 });
            break;
        case 2: // triple
            playerBullets.push({ x: cx, y: cy - 4, vx: 0, vy: bspd, r: 3 });
            playerBullets.push({ x: cx - 8, y: cy, vx: -0.5, vy: bspd, r: 3 });
            playerBullets.push({ x: cx + 8, y: cy, vx: 0.5, vy: bspd, r: 3 });
            break;
        case 3: // spread
            for (let i = -2; i <= 2; i++) {
                const angle = -Math.PI / 2 + i * 0.15;
                playerBullets.push({
                    x: cx + i * 5, y: cy,
                    vx: Math.cos(angle) * BULLET_SPEED,
                    vy: Math.sin(angle) * BULLET_SPEED, r: 3
                });
            }
            break;
    }
}

// ── Enemy Fire ──
function enemyFire(e) {
    const spd = 2.5 + wave * 0.15;
    const s = Math.min(spd, 5);

    switch (e.type) {
        case 'basic': {
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, r: 4, color: '#ff4488' });
            break;
        }
        case 'zigzag': {
            enemyBullets.push({ x: e.x, y: e.y, vx: 0, vy: s, r: 4, color: '#ffaa44' });
            break;
        }
        case 'bomber': {
            for (let i = -2; i <= 2; i++) {
                const a = Math.PI / 2 + i * 0.3;
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * s * 0.8, vy: Math.sin(a) * s * 0.8, r: 4, color: '#cc66ff' });
            }
            break;
        }
        case 'shield': {
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            for (let i = -1; i <= 1; i++) {
                const aa = a + i * 0.2;
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(aa) * s, vy: Math.sin(aa) * s, r: 4, color: '#6688ff' });
            }
            break;
        }
        case 'boss': {
            bossFire(e, s);
            break;
        }
    }
}

function bossFire(e, s) {
    const phase = e.phase % 4;
    switch (phase) {
        case 0: { // spiral
            for (let i = 0; i < 8; i++) {
                const a = (Math.PI * 2 / 8) * i + e.timer * 0.1;
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * s * 0.7, vy: Math.sin(a) * s * 0.7, r: 4, color: '#ff2266' });
            }
            break;
        }
        case 1: { // aimed burst
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            for (let i = 0; i < 5; i++) {
                const aa = a + (i - 2) * 0.12;
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(aa) * s, vy: Math.sin(aa) * s, r: 5, color: '#ff4488' });
            }
            break;
        }
        case 2: { // radial burst
            for (let i = 0; i < 16; i++) {
                const a = (Math.PI * 2 / 16) * i;
                enemyBullets.push({ x: e.x, y: e.y, vx: Math.cos(a) * s * 0.6, vy: Math.sin(a) * s * 0.6, r: 4, color: '#ff6644' });
            }
            break;
        }
        case 3: { // tracking streams
            const a = Math.atan2(player.y - e.y, player.x - e.x);
            enemyBullets.push({ x: e.x - 20, y: e.y + 10, vx: Math.cos(a) * s * 1.1, vy: Math.sin(a) * s * 1.1, r: 5, color: '#ff2288' });
            enemyBullets.push({ x: e.x + 20, y: e.y + 10, vx: Math.cos(a) * s * 1.1, vy: Math.sin(a) * s * 1.1, r: 5, color: '#ff2288' });
            break;
        }
    }
}

// ── Powerups ──
function spawnPowerup(x, y) {
    if (Math.random() > 0.25) return;
    const types = ['power', 'speed', 'shield', 'bomb'];
    const weights = [40, 25, 20, 15];
    let r = rand(0, 100), acc = 0, type = 'power';
    for (let i = 0; i < types.length; i++) {
        acc += weights[i];
        if (r < acc) { type = types[i]; break; }
    }
    powerups.push({ x, y, type, vy: 1.5, timer: 0, radius: 10 });
}

function collectPowerup(p) {
    switch (p.type) {
        case 'power':
            if (powerLevel < 3) powerLevel++;
            else score += 500;
            break;
        case 'speed':
            speedBoost = Math.min(speedBoost + 1, 3);
            break;
        case 'shield':
            playerShield = true;
            break;
        case 'bomb':
            bombs = Math.min(bombs + 1, 5);
            break;
    }
    spawnParticles(p.x, p.y, 8, '#0ff', 2);
}

// ── Bomb ──
function useBomb() {
    if (bombs <= 0 || state !== 'playing') return;
    bombs--;
    bombTimer = BOMB_DURATION;
    bombFlash = 15;
    shakeTimer = 10;
    // destroy all enemy bullets
    for (const b of enemyBullets) {
        spawnParticles(b.x, b.y, 3, '#fff', 1);
    }
    enemyBullets = [];
    // damage all enemies
    for (const e of enemies) {
        e.hp -= 10;
        if (e.hp <= 0) {
            killEnemy(e);
        }
    }
}

// ── Particles ──
function spawnParticles(x, y, count, color, sizeBase) {
    for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const sp = rand(1, 4);
        particles.push({
            x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: rand(15, 35), maxLife: 35,
            size: rand(sizeBase, sizeBase + 2),
            color
        });
    }
}

function spawnExplosion(x, y, radius) {
    const count = Math.floor(radius * 1.5);
    const colors = ['#ff4444', '#ff8844', '#ffcc44', '#ffff88', '#fff'];
    for (let i = 0; i < count; i++) {
        const a = rand(0, Math.PI * 2);
        const sp = rand(0.5, 5);
        const c = colors[randInt(0, colors.length - 1)];
        particles.push({
            x: x + rand(-4, 4), y: y + rand(-4, 4),
            vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
            life: rand(20, 50), maxLife: 50,
            size: rand(1, 4), color: c
        });
    }
}

// ── Kill Enemy ──
function killEnemy(e) {
    if (!e.alive) return;
    e.alive = false;
    score += e.score * multiplier;
    streak++;
    multiplier = 1 + Math.floor(streak / 10) * 0.5;
    if (multiplier > 5) multiplier = 5;
    spawnExplosion(e.x, e.y, e.radius);
    spawnPowerup(e.x, e.y);
    if (e.type === 'boss') {
        bossActive = false;
        shakeTimer = 20;
        // big explosion
        for (let i = 0; i < 5; i++) {
            setTimeout(() => {
                spawnExplosion(e.x + rand(-30, 30), e.y + rand(-30, 30), 30);
            }, i * 100);
        }
    }
}

// ── Player Hit ──
function hitPlayer() {
    if (invulnTimer > 0 || bombTimer > 0) return;
    if (playerShield) {
        playerShield = false;
        invulnTimer = 60;
        spawnParticles(player.x, player.y, 15, '#0ff', 2);
        shakeTimer = 8;
        return;
    }
    lives--;
    streak = 0;
    multiplier = 1;
    if (powerLevel > 0) powerLevel--;
    speedBoost = 0;
    invulnTimer = INVULN_TIME;
    shakeTimer = 12;
    spawnExplosion(player.x, player.y, 20);
    if (lives <= 0) {
        gameOver();
    }
}

function gameOver() {
    state = 'gameover';
    if (score > bestScore) {
        bestScore = score;
        localStorage.setItem('shooting_best', bestScore);
    }
}

// ── Update ──
function update() {
    frame++;
    updateStars();

    if (state !== 'playing') return;

    // Screen shake
    if (shakeTimer > 0) {
        shakeTimer--;
        shakeX = rand(-3, 3); shakeY = rand(-3, 3);
    } else { shakeX = 0; shakeY = 0; }

    // Bomb
    if (bombTimer > 0) bombTimer--;
    if (bombFlash > 0) bombFlash--;

    // Invuln
    if (invulnTimer > 0) invulnTimer--;

    // ── Player Movement ──
    const isSlow = keys['ShiftLeft'] || keys['ShiftRight'];
    const spd = (isSlow ? PLAYER_SLOW : PLAYER_SPEED) + speedBoost * 0.5;

    if (isTouching) {
        player.x = lerp(player.x, playerTargetX, 0.3);
        player.y = lerp(player.y, playerTargetY, 0.3);
    } else {
        if (keys['ArrowLeft'] || keys['KeyA']) player.x -= spd;
        if (keys['ArrowRight'] || keys['KeyD']) player.x += spd;
        if (keys['ArrowUp'] || keys['KeyW']) player.y -= spd;
        if (keys['ArrowDown'] || keys['KeyS']) player.y += spd;
    }
    player.x = clamp(player.x, 12, W - 12);
    player.y = clamp(player.y, 12, H - 12);

    // ── Player Fire ──
    fireTimer--;
    const fireRate = powerLevel >= 3 ? 10 : powerLevel >= 1 ? 7 : 8;
    const shouldFire = keys['Space'] || keys['KeyZ'] || isTouching;
    // Auto-fire always on
    if (fireTimer <= 0) {
        playerFire();
        fireTimer = fireRate;
    }

    // ── Player Bullets ──
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.y < -10 || b.x < -10 || b.x > W + 10) {
            playerBullets.splice(i, 1);
        }
    }

    // ── Wave Spawning ──
    if (waveDelay > 0) {
        waveDelay--;
    } else if (enemiesSpawned < enemiesInWave) {
        waveTimer--;
        if (waveTimer <= 0) {
            spawnEnemy();
            enemiesSpawned++;
            waveTimer = wave % 5 === 0 ? 999 : Math.max(15, 50 - wave * 2);
        }
    }

    // Check wave complete
    if (enemiesSpawned >= enemiesInWave && enemies.length === 0 && waveDelay <= 0) {
        nextWave();
    }

    // ── Enemies ──
    for (let i = enemies.length - 1; i >= 0; i--) {
        const e = enemies[i];
        if (!e.alive) { enemies.splice(i, 1); continue; }
        e.timer++;

        switch (e.type) {
            case 'basic':
                e.y += e.speed;
                break;
            case 'zigzag':
                e.y += e.speed;
                e.x = e.baseX + Math.sin(e.timer * e.freq) * e.amp;
                break;
            case 'bomber':
                e.y += e.speed;
                break;
            case 'shield':
                e.y += e.speed;
                break;
            case 'boss':
                if (e.entering) {
                    e.y += 1;
                    if (e.y >= e.targetY) { e.entering = false; }
                } else {
                    e.phaseTimer++;
                    if (e.phaseTimer > 180) { e.phase++; e.phaseTimer = 0; }
                    e.targetX = W / 2 + Math.sin(e.timer * 0.01) * 120;
                    e.x = lerp(e.x, e.targetX, 0.02);
                    e.y = e.targetY + Math.sin(e.timer * 0.02) * 20;
                }
                break;
        }

        // Enemy fire
        if (e.y > 0 && e.y < H - 50) {
            e.fireTimer--;
            const rate = e.type === 'boss' ? Math.max(15, 40 - wave) : Math.max(40, 120 - wave * 5);
            if (e.fireTimer <= 0) {
                enemyFire(e);
                e.fireTimer = rate;
            }
        }

        // Off screen
        if (e.y > H + 50 && e.type !== 'boss') {
            enemies.splice(i, 1);
        }
    }

    // ── Enemy Bullets ──
    for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.y > H + 10 || b.y < -10 || b.x < -10 || b.x > W + 10) {
            enemyBullets.splice(i, 1);
        }
    }

    // ── Powerups ──
    for (let i = powerups.length - 1; i >= 0; i--) {
        const p = powerups[i];
        p.y += p.vy;
        p.timer++;
        if (p.y > H + 20) { powerups.splice(i, 1); continue; }
        if (dist(p, player) < p.radius + 16) {
            collectPowerup(p);
            powerups.splice(i, 1);
        }
    }

    // ── Collision: Player Bullets vs Enemies ──
    for (let i = playerBullets.length - 1; i >= 0; i--) {
        const b = playerBullets[i];
        for (let j = enemies.length - 1; j >= 0; j--) {
            const e = enemies[j];
            if (!e.alive) continue;
            if (dist(b, e) < e.radius + b.r) {
                e.hp--;
                playerBullets.splice(i, 1);
                spawnParticles(b.x, b.y, 3, '#0ff', 1);
                if (e.hp <= 0) {
                    killEnemy(e);
                }
                break;
            }
        }
    }

    // ── Collision: Enemy Bullets vs Player ──
    if (invulnTimer <= 0 && bombTimer <= 0) {
        for (let i = enemyBullets.length - 1; i >= 0; i--) {
            const b = enemyBullets[i];
            if (dist(b, player) < PLAYER_HITBOX + b.r) {
                enemyBullets.splice(i, 1);
                hitPlayer();
                break;
            }
        }
    }

    // ── Collision: Enemies vs Player ──
    if (invulnTimer <= 0 && bombTimer <= 0) {
        for (const e of enemies) {
            if (!e.alive) continue;
            if (dist(e, player) < PLAYER_HITBOX + e.radius * 0.5) {
                hitPlayer();
                break;
            }
        }
    }

    // ── Particles ──
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        p.vx *= 0.96; p.vy *= 0.96;
        p.life--;
        if (p.life <= 0) particles.splice(i, 1);
    }
}

// ── Draw Functions ──
function drawGlow(x, y, r, color, intensity) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, color);
    g.addColorStop(1, 'transparent');
    ctx.globalAlpha = intensity;
    ctx.fillStyle = g;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
    ctx.globalAlpha = 1;
}

function drawPlayer() {
    if (invulnTimer > 0 && Math.floor(invulnTimer / 3) % 2) return;

    const x = player.x, y = player.y;
    ctx.save();
    ctx.translate(x, y);

    const spr = GameSprites.get('player');
    if (spr) {
        // Animated engine glow (additive feel)
        drawGlow(0, 14, 20, '#0af', 0.3 + Math.sin(frame * 0.3) * 0.1);
        // Animated flame extension beyond sprite
        ctx.fillStyle = '#0cf';
        ctx.globalAlpha = 0.5;
        const flameExt = Math.sin(frame * 0.5) * 4;
        ctx.beginPath();
        ctx.moveTo(-4, 18);
        ctx.lineTo(0, 22 + flameExt);
        ctx.lineTo(4, 18);
        ctx.fill();
        ctx.globalAlpha = 1;
        // Draw sprite
        ctx.drawImage(spr, -24, -24, 48, 48);
    } else {
        // Fallback: original procedural drawing
        drawGlow(0, 14, 20, '#0af', 0.3 + Math.sin(frame * 0.3) * 0.1);
        ctx.fillStyle = '#0cf';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.moveTo(-5, 10);
        ctx.lineTo(0, 18 + Math.sin(frame * 0.5) * 4);
        ctx.lineTo(5, 10);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#aaddff';
        ctx.strokeStyle = '#0af';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -14); ctx.lineTo(-12, 10); ctx.lineTo(-8, 14);
        ctx.lineTo(8, 14); ctx.lineTo(12, 10);
        ctx.closePath(); ctx.fill(); ctx.stroke();
        ctx.fillStyle = '#0cf';
        ctx.beginPath();
        ctx.moveTo(0, -8); ctx.lineTo(-4, 2); ctx.lineTo(4, 2);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#88bbee';
        ctx.beginPath();
        ctx.moveTo(-8, 5); ctx.lineTo(-18, 12); ctx.lineTo(-10, 14);
        ctx.closePath(); ctx.fill();
        ctx.beginPath();
        ctx.moveTo(8, 5); ctx.lineTo(18, 12); ctx.lineTo(10, 14);
        ctx.closePath(); ctx.fill();
    }

    // Shield (always drawn on top, animated)
    if (playerShield) {
        ctx.strokeStyle = '#0ff';
        ctx.globalAlpha = 0.4 + Math.sin(frame * 0.1) * 0.2;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(0, 0, 22, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    // Hitbox (slow mode)
    const isSlow = keys['ShiftLeft'] || keys['ShiftRight'];
    if (isSlow) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(0, 0, PLAYER_HITBOX, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 0.3;
        ctx.beginPath();
        ctx.arc(0, 0, PLAYER_HITBOX + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    ctx.restore();
}

function drawEnemy(e) {
    ctx.save();
    ctx.translate(e.x, e.y);

    // HP bar for bosses / shield
    if (e.type === 'boss' || e.type === 'shield') {
        const bw = e.radius * 2;
        const bh = 3;
        const by = -e.radius - 8;
        ctx.fillStyle = '#333';
        ctx.fillRect(-bw / 2, by, bw, bh);
        ctx.fillStyle = e.type === 'boss' ? '#ff2244' : '#4488ff';
        ctx.fillRect(-bw / 2, by, bw * (e.hp / e.maxHp), bh);
    }

    // Glow
    drawGlow(0, 0, e.radius + 8, e.color, 0.2);

    const spriteMap = {
        basic: 'enemyBasic',
        zigzag: 'enemyZigzag',
        bomber: 'enemyBomber',
        shield: 'enemyShield',
        boss: 'boss'
    };
    const spr = GameSprites.get(spriteMap[e.type]);

    if (spr && e.type === 'basic') {
        ctx.drawImage(spr, -20, -20, 40, 40);
    } else if (spr && e.type === 'zigzag') {
        ctx.save();
        ctx.rotate(e.timer * 0.05);
        ctx.drawImage(spr, -18, -18, 36, 36);
        ctx.restore();
    } else if (spr && e.type === 'bomber') {
        ctx.drawImage(spr, -22, -22, 44, 44);
    } else if (spr && e.type === 'shield') {
        // Dynamic shield ring (fades with HP)
        ctx.strokeStyle = '#66aaff';
        ctx.lineWidth = 3;
        ctx.globalAlpha = 0.4 + (e.hp / e.maxHp) * 0.6;
        ctx.beginPath();
        ctx.arc(0, 0, e.radius + 4, 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
        ctx.drawImage(spr, -24, -24, 48, 48);
    } else if (spr && e.type === 'boss') {
        // Animated core glow
        ctx.fillStyle = '#ff4466';
        ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.3;
        ctx.beginPath();
        ctx.arc(0, 5, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
        ctx.drawImage(spr, -44, -44, 88, 88);
    } else {
        // Fallback: original procedural drawing
        switch (e.type) {
            case 'basic':
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(0, e.radius);
                ctx.lineTo(-e.radius, -e.radius * 0.6);
                ctx.lineTo(0, -e.radius * 0.3);
                ctx.lineTo(e.radius, -e.radius * 0.6);
                ctx.closePath();
                ctx.fill();
                ctx.strokeStyle = '#ff8899'; ctx.lineWidth = 1; ctx.stroke();
                break;
            case 'zigzag':
                ctx.fillStyle = e.color;
                ctx.beginPath();
                for (let i = 0; i < 6; i++) {
                    const a = (Math.PI * 2 / 6) * i - Math.PI / 2 + e.timer * 0.05;
                    ctx.lineTo(Math.cos(a) * e.radius, Math.sin(a) * e.radius);
                }
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = '#ffbb66'; ctx.lineWidth = 1; ctx.stroke();
                break;
            case 'bomber':
                ctx.fillStyle = e.color;
                ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = '#220033';
                ctx.beginPath(); ctx.arc(0, 0, e.radius * 0.5, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#ee88ff'; ctx.lineWidth = 1.5;
                ctx.beginPath(); ctx.arc(0, 0, e.radius, 0, Math.PI * 2); ctx.stroke();
                break;
            case 'shield':
                ctx.strokeStyle = '#66aaff'; ctx.lineWidth = 3;
                ctx.globalAlpha = 0.4 + (e.hp / e.maxHp) * 0.6;
                ctx.beginPath(); ctx.arc(0, 0, e.radius + 4, 0, Math.PI * 2); ctx.stroke();
                ctx.globalAlpha = 1;
                ctx.fillStyle = e.color;
                ctx.beginPath();
                ctx.moveTo(0, e.radius); ctx.lineTo(-e.radius, 0);
                ctx.lineTo(0, -e.radius); ctx.lineTo(e.radius, 0);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = '#88ccff'; ctx.lineWidth = 1; ctx.stroke();
                break;
            case 'boss':
                ctx.fillStyle = '#881122';
                ctx.beginPath();
                ctx.moveTo(0, -e.radius);
                ctx.lineTo(-e.radius * 0.8, -e.radius * 0.3);
                ctx.lineTo(-e.radius, e.radius * 0.5);
                ctx.lineTo(-e.radius * 0.4, e.radius);
                ctx.lineTo(e.radius * 0.4, e.radius);
                ctx.lineTo(e.radius, e.radius * 0.5);
                ctx.lineTo(e.radius * 0.8, -e.radius * 0.3);
                ctx.closePath(); ctx.fill();
                ctx.strokeStyle = e.color; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = '#ff4466';
                ctx.globalAlpha = 0.6 + Math.sin(frame * 0.1) * 0.3;
                ctx.beginPath(); ctx.arc(0, 5, 10, 0, Math.PI * 2); ctx.fill();
                ctx.globalAlpha = 1;
                ctx.fillStyle = '#ff0033';
                ctx.beginPath();
                ctx.arc(-10, -8, 4, 0, Math.PI * 2);
                ctx.arc(10, -8, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#662233';
                ctx.fillRect(-e.radius - 4, -5, 8, 20);
                ctx.fillRect(e.radius - 4, -5, 8, 20);
                break;
        }
    }
    ctx.restore();
}

function drawBullets() {
    // Player bullets
    const pbSpr = GameSprites.get('playerBullet');
    for (const b of playerBullets) {
        if (pbSpr) {
            ctx.drawImage(pbSpr, b.x - 8, b.y - 8, 16, 16);
        } else {
            drawGlow(b.x, b.y, 8, '#0ff', 0.3);
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r * 0.5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // Enemy bullet sprite lookup
    const eBulletMap = {
        '#ff4488': 'eBulletRed',
        '#ffaa44': 'eBulletOrange',
        '#cc66ff': 'eBulletPurple',
        '#6688ff': 'eBulletBlue',
        '#ff2266': 'eBulletBossA',
        '#ff4488': 'eBulletRed',
        '#ff6644': 'eBulletBossC',
        '#ff2288': 'eBulletBossD'
    };

    // Enemy bullets
    for (const b of enemyBullets) {
        const c = b.color || '#ff4488';
        const ebName = eBulletMap[c];
        const ebSpr = ebName ? GameSprites.get(ebName) : null;
        if (ebSpr) {
            ctx.drawImage(ebSpr, b.x - 10, b.y - 10, 20, 20);
        } else {
            drawGlow(b.x, b.y, 10, c, 0.25);
            ctx.fillStyle = c;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.globalAlpha = 0.7;
            ctx.beginPath();
            ctx.arc(b.x, b.y, b.r * 0.4, 0, Math.PI * 2);
            ctx.fill();
            ctx.globalAlpha = 1;
        }
    }
}

function drawPowerups() {
    const puMap = {
        power: 'powerWeapon',
        speed: 'powerSpeed',
        shield: 'powerShield',
        bomb: 'powerBomb'
    };
    for (const p of powerups) {
        const pulse = Math.sin(p.timer * 0.15) * 3;
        const puSpr = GameSprites.get(puMap[p.type]);
        let color;
        switch (p.type) {
            case 'power': color = '#ff4444'; break;
            case 'speed': color = '#44ff44'; break;
            case 'shield': color = '#4444ff'; break;
            case 'bomb': color = '#ffff44'; break;
        }
        if (puSpr) {
            // Animated pulse ring around sprite
            ctx.strokeStyle = color;
            ctx.lineWidth = 1.5;
            ctx.globalAlpha = 0.5 + Math.sin(p.timer * 0.15) * 0.3;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius + pulse + 4, 0, Math.PI * 2);
            ctx.stroke();
            ctx.globalAlpha = 1;
            const sz = 32 + pulse * 0.5;
            ctx.drawImage(puSpr, p.x - sz / 2, p.y - sz / 2, sz, sz);
        } else {
            drawGlow(p.x, p.y, 16, color, 0.3);
            ctx.strokeStyle = color;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius + pulse, 0, Math.PI * 2);
            ctx.stroke();
            ctx.fillStyle = color;
            ctx.font = 'bold 12px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            let label;
            switch (p.type) {
                case 'power': label = 'P'; break;
                case 'speed': label = 'S'; break;
                case 'shield': label = 'D'; break;
                case 'bomb': label = 'B'; break;
            }
            ctx.fillText(label, p.x, p.y);
        }
    }
}

function drawParticles() {
    for (const p of particles) {
        ctx.globalAlpha = p.life / p.maxLife;
        ctx.fillStyle = p.color;
        ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
}

function drawHUD() {
    // Score
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 16px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`점수: ${score}`, 10, 25);

    // Multiplier
    if (multiplier > 1) {
        ctx.fillStyle = '#ff0';
        ctx.fillText(`x${multiplier.toFixed(1)}`, 10, 45);
    }

    // Wave
    ctx.fillStyle = '#aaa';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(`웨이브 ${wave}`, W / 2, 20);

    // Boss warning
    if (wave % 5 === 0 && bossActive) {
        ctx.fillStyle = '#f22';
        ctx.globalAlpha = 0.5 + Math.sin(frame * 0.15) * 0.5;
        ctx.font = 'bold 14px monospace';
        ctx.fillText('!! 보스 출현 !!', W / 2, 40);
        ctx.globalAlpha = 1;
    }

    // Lives
    ctx.textAlign = 'right';
    for (let i = 0; i < lives; i++) {
        ctx.fillStyle = '#0cf';
        ctx.beginPath();
        const lx = W - 20 - i * 22;
        ctx.moveTo(lx, 12);
        ctx.lineTo(lx - 7, 24);
        ctx.lineTo(lx + 7, 24);
        ctx.closePath();
        ctx.fill();
    }

    // Bombs
    ctx.fillStyle = '#ff0';
    ctx.font = '13px monospace';
    ctx.textAlign = 'right';
    ctx.fillText('💣'.repeat(bombs), W - 10, 42);

    // Power level
    ctx.fillStyle = '#0ff';
    ctx.font = '12px monospace';
    ctx.textAlign = 'left';
    const pwrNames = ['기본', '더블', '트리플', '확산'];
    ctx.fillText(`화력: ${pwrNames[powerLevel]}`, 10, H - 10);

    // Best score
    ctx.fillStyle = '#888';
    ctx.font = '11px monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`최고: ${bestScore}`, W - 10, H - 10);

    // Wave announcement
    if (waveDelay > 40) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = (waveDelay - 40) / 50;
        ctx.font = 'bold 28px monospace';
        ctx.textAlign = 'center';
        if (wave % 5 === 0) {
            ctx.fillStyle = '#f44';
            ctx.fillText(`웨이브 ${wave} - 보스!`, W / 2, H / 2 - 20);
        } else {
            ctx.fillText(`웨이브 ${wave}`, W / 2, H / 2 - 20);
        }
        ctx.globalAlpha = 1;
    }
}

function drawTitle() {
    // Title background effects
    ctx.fillStyle = '#0af';
    ctx.globalAlpha = 0.05;
    for (let i = 0; i < 5; i++) {
        const r = 100 + Math.sin(frame * 0.02 + i) * 50;
        ctx.beginPath();
        ctx.arc(W / 2, H / 2 - 80, r, 0, Math.PI * 2);
        ctx.fill();
    }
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#0cf';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('스타 스트라이커', W / 2, H / 2 - 80);

    ctx.fillStyle = '#88ccff';
    ctx.font = '14px monospace';
    ctx.fillText('STAR STRIKER', W / 2, H / 2 - 50);

    // Draw demo ship
    const titleSpr = GameSprites.get('player');
    if (titleSpr) {
        ctx.drawImage(titleSpr, W / 2 - 48, H / 2 - 38, 96, 96);
    } else {
        ctx.save();
        ctx.translate(W / 2, H / 2 + 10);
        ctx.scale(2, 2);
        ctx.fillStyle = '#aaddff';
        ctx.beginPath();
        ctx.moveTo(0, -14); ctx.lineTo(-12, 10); ctx.lineTo(-8, 14);
        ctx.lineTo(8, 14); ctx.lineTo(12, 10);
        ctx.closePath(); ctx.fill();
        ctx.fillStyle = '#0cf';
        ctx.beginPath();
        ctx.moveTo(0, -8); ctx.lineTo(-4, 2); ctx.lineTo(4, 2);
        ctx.closePath(); ctx.fill();
        ctx.restore();
    }

    ctx.fillStyle = '#fff';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.5;
    ctx.font = '16px monospace';
    ctx.fillText('터치 또는 스페이스바로 시작', W / 2, H / 2 + 100);
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#888';
    ctx.font = '12px monospace';
    ctx.fillText('이동: WASD / 화살표 | 폭탄: X / 더블탭', W / 2, H / 2 + 140);
    ctx.fillText('Shift: 저속 이동 (히트박스 표시)', W / 2, H / 2 + 160);

    if (bestScore > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = '14px monospace';
        ctx.fillText(`최고 점수: ${bestScore}`, W / 2, H / 2 + 200);
    }
}

function drawGameOver() {
    ctx.fillStyle = '#000';
    ctx.globalAlpha = 0.7;
    ctx.fillRect(0, 0, W, H);
    ctx.globalAlpha = 1;

    ctx.fillStyle = '#f44';
    ctx.font = 'bold 32px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('게임 오버', W / 2, H / 2 - 60);

    ctx.fillStyle = '#fff';
    ctx.font = '18px monospace';
    ctx.fillText(`최종 점수: ${score}`, W / 2, H / 2 - 15);
    ctx.fillText(`도달 웨이브: ${wave}`, W / 2, H / 2 + 15);

    if (score >= bestScore && score > 0) {
        ctx.fillStyle = '#ff0';
        ctx.font = 'bold 16px monospace';
        ctx.fillText('새로운 최고 기록!', W / 2, H / 2 + 50);
    }

    ctx.fillStyle = '#aaa';
    ctx.globalAlpha = 0.5 + Math.sin(frame * 0.08) * 0.5;
    ctx.font = '14px monospace';
    ctx.fillText('터치 또는 스페이스바로 재시작', W / 2, H / 2 + 90);
    ctx.globalAlpha = 1;
}

// ── Main Draw ──
function draw() {
    ctx.clearRect(0, 0, W, H);

    // Background
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(0, 0, W, H);

    drawStars();

    if (state === 'title') {
        drawTitle();
        return;
    }

    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Bomb flash
    if (bombFlash > 0) {
        ctx.fillStyle = '#fff';
        ctx.globalAlpha = bombFlash / 15 * 0.4;
        ctx.fillRect(0, 0, W, H);
        ctx.globalAlpha = 1;
    }

    // Bomb effect ring
    if (bombTimer > 0) {
        const progress = 1 - bombTimer / BOMB_DURATION;
        ctx.strokeStyle = '#0ff';
        ctx.globalAlpha = 1 - progress;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(player.x, player.y, progress * Math.max(W, H), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
    }

    drawParticles();
    drawPowerups();
    drawBullets();

    for (const e of enemies) {
        if (e.alive) drawEnemy(e);
    }

    drawPlayer();

    ctx.restore();

    drawHUD();

    if (state === 'gameover') drawGameOver();
}

// ── Game Loop ──
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}
GameSprites.init();
loop();
</script>
