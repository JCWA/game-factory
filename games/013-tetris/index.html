<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>테트리스</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  color: #e0e0e0;
  font-family: 'Segoe UI', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

#game-container {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  position: relative;
}

.side-panel {
  width: 100px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.panel-box {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  padding: 8px;
  text-align: center;
}

.panel-box h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #888;
  margin-bottom: 6px;
}

.mini-grid {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 50px;
}

.mini-grid canvas {
  display: block;
}

#board-wrapper {
  position: relative;
  border: 2px solid rgba(255,255,255,0.15);
  border-radius: 4px;
  overflow: hidden;
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

#board-canvas {
  display: block;
}

.stat-row {
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  padding: 2px 0;
}

.stat-val {
  color: #fff;
  font-weight: bold;
}

#mobile-controls {
  display: none;
  position: fixed;
  bottom: 10px;
  left: 0;
  right: 0;
  justify-content: center;
  gap: 8px;
  padding: 0 10px;
  z-index: 50;
}

.m-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: #fff;
  border-radius: 12px;
  font-size: 22px;
  width: 56px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.m-btn:active { background: rgba(255,255,255,0.25); }
.m-btn.wide { width: 72px; font-size: 14px; font-weight: bold; }

/* Overlay screens */
.overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(10,10,25,0.92);
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 100;
  border-radius: 4px;
}

.overlay h1 {
  font-size: 32px;
  margin-bottom: 12px;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.overlay p {
  font-size: 14px;
  color: #aaa;
  margin: 4px 0;
}

.overlay .big-stat {
  font-size: 22px;
  color: #fff;
  font-weight: bold;
  margin: 2px 0;
}

.overlay button {
  margin-top: 18px;
  padding: 12px 36px;
  font-size: 16px;
  background: linear-gradient(135deg, #00d2ff, #7b2ff7);
  border: none;
  color: #fff;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
}
.overlay button:hover { opacity: 0.9; }

.overlay .controls-hint {
  margin-top: 16px;
  font-size: 11px;
  color: #666;
  line-height: 1.6;
  text-align: center;
}

/* Line clear flash */
@keyframes lineFlash {
  0% { background: #fff; }
  100% { background: transparent; }
}

/* Responsive */
@media (max-width: 600px) {
  #game-container { gap: 6px; transform: scale(0.85); transform-origin: top center; }
  .side-panel { width: 70px; }
  .panel-box { padding: 5px; }
  .panel-box h3 { font-size: 9px; }
  .stat-row { font-size: 11px; }
  #mobile-controls { display: flex; }
  body { align-items: flex-start; padding-top: 10px; }
}

@media (max-width: 400px) {
  #game-container { transform: scale(0.7); }
}
</style>
</head>
<body>

<div id="game-container">
  <!-- Left panel: Hold -->
  <div class="side-panel">
    <div class="panel-box">
      <h3>홀드</h3>
      <div class="mini-grid"><canvas id="hold-canvas" width="80" height="60"></canvas></div>
    </div>
    <div class="panel-box">
      <div class="stat-row"><span>점수</span><span class="stat-val" id="score-display">0</span></div>
      <div class="stat-row"><span>최고</span><span class="stat-val" id="best-display">0</span></div>
      <div class="stat-row"><span>레벨</span><span class="stat-val" id="level-display">1</span></div>
      <div class="stat-row"><span>라인</span><span class="stat-val" id="lines-display">0</span></div>
    </div>
  </div>

  <!-- Board -->
  <div id="board-wrapper">
    <canvas id="board-canvas"></canvas>
    <!-- Start overlay -->
    <div class="overlay" id="start-screen">
      <h1>테트리스</h1>
      <p>클래식 블록 퍼즐 게임</p>
      <button onclick="game.start()">게임 시작</button>
      <div class="controls-hint">
        ← → 이동 | ↑ 회전 | ↓ 소프트드롭<br>
        스페이스 하드드롭 | C 홀드 | P 일시정지
      </div>
    </div>
    <!-- Pause overlay -->
    <div class="overlay" id="pause-screen" style="display:none">
      <h1>일시정지</h1>
      <p>P 또는 버튼을 눌러 계속</p>
      <button onclick="game.togglePause()">계속하기</button>
    </div>
    <!-- Game over overlay -->
    <div class="overlay" id="gameover-screen" style="display:none">
      <h1>게임 오버</h1>
      <p>점수</p><div class="big-stat" id="go-score">0</div>
      <p>라인</p><div class="big-stat" id="go-lines">0</div>
      <p>레벨</p><div class="big-stat" id="go-level">1</div>
      <p id="go-best-msg" style="color:#7b2ff7;font-weight:bold;margin-top:6px;display:none">신기록!</p>
      <button onclick="game.start()">다시 시작</button>
    </div>
  </div>

  <!-- Right panel: Next -->
  <div class="side-panel">
    <div class="panel-box">
      <h3>다음</h3>
      <canvas id="next-canvas" width="80" height="180"></canvas>
    </div>
    <div class="panel-box" style="margin-top:auto">
      <button class="m-btn wide" onclick="game.togglePause()" style="width:100%;border-radius:6px;height:36px;font-size:12px;">일시정지</button>
    </div>
  </div>
</div>

<!-- Mobile controls -->
<div id="mobile-controls">
  <div class="m-btn" ontouchstart="game.moveLeft()" onclick="game.moveLeft()">&#9664;</div>
  <div class="m-btn" ontouchstart="game.softDrop()" onclick="game.softDrop()">&#9660;</div>
  <div class="m-btn" ontouchstart="game.rotate(1)" onclick="game.rotate(1)">&#8635;</div>
  <div class="m-btn" ontouchstart="game.hardDrop()" onclick="game.hardDrop()">&#9650;</div>
  <div class="m-btn" ontouchstart="game.moveRight()" onclick="game.moveRight()">&#9654;</div>
  <div class="m-btn wide" ontouchstart="game.hold()" onclick="game.hold()">홀드</div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 28;
const COLORS = {
  I: '#00f0f0', O: '#f0f000', T: '#a000f0',
  S: '#00f000', Z: '#f00000', J: '#0000f0', L: '#f0a000'
};

// --- Canvas Sprite Generator ---
const GameSprites = (function() {
  const sprites = {};      // type -> offscreen canvas (block)
  const ghostSprites = {}; // type -> offscreen canvas (ghost)
  let gridBg = null;       // full-board grid background
  let lockFlash = null;    // lock flash overlay for one cell
  let ready = false;

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return { r, g, b };
  }

  function createBlockSprite(color, size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const rgb = hexToRgb(color);
    const margin = 1;
    const inner = size - margin * 2;

    // Base fill with gradient
    const grad = ctx.createLinearGradient(margin, margin, margin + inner, margin + inner);
    grad.addColorStop(0, `rgba(${Math.min(rgb.r+40,255)},${Math.min(rgb.g+40,255)},${Math.min(rgb.b+40,255)},1)`);
    grad.addColorStop(0.5, color);
    grad.addColorStop(1, `rgba(${Math.max(rgb.r-40,0)},${Math.max(rgb.g-40,0)},${Math.max(rgb.b-40,0)},1)`);
    ctx.fillStyle = grad;
    ctx.fillRect(margin, margin, inner, inner);

    // Top-left highlight bevel
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(margin, margin, inner, 3);
    ctx.fillRect(margin, margin, 3, inner);
    // Secondary softer highlight
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(margin + 3, margin, inner - 3, 2);
    ctx.fillRect(margin, margin + 3, 2, inner - 3);

    // Bottom-right shadow bevel
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    ctx.fillRect(margin, margin + inner - 3, inner, 3);
    ctx.fillRect(margin + inner - 3, margin, 3, inner);
    // Secondary softer shadow
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(margin + 1, margin + inner - 5, inner - 1, 2);
    ctx.fillRect(margin + inner - 5, margin + 1, 2, inner - 1);

    // Inner line detail (subtle inset border)
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.strokeRect(margin + 4.5, margin + 4.5, inner - 9, inner - 9);

    // Glossy top reflection
    const glossGrad = ctx.createLinearGradient(margin, margin, margin, margin + inner * 0.45);
    glossGrad.addColorStop(0, 'rgba(255,255,255,0.18)');
    glossGrad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = glossGrad;
    ctx.fillRect(margin + 3, margin + 3, inner - 6, inner * 0.4);

    return c;
  }

  function createGhostSprite(color, size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const rgb = hexToRgb(color);
    const margin = 1;
    const inner = size - margin * 2;

    // Semi-transparent fill
    ctx.globalAlpha = 0.18;
    ctx.fillStyle = color;
    ctx.fillRect(margin, margin, inner, inner);

    // Border outline
    ctx.globalAlpha = 0.4;
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.strokeRect(margin + 0.75, margin + 0.75, inner - 1.5, inner - 1.5);

    // Subtle inner glow
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(margin + 2, margin + 2, inner - 4, inner - 4);

    ctx.globalAlpha = 1;
    return c;
  }

  function createGridBackground(cols, rows, blockSize) {
    const c = document.createElement('canvas');
    c.width = cols * blockSize;
    c.height = rows * blockSize;
    const ctx = c.getContext('2d');

    // Dark background
    ctx.fillStyle = '#0f0f23';
    ctx.fillRect(0, 0, c.width, c.height);

    // Subtle cell pattern - alternating darkness
    for (let r = 0; r < rows; r++) {
      for (let col = 0; col < cols; col++) {
        if ((r + col) % 2 === 0) {
          ctx.fillStyle = 'rgba(255,255,255,0.008)';
          ctx.fillRect(col * blockSize, r * blockSize, blockSize, blockSize);
        }
      }
    }

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let x = 1; x < cols; x++) {
      ctx.beginPath();
      ctx.moveTo(x * blockSize + 0.5, 0);
      ctx.lineTo(x * blockSize + 0.5, rows * blockSize);
      ctx.stroke();
    }
    for (let y = 1; y < rows; y++) {
      ctx.beginPath();
      ctx.moveTo(0, y * blockSize + 0.5);
      ctx.lineTo(cols * blockSize, y * blockSize + 0.5);
      ctx.stroke();
    }

    return c;
  }

  function createLockFlash(size) {
    const c = document.createElement('canvas');
    c.width = size; c.height = size;
    const ctx = c.getContext('2d');
    const cx = size / 2, cy = size / 2;

    // Radial white glow
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.7);
    grad.addColorStop(0, 'rgba(255,255,255,0.9)');
    grad.addColorStop(0.4, 'rgba(255,255,255,0.5)');
    grad.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, size, size);

    return c;
  }

  return {
    ready: false,

    init: function() {
      // Generate block sprites for each tetromino type
      const types = Object.keys(COLORS);
      for (const type of types) {
        sprites[type] = createBlockSprite(COLORS[type], BLOCK);
        ghostSprites[type] = createGhostSprite(COLORS[type], BLOCK);
      }
      // Grid background
      gridBg = createGridBackground(COLS, ROWS, BLOCK);
      // Lock flash
      lockFlash = createLockFlash(BLOCK);
      this.ready = true;
    },

    getBlock: function(type) { return sprites[type] || null; },
    getGhost: function(type) { return ghostSprites[type] || null; },
    getGrid: function() { return gridBg; },
    getLockFlash: function() { return lockFlash; },

    // Draw a mini block at pixel coords for hold/next panels
    drawMiniBlock: function(ctx, px, py, type, size) {
      const sprite = sprites[type];
      if (sprite) {
        ctx.drawImage(sprite, 0, 0, BLOCK, BLOCK, px, py, size, size);
      } else {
        // fallback
        ctx.fillStyle = COLORS[type];
        ctx.fillRect(px + 1, py + 1, size - 2, size - 2);
      }
    }
  };
})();

const SHAPES = {
  I: [[0,0],[1,0],[2,0],[3,0]],
  O: [[0,0],[1,0],[0,1],[1,1]],
  T: [[0,0],[1,0],[2,0],[1,1]],
  S: [[1,0],[2,0],[0,1],[1,1]],
  Z: [[0,0],[1,0],[1,1],[2,1]],
  J: [[0,0],[0,1],[1,1],[2,1]],
  L: [[2,0],[0,1],[1,1],[2,1]]
};

// SRS kick data (simplified)
const KICK_DATA = [
  [0,0],[-1,0],[1,0],[0,-1],[-1,-1],[1,-1],[-2,0],[2,0]
];
const KICK_DATA_I = [
  [0,0],[-2,0],[2,0],[1,0],[-1,0],[0,-1],[0,1]
];

const boardCanvas = document.getElementById('board-canvas');
const bCtx = boardCanvas.getContext('2d');
boardCanvas.width = COLS * BLOCK;
boardCanvas.height = ROWS * BLOCK;

const holdCanvas = document.getElementById('hold-canvas');
const hCtx = holdCanvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nCtx = nextCanvas.getContext('2d');

const game = {
  board: [],
  current: null,
  currentType: '',
  currentX: 0,
  currentY: 0,
  rotation: 0,
  holdPiece: null,
  holdUsed: false,
  bag: [],
  nextPieces: [],
  score: 0,
  bestScore: parseInt(localStorage.getItem('tetris-best') || '0'),
  lines: 0,
  level: 1,
  running: false,
  paused: false,
  gameOver: false,
  dropInterval: 1000,
  lastDrop: 0,
  lockDelay: 500,
  lockTimer: null,
  clearingLines: [],
  clearAnimFrame: 0,
  lastTSpin: false,
  animationId: null,

  init() {
    document.getElementById('best-display').textContent = this.bestScore;
    this.setupInput();
  },

  start() {
    this.board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    this.score = 0;
    this.lines = 0;
    this.level = 1;
    this.dropInterval = 1000;
    this.holdPiece = null;
    this.holdUsed = false;
    this.bag = [];
    this.nextPieces = [];
    this.gameOver = false;
    this.paused = false;
    this.running = true;
    this.clearingLines = [];
    this.lastTSpin = false;

    // Fill next pieces
    for (let i = 0; i < 3; i++) this.nextPieces.push(this.getFromBag());
    this.spawnPiece();

    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('gameover-screen').style.display = 'none';
    document.getElementById('pause-screen').style.display = 'none';
    this.updateStats();
    this.lastDrop = performance.now();
    if (this.animationId) cancelAnimationFrame(this.animationId);
    this.loop(performance.now());
  },

  getFromBag() {
    if (this.bag.length === 0) {
      this.bag = Object.keys(SHAPES).slice();
      // Fisher-Yates shuffle
      for (let i = this.bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [this.bag[i], this.bag[j]] = [this.bag[j], this.bag[i]];
      }
    }
    return this.bag.pop();
  },

  spawnPiece() {
    this.currentType = this.nextPieces.shift();
    this.nextPieces.push(this.getFromBag());
    this.rotation = 0;
    this.current = this.getRotatedShape(this.currentType, 0);
    this.holdUsed = false;
    this.lastTSpin = false;

    // Center piece
    const minX = Math.min(...this.current.map(b => b[0]));
    const maxX = Math.max(...this.current.map(b => b[0]));
    const w = maxX - minX + 1;
    this.currentX = Math.floor((COLS - w) / 2) - minX;
    this.currentY = -1;

    if (!this.isValid(this.current, this.currentX, this.currentY)) {
      this.currentY = -2;
      if (!this.isValid(this.current, this.currentX, this.currentY)) {
        this.endGame();
      }
    }
    this.drawNext();
    this.drawHold();
  },

  getRotatedShape(type, rot) {
    let shape = SHAPES[type].map(b => [...b]);
    for (let r = 0; r < rot; r++) {
      // Find bounding box
      const maxCoord = type === 'I' ? 3 : (type === 'O' ? 1 : 2);
      shape = shape.map(([x, y]) => [maxCoord - y, x]);
    }
    // Normalize to 0,0
    const minX = Math.min(...shape.map(b => b[0]));
    const minY = Math.min(...shape.map(b => b[1]));
    return shape.map(([x, y]) => [x - minX, y - minY]);
  },

  isValid(blocks, ox, oy) {
    for (const [bx, by] of blocks) {
      const x = ox + bx, y = oy + by;
      if (x < 0 || x >= COLS || y >= ROWS) return false;
      if (y >= 0 && this.board[y][x]) return false;
    }
    return true;
  },

  moveLeft() {
    if (!this.running || this.paused || this.gameOver) return;
    if (this.isValid(this.current, this.currentX - 1, this.currentY)) {
      this.currentX--;
      this.lastTSpin = false;
      this.resetLockIfOnGround();
    }
  },

  moveRight() {
    if (!this.running || this.paused || this.gameOver) return;
    if (this.isValid(this.current, this.currentX + 1, this.currentY)) {
      this.currentX++;
      this.lastTSpin = false;
      this.resetLockIfOnGround();
    }
  },

  rotate(dir) {
    if (!this.running || this.paused || this.gameOver) return;
    if (this.currentType === 'O') return;

    const newRot = (this.rotation + dir + 4) % 4;
    const newShape = this.getRotatedShape(this.currentType, newRot);
    const kicks = this.currentType === 'I' ? KICK_DATA_I : KICK_DATA;

    for (const [kx, ky] of kicks) {
      if (this.isValid(newShape, this.currentX + kx, this.currentY + ky)) {
        this.currentX += kx;
        this.currentY += ky;
        this.current = newShape;
        this.rotation = newRot;

        // T-spin detection
        if (this.currentType === 'T') {
          this.lastTSpin = this.checkTSpin();
        } else {
          this.lastTSpin = false;
        }
        this.resetLockIfOnGround();
        return;
      }
    }
  },

  checkTSpin() {
    // Check 4 corners of the T piece center
    const cx = this.currentX + 1;
    const cy = this.currentY + (this.rotation === 0 ? 0 : (this.rotation === 2 ? 1 : (this.rotation === 1 ? 1 : 0)));

    // Approximate: T center is at different positions depending on rotation
    // Simplified: check if at least 3 of 4 diagonal cells around center are filled
    let filled = 0;
    const checks = [[-1,-1],[1,-1],[-1,1],[1,1]];
    for (const [dx, dy] of checks) {
      const nx = cx + dx, ny = cy + dy;
      if (nx < 0 || nx >= COLS || ny < 0 || ny >= ROWS || (ny >= 0 && this.board[ny] && this.board[ny][nx])) {
        filled++;
      }
    }
    return filled >= 3;
  },

  softDrop() {
    if (!this.running || this.paused || this.gameOver) return;
    if (this.isValid(this.current, this.currentX, this.currentY + 1)) {
      this.currentY++;
      this.score += 1;
      this.lastTSpin = false;
    }
  },

  hardDrop() {
    if (!this.running || this.paused || this.gameOver) return;
    let dist = 0;
    while (this.isValid(this.current, this.currentX, this.currentY + 1)) {
      this.currentY++;
      dist++;
    }
    this.score += dist * 2;
    this.lockPiece();
  },

  hold() {
    if (!this.running || this.paused || this.gameOver || this.holdUsed) return;
    this.holdUsed = true;
    const prevHold = this.holdPiece;
    this.holdPiece = this.currentType;

    if (prevHold) {
      this.currentType = prevHold;
      this.rotation = 0;
      this.current = this.getRotatedShape(this.currentType, 0);
      const minX = Math.min(...this.current.map(b => b[0]));
      const maxX = Math.max(...this.current.map(b => b[0]));
      const w = maxX - minX + 1;
      this.currentX = Math.floor((COLS - w) / 2) - minX;
      this.currentY = 0;
    } else {
      this.spawnPiece();
    }
    this.drawHold();
  },

  getGhostY() {
    let gy = this.currentY;
    while (this.isValid(this.current, this.currentX, gy + 1)) gy++;
    return gy;
  },

  lockPiece() {
    for (const [bx, by] of this.current) {
      const x = this.currentX + bx;
      const y = this.currentY + by;
      if (y >= 0 && y < ROWS) {
        this.board[y][x] = this.currentType;
      }
    }

    // Check for line clears
    const cleared = [];
    for (let r = ROWS - 1; r >= 0; r--) {
      if (this.board[r].every(c => c !== 0)) {
        cleared.push(r);
      }
    }

    if (cleared.length > 0) {
      this.clearingLines = cleared;
      this.clearAnimFrame = 0;
      // Score
      const baseScores = [0, 100, 300, 500, 800];
      let pts = baseScores[cleared.length] || 800;
      if (this.lastTSpin) {
        pts += cleared.length === 1 ? 700 : cleared.length === 2 ? 1100 : 500;
      }
      this.score += pts * this.level;
      this.lines += cleared.length;
      this.level = Math.floor(this.lines / 10) + 1;
      this.dropInterval = Math.max(50, 1000 - (this.level - 1) * 80);
    } else {
      if (this.lastTSpin) {
        this.score += 400 * this.level; // T-spin no lines bonus
      }
      this.spawnPiece();
    }
    this.lastTSpin = false;
    this.updateStats();
  },

  resetLockIfOnGround() {
    // Reset lock timer if piece is on ground
  },

  endGame() {
    this.running = false;
    this.gameOver = true;
    if (this.animationId) cancelAnimationFrame(this.animationId);

    let isNew = false;
    if (this.score > this.bestScore) {
      this.bestScore = this.score;
      localStorage.setItem('tetris-best', this.bestScore);
      document.getElementById('best-display').textContent = this.bestScore;
      isNew = true;
    }

    document.getElementById('go-score').textContent = this.score.toLocaleString();
    document.getElementById('go-lines').textContent = this.lines;
    document.getElementById('go-level').textContent = this.level;
    document.getElementById('go-best-msg').style.display = isNew ? 'block' : 'none';
    document.getElementById('gameover-screen').style.display = 'flex';
  },

  togglePause() {
    if (!this.running || this.gameOver) return;
    this.paused = !this.paused;
    document.getElementById('pause-screen').style.display = this.paused ? 'flex' : 'none';
    if (!this.paused) {
      this.lastDrop = performance.now();
      this.loop(performance.now());
    }
  },

  updateStats() {
    document.getElementById('score-display').textContent = this.score.toLocaleString();
    document.getElementById('level-display').textContent = this.level;
    document.getElementById('lines-display').textContent = this.lines;
  },

  // Drawing
  drawBlock(ctx, x, y, color, size, alpha, type) {
    const a = alpha || 1;
    ctx.globalAlpha = a;

    if (GameSprites.ready && type && size === BLOCK) {
      const sprite = GameSprites.getBlock(type);
      if (sprite) {
        ctx.drawImage(sprite, x * size, y * size);
        ctx.globalAlpha = 1;
        return;
      }
    }
    // Fallback: plain colored block
    ctx.fillStyle = color;
    ctx.fillRect(x * size + 1, y * size + 1, size - 2, size - 2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(x * size + 1, y * size + 1, size - 2, 3);
    ctx.fillRect(x * size + 1, y * size + 1, 3, size - 2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.fillRect(x * size + 1, y * size + size - 4, size - 2, 3);
    ctx.fillRect(x * size + size - 4, y * size + 1, 3, size - 2);
    ctx.globalAlpha = 1;
  },

  drawBoard() {
    // Grid background (sprite or fallback)
    const gridSprite = GameSprites.ready && GameSprites.getGrid();
    if (gridSprite) {
      bCtx.drawImage(gridSprite, 0, 0);
    } else {
      bCtx.fillStyle = '#0f0f23';
      bCtx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
      bCtx.strokeStyle = 'rgba(255,255,255,0.03)';
      bCtx.lineWidth = 1;
      for (let x = 1; x < COLS; x++) {
        bCtx.beginPath();
        bCtx.moveTo(x * BLOCK, 0);
        bCtx.lineTo(x * BLOCK, ROWS * BLOCK);
        bCtx.stroke();
      }
      for (let y = 1; y < ROWS; y++) {
        bCtx.beginPath();
        bCtx.moveTo(0, y * BLOCK);
        bCtx.lineTo(COLS * BLOCK, y * BLOCK);
        bCtx.stroke();
      }
    }

    // Locked blocks
    const lockFlashSprite = GameSprites.ready && GameSprites.getLockFlash();
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (this.board[r][c]) {
          if (this.clearingLines.includes(r)) {
            // Line clear flash effect
            const flash = Math.sin(this.clearAnimFrame * 0.3) * 0.5 + 0.5;
            this.drawBlock(bCtx, c, r, COLORS[this.board[r][c]], BLOCK, 1, this.board[r][c]);
            if (lockFlashSprite) {
              bCtx.globalAlpha = flash;
              bCtx.drawImage(lockFlashSprite, c * BLOCK, r * BLOCK);
              bCtx.globalAlpha = 1;
            } else {
              bCtx.globalAlpha = flash;
              bCtx.fillStyle = '#ffffff';
              bCtx.fillRect(c * BLOCK, r * BLOCK, BLOCK, BLOCK);
              bCtx.globalAlpha = 1;
            }
          } else {
            this.drawBlock(bCtx, c, r, COLORS[this.board[r][c]], BLOCK, 1, this.board[r][c]);
          }
        }
      }
    }

    if (!this.current || this.gameOver) return;

    // Ghost piece (use ghost sprites)
    const ghostY = this.getGhostY();
    if (ghostY !== this.currentY) {
      const ghostSprite = GameSprites.ready && GameSprites.getGhost(this.currentType);
      for (const [bx, by] of this.current) {
        const x = this.currentX + bx;
        const y = ghostY + by;
        if (y >= 0) {
          if (ghostSprite) {
            bCtx.drawImage(ghostSprite, x * BLOCK, y * BLOCK);
          } else {
            this.drawBlock(bCtx, x, y, COLORS[this.currentType], BLOCK, 0.2);
          }
        }
      }
    }

    // Current piece
    for (const [bx, by] of this.current) {
      const x = this.currentX + bx;
      const y = this.currentY + by;
      if (y >= 0) {
        this.drawBlock(bCtx, x, y, COLORS[this.currentType], BLOCK, 1, this.currentType);
      }
    }
  },

  drawMiniPiece(ctx, type, offsetX, offsetY, size) {
    if (!type) return;
    const shape = SHAPES[type];
    const minX = Math.min(...shape.map(b => b[0]));
    const maxX = Math.max(...shape.map(b => b[0]));
    const minY = Math.min(...shape.map(b => b[1]));
    const maxY = Math.max(...shape.map(b => b[1]));
    const w = maxX - minX + 1;
    const h = maxY - minY + 1;
    const ox = offsetX + (4 - w) * size / 2;
    const oy = offsetY + (2 - h) * size / 2;

    for (const [bx, by] of shape) {
      const px = ox + (bx - minX) * size;
      const py = oy + (by - minY) * size;
      if (GameSprites.ready) {
        GameSprites.drawMiniBlock(ctx, px, py, type, size);
      } else {
        ctx.fillStyle = COLORS[type];
        ctx.fillRect(px + 1, py + 1, size - 2, size - 2);
        ctx.fillStyle = 'rgba(255,255,255,0.2)';
        ctx.fillRect(px + 1, py + 1, size - 2, 2);
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.fillRect(px + 1, py + size - 3, size - 2, 2);
      }
    }
  },

  drawHold() {
    hCtx.clearRect(0, 0, holdCanvas.width, holdCanvas.height);
    if (this.holdPiece) {
      const alpha = this.holdUsed ? 0.4 : 1;
      hCtx.globalAlpha = alpha;
      this.drawMiniPiece(hCtx, this.holdPiece, 0, 10, 18);
      hCtx.globalAlpha = 1;
    }
  },

  drawNext() {
    nCtx.clearRect(0, 0, nextCanvas.width, nextCanvas.height);
    for (let i = 0; i < 3; i++) {
      if (this.nextPieces[i]) {
        this.drawMiniPiece(nCtx, this.nextPieces[i], 0, i * 58 + 5, 18);
      }
    }
  },

  loop(now) {
    if (!this.running || this.paused) return;

    // Line clear animation
    if (this.clearingLines.length > 0) {
      this.clearAnimFrame++;
      if (this.clearAnimFrame > 15) {
        // Remove lines
        for (const row of this.clearingLines.sort((a, b) => a - b)) {
          this.board.splice(row, 1);
          this.board.unshift(Array(COLS).fill(0));
        }
        this.clearingLines = [];
        this.clearAnimFrame = 0;
        this.spawnPiece();
      }
      this.drawBoard();
      this.animationId = requestAnimationFrame(t => this.loop(t));
      return;
    }

    // Gravity
    if (now - this.lastDrop >= this.dropInterval) {
      if (this.isValid(this.current, this.currentX, this.currentY + 1)) {
        this.currentY++;
        this.lastTSpin = false;
      } else {
        this.lockPiece();
      }
      this.lastDrop = now;
    }

    this.drawBoard();
    this.animationId = requestAnimationFrame(t => this.loop(t));
  },

  // Input
  setupInput() {
    // Keyboard
    document.addEventListener('keydown', e => {
      if (e.repeat && !['ArrowDown', 's', 'S'].includes(e.key)) return;

      switch (e.key) {
        case 'ArrowLeft': case 'a': case 'A':
          e.preventDefault(); this.moveLeft(); break;
        case 'ArrowRight': case 'd': case 'D':
          e.preventDefault(); this.moveRight(); break;
        case 'ArrowDown': case 's': case 'S':
          e.preventDefault(); this.softDrop(); break;
        case 'ArrowUp': case 'w': case 'W':
          e.preventDefault();
          if (e.key === 'ArrowUp') this.rotate(1);
          else this.rotate(1);
          break;
        case ' ':
          e.preventDefault(); this.hardDrop(); break;
        case 'c': case 'C':
          e.preventDefault(); this.hold(); break;
        case 'p': case 'P': case 'Escape':
          e.preventDefault(); this.togglePause(); break;
        case 'z': case 'Z':
          e.preventDefault(); this.rotate(-1); break;
        case 'x': case 'X':
          e.preventDefault(); this.rotate(1); break;
      }
    });

    // Touch / Swipe
    let touchStartX = 0, touchStartY = 0, touchStartTime = 0;
    let touchMoved = false;

    const boardEl = document.getElementById('board-wrapper');

    boardEl.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      touchStartX = t.clientX;
      touchStartY = t.clientY;
      touchStartTime = Date.now();
      touchMoved = false;
    }, { passive: false });

    boardEl.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      const dx = t.clientX - touchStartX;
      const dy = t.clientY - touchStartY;
      const threshold = 30;

      if (Math.abs(dx) > threshold && Math.abs(dx) > Math.abs(dy)) {
        touchMoved = true;
        if (dx > 0) this.moveRight(); else this.moveLeft();
        touchStartX = t.clientX;
        touchStartY = t.clientY;
      } else if (dy > threshold && Math.abs(dy) > Math.abs(dx)) {
        touchMoved = true;
        this.softDrop();
        touchStartY = t.clientY;
      } else if (dy < -threshold && Math.abs(dy) > Math.abs(dx)) {
        touchMoved = true;
        this.hardDrop();
        touchStartY = t.clientY;
      }
    }, { passive: false });

    boardEl.addEventListener('touchend', e => {
      e.preventDefault();
      if (!touchMoved && Date.now() - touchStartTime < 300) {
        this.rotate(1);
      }
    }, { passive: false });
  }
};

GameSprites.init();
game.init();
</script>
</body>
</html>
