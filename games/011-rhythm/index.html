<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rhythm Beat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0014;
  color: #fff;
  font-family: 'Arial', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#header {
  display: flex;
  justify-content: space-between;
  width: 340px;
  font-size: 14px;
  padding: 4px 0;
}
.score-val { color: #ff6bdf; font-weight: bold; }
.combo-val { color: #ffd700; font-weight: bold; }
canvas { border-radius: 8px; }
#judge {
  font-size: 28px;
  font-weight: bold;
  min-height: 36px;
  text-align: center;
  transition: opacity 0.3s;
}
.perfect { color: #ffd700; text-shadow: 0 0 15px #ffd700; }
.great { color: #4ade80; text-shadow: 0 0 10px #4ade80; }
.good { color: #38bdf8; }
.miss { color: #ff6b6b; }
#keys-hint {
  font-size: 12px;
  color: #555;
  text-align: center;
}
#overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(10,0,20,0.9);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 10; gap: 16px;
}
#overlay.hidden { display: none; }
#overlay h2 { color: #ff6bdf; font-size: 32px; text-shadow: 0 0 20px #ff6bdf60; }
#overlay p { color: #888; font-size: 13px; text-align: center; line-height: 1.6; }
.obtn {
  background: transparent; color: #ff6bdf; border: 2px solid #ff6bdf;
  padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 6px;
}
.obtn:hover { background: #ff6bdf20; }
#song-select { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
.song-btn {
  background: #1a0030;
  border: 2px solid #333;
  color: #ccc;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  text-align: left;
}
.song-btn:hover { border-color: #ff6bdf; background: #2a0050; }
.song-btn .title { font-weight: bold; color: #ff6bdf; }
.song-btn .info { font-size: 12px; color: #666; margin-top: 4px; }
/* 모바일 키 */
#touch-keys {
  display: none;
  gap: 8px;
  margin-top: 8px;
}
@media (pointer: coarse) { #touch-keys { display: flex; } #keys-hint { display: none; } }
.touch-key {
  width: 70px;
  height: 60px;
  border-radius: 8px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.1s;
}
.touch-key:active { filter: brightness(1.5); }
</style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <span>SCORE: <span class="score-val" id="score">0</span></span>
    <span>COMBO: <span class="combo-val" id="combo">0</span></span>
    <span>MAX: <span class="combo-val" id="max-combo">0</span></span>
  </div>
  <canvas id="game" width="340" height="500"></canvas>
  <div id="judge"></div>
  <div id="keys-hint">D F J K 키로 플레이</div>
  <div id="touch-keys">
    <div class="touch-key" data-lane="0" style="background:#ff6b6b">D</div>
    <div class="touch-key" data-lane="1" style="background:#4ade80">F</div>
    <div class="touch-key" data-lane="2" style="background:#38bdf8">J</div>
    <div class="touch-key" data-lane="3" style="background:#fbbf24">K</div>
  </div>
</div>
<div id="overlay">
  <h2>RHYTHM BEAT</h2>
  <p>음악에 맞춰 떨어지는 노트를 타이밍에 맞게 누르세요!</p>
  <div id="song-select">
    <button class="song-btn" data-song="energetic">
      <div class="title">Energetic Beat</div>
      <div class="info">BPM 140 | 보통</div>
    </button>
    <button class="song-btn" data-song="chill">
      <div class="title">Chill Wave</div>
      <div class="info">BPM 100 | 쉬움</div>
    </button>
    <button class="song-btn" data-song="intense">
      <div class="title">Intense Rush</div>
      <div class="info">BPM 170 | 어려움</div>
    </button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const maxComboEl = document.getElementById('max-combo');
const judgeEl = document.getElementById('judge');
const overlayEl = document.getElementById('overlay');

const LANES = 4;
const LANE_W = W / LANES;
const HIT_Y = H - 60;
const NOTE_H = 20;
const LANE_COLORS = ['#ff6b6b', '#4ade80', '#38bdf8', '#fbbf24'];
const LANE_KEYS = ['d', 'f', 'j', 'k'];

const JUDGE_WINDOWS = [
  { name: 'PERFECT', window: 30, score: 300, class: 'perfect' },
  { name: 'GREAT',   window: 60, score: 200, class: 'great' },
  { name: 'GOOD',    window: 90, score: 100, class: 'good' }
];

// 곡 데이터 (비트 패턴 자동 생성)
const SONGS = {
  chill: { bpm: 100, duration: 45, name: 'Chill Wave', freq: [261.63, 329.63, 392.00, 523.25] },
  energetic: { bpm: 140, duration: 40, name: 'Energetic Beat', freq: [329.63, 392.00, 440.00, 523.25] },
  intense: { bpm: 170, duration: 35, name: 'Intense Rush', freq: [440.00, 523.25, 587.33, 659.25] }
};

let audioCtx, notes, score, combo, maxCombo, startTime, gameState;
let activeKeys = new Set();
let judgeTimeout;
let songData;

// ===== 오디오 =====
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, time, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

  osc.start(time);
  osc.stop(time + duration);
}

function playHitSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ===== 노트 생성 =====
function generateNotes(song) {
  const beatInterval = 60 / song.bpm;
  const totalBeats = Math.floor(song.duration / beatInterval);
  const generated = [];

  for (let i = 0; i < totalBeats; i++) {
    const time = i * beatInterval + 2; // 2초 오프셋

    // 패턴 생성
    if (i % 4 === 0) {
      // 강박: 1~2개 노트
      const lane = Math.floor(Math.random() * LANES);
      generated.push({ lane, time, hit: false, missed: false });
      if (Math.random() < 0.3) {
        const lane2 = (lane + 2) % LANES;
        generated.push({ lane: lane2, time, hit: false, missed: false });
      }
    } else if (i % 2 === 0) {
      // 약박: 60% 확률
      if (Math.random() < 0.6) {
        generated.push({ lane: Math.floor(Math.random() * LANES), time, hit: false, missed: false });
      }
    } else {
      // 16분음표: 난이도에 따라
      const prob = song.bpm >= 160 ? 0.4 : song.bpm >= 130 ? 0.25 : 0.15;
      if (Math.random() < prob) {
        generated.push({ lane: Math.floor(Math.random() * LANES), time, hit: false, missed: false });
      }
    }

    // 음악 재생
    if (i % 2 === 0) {
      const freq = song.freq[i % song.freq.length];
      playNote(freq, audioCtx.currentTime + time, beatInterval * 0.8);
    }
    // 베이스
    if (i % 4 === 0) {
      playNote(song.freq[0] / 2, audioCtx.currentTime + time, beatInterval * 1.5);
    }
    // 하이햇
    if (song.bpm >= 130 || i % 2 === 0) {
      const hihat = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      hihat.connect(hGain);
      hGain.connect(audioCtx.destination);
      hihat.type = 'square';
      hihat.frequency.value = 1200;
      hGain.gain.setValueAtTime(0.02, audioCtx.currentTime + time);
      hGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + 0.03);
      hihat.start(audioCtx.currentTime + time);
      hihat.stop(audioCtx.currentTime + time + 0.03);
    }
  }

  return generated;
}

// ===== 게임 =====
function startGame(songKey) {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  songData = SONGS[songKey];
  notes = generateNotes(songData);
  score = 0;
  combo = 0;
  maxCombo = 0;
  startTime = audioCtx.currentTime;
  gameState = 'playing';
  overlayEl.classList.add('hidden');
  updateUI();
  gameLoop();
}

function getCurrentTime() {
  return audioCtx.currentTime - startTime;
}

function hitLane(lane) {
  if (gameState !== 'playing') return;

  const now = getCurrentTime();
  let bestNote = null, bestDist = Infinity;

  notes.forEach(n => {
    if (n.lane !== lane || n.hit || n.missed) return;
    const dist = Math.abs(n.time - now) * 1000;
    if (dist < bestDist) {
      bestDist = dist;
      bestNote = n;
    }
  });

  if (!bestNote) return;

  for (const j of JUDGE_WINDOWS) {
    if (bestDist <= j.window) {
      bestNote.hit = true;
      score += j.score * (1 + combo * 0.1);
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      showJudge(j.name, j.class);
      playHitSound();
      updateUI();
      return;
    }
  }
}

function showJudge(text, cls) {
  judgeEl.textContent = text;
  judgeEl.className = cls;
  clearTimeout(judgeTimeout);
  judgeTimeout = setTimeout(() => { judgeEl.textContent = ''; }, 500);
}

function updateUI() {
  scoreEl.textContent = Math.floor(score);
  comboEl.textContent = combo;
  maxComboEl.textContent = maxCombo;
}

// ===== 렌더링 =====
function draw() {
  const now = getCurrentTime();

  // 배경
  ctx.fillStyle = '#0a0014';
  ctx.fillRect(0, 0, W, H);

  // 레인 구분선
  for (let i = 1; i < LANES; i++) {
    ctx.strokeStyle = '#1a1a30';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, 0);
    ctx.lineTo(i * LANE_W, H);
    ctx.stroke();
  }

  // 히트 라인
  ctx.fillStyle = '#ffffff15';
  ctx.fillRect(0, HIT_Y - NOTE_H/2, W, NOTE_H + 10);
  for (let i = 0; i < LANES; i++) {
    ctx.strokeStyle = LANE_COLORS[i] + '40';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(i * LANE_W, HIT_Y);
    ctx.lineTo((i + 1) * LANE_W, HIT_Y);
    ctx.stroke();
  }

  // 노트
  const speed = 400; // px per second
  notes.forEach(n => {
    if (n.hit) return;
    const y = HIT_Y - (n.time - now) * speed;

    if (y > H + 50) {
      if (!n.missed) {
        n.missed = true;
        combo = 0;
        showJudge('MISS', 'miss');
        updateUI();
      }
      return;
    }
    if (y < -50) return;

    const x = n.lane * LANE_W;
    const color = LANE_COLORS[n.lane];

    ctx.fillStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 10;
    ctx.fillRect(x + 4, y - NOTE_H/2, LANE_W - 8, NOTE_H);
    ctx.shadowBlur = 0;

    // 윗면 하이라이트
    ctx.fillStyle = color + '80';
    ctx.fillRect(x + 4, y - NOTE_H/2, LANE_W - 8, 3);
  });

  // 키 누름 이펙트
  activeKeys.forEach(lane => {
    ctx.fillStyle = LANE_COLORS[lane] + '30';
    ctx.fillRect(lane * LANE_W, 0, LANE_W, H);
  });

  // 레인 키 표시
  LANE_KEYS.forEach((key, i) => {
    ctx.fillStyle = activeKeys.has(i) ? LANE_COLORS[i] : '#333';
    ctx.font = 'bold 16px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(key.toUpperCase(), i * LANE_W + LANE_W/2, H - 15);
  });
}

function gameLoop() {
  if (gameState !== 'playing') return;

  const now = getCurrentTime();
  draw();

  // 곡 끝 체크
  if (now > songData.duration + 3) {
    endGame();
    return;
  }

  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameState = 'ended';

  const totalNotes = notes.length;
  const hitNotes = notes.filter(n => n.hit).length;
  const accuracy = totalNotes > 0 ? Math.floor(hitNotes / totalNotes * 100) : 0;

  let rank = 'D';
  if (accuracy >= 95) rank = 'S';
  else if (accuracy >= 90) rank = 'A';
  else if (accuracy >= 80) rank = 'B';
  else if (accuracy >= 70) rank = 'C';

  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <h2>RESULT</h2>
    <p style="color:#ff6bdf;font-size:48px;font-weight:bold">${rank}</p>
    <p style="color:#fff;font-size:18px">점수: ${Math.floor(score)}</p>
    <p>정확도: ${accuracy}% | 최대 콤보: ${maxCombo} | ${hitNotes}/${totalNotes} 노트</p>
    <button class="obtn" onclick="location.reload()">곡 선택</button>
  `;
}

// ===== 입력 =====
document.addEventListener('keydown', (e) => {
  const lane = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (lane >= 0 && !activeKeys.has(lane)) {
    activeKeys.add(lane);
    hitLane(lane);
  }
});

document.addEventListener('keyup', (e) => {
  const lane = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (lane >= 0) activeKeys.delete(lane);
});

// 모바일
document.querySelectorAll('.touch-key').forEach(btn => {
  const lane = parseInt(btn.dataset.lane);
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    activeKeys.add(lane);
    hitLane(lane);
  }, { passive: false });
  btn.addEventListener('touchend', () => activeKeys.delete(lane));
});

// 곡 선택
document.querySelectorAll('.song-btn').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.song));
});
</script>
</body>
</html>
