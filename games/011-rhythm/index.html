<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rhythm Beat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0014;
  color: #fff;
  font-family: 'Arial', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
}
#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
#header {
  display: flex;
  justify-content: space-between;
  width: 340px;
  font-size: 14px;
  padding: 4px 0;
}
.score-val { color: #ff6bdf; font-weight: bold; }
.combo-val { color: #ffd700; font-weight: bold; }
canvas { border-radius: 8px; }
#judge {
  font-size: 28px;
  font-weight: bold;
  min-height: 36px;
  text-align: center;
  transition: opacity 0.3s;
}
.perfect { color: #ffd700; text-shadow: 0 0 15px #ffd700; }
.great { color: #4ade80; text-shadow: 0 0 10px #4ade80; }
.good { color: #38bdf8; }
.miss { color: #ff6b6b; }
#keys-hint {
  font-size: 12px;
  color: #555;
  text-align: center;
}
#overlay {
  position: fixed; top:0; left:0; width:100%; height:100%;
  background: rgba(10,0,20,0.9);
  display: flex; flex-direction: column;
  justify-content: center; align-items: center;
  z-index: 10; gap: 16px;
}
#overlay.hidden { display: none; }
#overlay h2 { color: #ff6bdf; font-size: 32px; text-shadow: 0 0 20px #ff6bdf60; }
#overlay p { color: #888; font-size: 13px; text-align: center; line-height: 1.6; }
.obtn {
  background: transparent; color: #ff6bdf; border: 2px solid #ff6bdf;
  padding: 12px 30px; font-size: 16px; cursor: pointer; border-radius: 6px;
}
.obtn:hover { background: #ff6bdf20; }
#song-select { display: flex; flex-direction: column; gap: 8px; margin: 10px 0; }
.song-btn {
  background: #1a0030;
  border: 2px solid #333;
  color: #ccc;
  padding: 12px 24px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
  transition: all 0.2s;
  text-align: left;
}
.song-btn:hover { border-color: #ff6bdf; background: #2a0050; }
.song-btn .title { font-weight: bold; color: #ff6bdf; }
.song-btn .info { font-size: 12px; color: #666; margin-top: 4px; }
/* 모바일 키 */
#touch-keys {
  display: none;
  gap: 8px;
  margin-top: 8px;
}
@media (pointer: coarse) { #touch-keys { display: flex; } #keys-hint { display: none; } }
.touch-key {
  width: 70px;
  height: 60px;
  border-radius: 8px;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  display: flex;
  justify-content: center;
  align-items: center;
  transition: background 0.1s;
}
.touch-key:active { filter: brightness(1.5); }
</style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <span>SCORE: <span class="score-val" id="score">0</span></span>
    <span>COMBO: <span class="combo-val" id="combo">0</span></span>
    <span>MAX: <span class="combo-val" id="max-combo">0</span></span>
  </div>
  <canvas id="game" width="340" height="500"></canvas>
  <div id="judge"></div>
  <div id="keys-hint">D F J K 키로 플레이</div>
  <div id="touch-keys">
    <div class="touch-key" data-lane="0" style="background:#ff6b6b">D</div>
    <div class="touch-key" data-lane="1" style="background:#4ade80">F</div>
    <div class="touch-key" data-lane="2" style="background:#38bdf8">J</div>
    <div class="touch-key" data-lane="3" style="background:#fbbf24">K</div>
  </div>
</div>
<div id="overlay">
  <h2>RHYTHM BEAT</h2>
  <p>음악에 맞춰 떨어지는 노트를 타이밍에 맞게 누르세요!</p>
  <div id="song-select">
    <button class="song-btn" data-song="energetic">
      <div class="title">Energetic Beat</div>
      <div class="info">BPM 140 | 보통</div>
    </button>
    <button class="song-btn" data-song="chill">
      <div class="title">Chill Wave</div>
      <div class="info">BPM 100 | 쉬움</div>
    </button>
    <button class="song-btn" data-song="intense">
      <div class="title">Intense Rush</div>
      <div class="info">BPM 170 | 어려움</div>
    </button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const maxComboEl = document.getElementById('max-combo');
const judgeEl = document.getElementById('judge');
const overlayEl = document.getElementById('overlay');

// ===== Canvas Sprite Assets =====
const GameSprites = (function() {
  const sprites = {};
  const LANE_W_S = W / 4;
  const NOTE_H_S = 20;
  const COLORS = ['#ff6b6b', '#4ade80', '#38bdf8', '#fbbf24'];
  const COLORS_DARK = ['#cc3333', '#22aa55', '#1188cc', '#cc8800'];
  const COLORS_LIGHT = ['#ffaaaa', '#88ffbb', '#88ddff', '#ffdd66'];

  function createCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    return c;
  }

  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return {r,g,b};
  }

  function buildBackground() {
    const c = createCanvas(W, H);
    const g = c.getContext('2d');

    // Radial gradient background with subtle purple glow
    const radGrad = g.createRadialGradient(W/2, H*0.4, 20, W/2, H*0.4, W*0.9);
    radGrad.addColorStop(0, '#1a0033');
    radGrad.addColorStop(0.5, '#0f001f');
    radGrad.addColorStop(1, '#050010');
    g.fillStyle = radGrad;
    g.fillRect(0, 0, W, H);

    // Subtle vertical lane stripes
    for (let i = 0; i < 4; i++) {
      const laneGrad = g.createLinearGradient(0, 0, 0, H);
      laneGrad.addColorStop(0, 'rgba(255,255,255,0)');
      laneGrad.addColorStop(0.5, 'rgba(255,255,255,0.008)');
      laneGrad.addColorStop(1, 'rgba(255,255,255,0.02)');
      g.fillStyle = laneGrad;
      g.fillRect(i * LANE_W_S, 0, LANE_W_S, H);
    }

    // Lane divider lines with glow
    for (let i = 1; i < 4; i++) {
      const x = i * LANE_W_S;
      // Glow
      const lineGrad = g.createLinearGradient(0, 0, 0, H);
      lineGrad.addColorStop(0, 'rgba(100,60,180,0)');
      lineGrad.addColorStop(0.3, 'rgba(100,60,180,0.15)');
      lineGrad.addColorStop(0.7, 'rgba(100,60,180,0.25)');
      lineGrad.addColorStop(1, 'rgba(100,60,180,0.1)');
      g.strokeStyle = lineGrad;
      g.lineWidth = 3;
      g.beginPath();
      g.moveTo(x, 0);
      g.lineTo(x, H);
      g.stroke();
      // Crisp line
      g.strokeStyle = 'rgba(60,40,100,0.5)';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(x, 0);
      g.lineTo(x, H);
      g.stroke();
    }

    // Subtle grid dots
    for (let y = 30; y < H - 70; y += 40) {
      for (let i = 0; i < 4; i++) {
        g.fillStyle = 'rgba(120,80,200,0.06)';
        g.beginPath();
        g.arc(i * LANE_W_S + LANE_W_S/2, y, 1.5, 0, Math.PI*2);
        g.fill();
      }
    }

    sprites.background = c;
  }

  function buildHitZone() {
    const hitH = NOTE_H_S + 16;
    const c = createCanvas(W, hitH);
    const g = c.getContext('2d');

    // Glowing bar background
    const barGrad = g.createLinearGradient(0, 0, 0, hitH);
    barGrad.addColorStop(0, 'rgba(255,255,255,0.02)');
    barGrad.addColorStop(0.4, 'rgba(255,255,255,0.08)');
    barGrad.addColorStop(0.6, 'rgba(255,255,255,0.08)');
    barGrad.addColorStop(1, 'rgba(255,255,255,0.02)');
    g.fillStyle = barGrad;
    g.fillRect(0, 0, W, hitH);

    // Per-lane colored lines at center
    for (let i = 0; i < 4; i++) {
      const x = i * LANE_W_S;
      const rgb = hexToRgb(COLORS[i]);

      // Glow under line
      g.shadowColor = COLORS[i];
      g.shadowBlur = 12;
      g.strokeStyle = COLORS[i] + '60';
      g.lineWidth = 4;
      g.beginPath();
      g.moveTo(x + 2, hitH/2);
      g.lineTo(x + LANE_W_S - 2, hitH/2);
      g.stroke();

      // Crisp line
      g.shadowBlur = 0;
      g.strokeStyle = COLORS[i] + '90';
      g.lineWidth = 2;
      g.beginPath();
      g.moveTo(x + 2, hitH/2);
      g.lineTo(x + LANE_W_S - 2, hitH/2);
      g.stroke();

      // Diamond markers at ends
      g.fillStyle = COLORS[i] + 'AA';
      for (const dx of [8, LANE_W_S - 8]) {
        g.beginPath();
        g.moveTo(x + dx, hitH/2 - 4);
        g.lineTo(x + dx + 4, hitH/2);
        g.lineTo(x + dx, hitH/2 + 4);
        g.lineTo(x + dx - 4, hitH/2);
        g.closePath();
        g.fill();
      }
    }

    sprites.hitZone = c;
  }

  function buildNotes() {
    sprites.notes = [];
    const noteW = LANE_W_S - 8;
    const noteH = NOTE_H_S;
    const pad = 2; // extra for glow

    for (let i = 0; i < 4; i++) {
      const c = createCanvas(noteW + pad*2, noteH + pad*2 + 6);
      const g = c.getContext('2d');
      const rgb = hexToRgb(COLORS[i]);
      const rgbDark = hexToRgb(COLORS_DARK[i]);
      const rgbLight = hexToRgb(COLORS_LIGHT[i]);

      const x = pad, y = pad;

      // Outer glow
      g.shadowColor = COLORS[i];
      g.shadowBlur = 8;

      // Main body gradient (top-to-bottom 3D)
      const bodyGrad = g.createLinearGradient(0, y, 0, y + noteH);
      bodyGrad.addColorStop(0, COLORS_LIGHT[i]);
      bodyGrad.addColorStop(0.15, COLORS[i]);
      bodyGrad.addColorStop(0.7, COLORS[i]);
      bodyGrad.addColorStop(1, COLORS_DARK[i]);
      g.fillStyle = bodyGrad;
      // Rounded rect
      const r = 4;
      g.beginPath();
      g.moveTo(x+r, y);
      g.lineTo(x+noteW-r, y);
      g.quadraticCurveTo(x+noteW, y, x+noteW, y+r);
      g.lineTo(x+noteW, y+noteH-r);
      g.quadraticCurveTo(x+noteW, y+noteH, x+noteW-r, y+noteH);
      g.lineTo(x+r, y+noteH);
      g.quadraticCurveTo(x, y+noteH, x, y+noteH-r);
      g.lineTo(x, y+r);
      g.quadraticCurveTo(x, y, x+r, y);
      g.closePath();
      g.fill();

      g.shadowBlur = 0;

      // Top highlight (glass effect)
      const hlGrad = g.createLinearGradient(0, y, 0, y + noteH * 0.4);
      hlGrad.addColorStop(0, 'rgba(255,255,255,0.5)');
      hlGrad.addColorStop(1, 'rgba(255,255,255,0)');
      g.fillStyle = hlGrad;
      g.beginPath();
      g.moveTo(x+r, y);
      g.lineTo(x+noteW-r, y);
      g.quadraticCurveTo(x+noteW, y, x+noteW, y+r);
      g.lineTo(x+noteW, y + noteH*0.35);
      g.quadraticCurveTo(x+noteW/2, y + noteH*0.5, x, y + noteH*0.35);
      g.lineTo(x, y+r);
      g.quadraticCurveTo(x, y, x+r, y);
      g.closePath();
      g.fill();

      // Bottom edge (3D depth)
      const btmGrad = g.createLinearGradient(0, y+noteH, 0, y+noteH+4);
      btmGrad.addColorStop(0, COLORS_DARK[i] + 'CC');
      btmGrad.addColorStop(1, COLORS_DARK[i] + '00');
      g.fillStyle = btmGrad;
      g.fillRect(x + 2, y + noteH, noteW - 4, 4);

      // Inner border
      g.strokeStyle = 'rgba(255,255,255,0.15)';
      g.lineWidth = 1;
      g.beginPath();
      g.moveTo(x+r, y+1);
      g.lineTo(x+noteW-r, y+1);
      g.quadraticCurveTo(x+noteW-1, y+1, x+noteW-1, y+r);
      g.lineTo(x+noteW-1, y+noteH-r);
      g.stroke();

      // Center shine dot
      g.fillStyle = 'rgba(255,255,255,0.25)';
      g.beginPath();
      g.ellipse(x + noteW/2, y + noteH*0.3, noteW*0.2, 2, 0, 0, Math.PI*2);
      g.fill();

      sprites.notes.push(c);
    }
  }

  function buildKeyPressOverlays() {
    sprites.keyPress = [];
    for (let i = 0; i < 4; i++) {
      const c = createCanvas(LANE_W_S, H);
      const g = c.getContext('2d');
      const rgb = hexToRgb(COLORS[i]);

      // Full lane gradient overlay
      const grad = g.createLinearGradient(0, 0, 0, H);
      grad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      grad.addColorStop(0.5, `rgba(${rgb.r},${rgb.g},${rgb.b},0.06)`);
      grad.addColorStop(0.85, `rgba(${rgb.r},${rgb.g},${rgb.b},0.15)`);
      grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0.05)`);
      g.fillStyle = grad;
      g.fillRect(0, 0, LANE_W_S, H);

      // Bright bottom flash
      const flashGrad = g.createRadialGradient(LANE_W_S/2, H-60, 5, LANE_W_S/2, H-60, LANE_W_S);
      flashGrad.addColorStop(0, `rgba(${rgb.r},${rgb.g},${rgb.b},0.3)`);
      flashGrad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      g.fillStyle = flashGrad;
      g.fillRect(0, H-160, LANE_W_S, 160);

      sprites.keyPress.push(c);
    }
  }

  function buildKeyLabels() {
    sprites.keyLabelsActive = [];
    sprites.keyLabelsInactive = [];
    const keys = ['D','F','J','K'];
    const size = 30;

    for (let i = 0; i < 4; i++) {
      // Inactive
      const cI = createCanvas(size, size);
      const gI = cI.getContext('2d');
      gI.font = 'bold 16px Arial';
      gI.textAlign = 'center';
      gI.textBaseline = 'middle';
      gI.fillStyle = '#222';
      gI.beginPath();
      gI.arc(size/2, size/2, 12, 0, Math.PI*2);
      gI.fill();
      gI.fillStyle = '#555';
      gI.fillText(keys[i], size/2, size/2);
      sprites.keyLabelsInactive.push(cI);

      // Active
      const cA = createCanvas(size, size);
      const gA = cA.getContext('2d');
      const rgb = hexToRgb(COLORS[i]);
      gA.shadowColor = COLORS[i];
      gA.shadowBlur = 10;
      const aGrad = gA.createRadialGradient(size/2, size/2, 2, size/2, size/2, 13);
      aGrad.addColorStop(0, COLORS_LIGHT[i]);
      aGrad.addColorStop(1, COLORS[i]);
      gA.fillStyle = aGrad;
      gA.beginPath();
      gA.arc(size/2, size/2, 12, 0, Math.PI*2);
      gA.fill();
      gA.shadowBlur = 0;
      gA.fillStyle = '#fff';
      gA.font = 'bold 16px Arial';
      gA.textAlign = 'center';
      gA.textBaseline = 'middle';
      gA.fillText(keys[i], size/2, size/2 + 1);
      sprites.keyLabelsActive.push(cA);
    }
  }

  function buildHitFlash() {
    sprites.hitFlash = [];
    for (let i = 0; i < 4; i++) {
      const size = 80;
      const c = createCanvas(size, size);
      const g = c.getContext('2d');
      const rgb = hexToRgb(COLORS[i]);

      // Starburst / radial flash
      const grad = g.createRadialGradient(size/2, size/2, 2, size/2, size/2, size/2);
      grad.addColorStop(0, `rgba(255,255,255,0.6)`);
      grad.addColorStop(0.2, `rgba(${rgb.r},${rgb.g},${rgb.b},0.4)`);
      grad.addColorStop(0.6, `rgba(${rgb.r},${rgb.g},${rgb.b},0.1)`);
      grad.addColorStop(1, `rgba(${rgb.r},${rgb.g},${rgb.b},0)`);
      g.fillStyle = grad;
      g.fillRect(0, 0, size, size);

      // Cross rays
      g.globalCompositeOperation = 'lighter';
      g.strokeStyle = `rgba(${rgb.r},${rgb.g},${rgb.b},0.3)`;
      g.lineWidth = 2;
      for (let a = 0; a < 8; a++) {
        const angle = (a / 8) * Math.PI * 2;
        g.beginPath();
        g.moveTo(size/2 + Math.cos(angle)*4, size/2 + Math.sin(angle)*4);
        g.lineTo(size/2 + Math.cos(angle)*30, size/2 + Math.sin(angle)*30);
        g.stroke();
      }

      sprites.hitFlash.push(c);
    }
  }

  return {
    sprites: sprites,
    init: function() {
      buildBackground();
      buildHitZone();
      buildNotes();
      buildKeyPressOverlays();
      buildKeyLabels();
      buildHitFlash();
    }
  };
})();

const LANES = 4;
const LANE_W = W / LANES;
const HIT_Y = H - 60;
const NOTE_H = 20;
const LANE_COLORS = ['#ff6b6b', '#4ade80', '#38bdf8', '#fbbf24'];
const LANE_KEYS = ['d', 'f', 'j', 'k'];

const JUDGE_WINDOWS = [
  { name: 'PERFECT', window: 30, score: 300, class: 'perfect' },
  { name: 'GREAT',   window: 60, score: 200, class: 'great' },
  { name: 'GOOD',    window: 90, score: 100, class: 'good' }
];

// 곡 데이터 (비트 패턴 자동 생성)
const SONGS = {
  chill: { bpm: 100, duration: 45, name: 'Chill Wave', freq: [261.63, 329.63, 392.00, 523.25] },
  energetic: { bpm: 140, duration: 40, name: 'Energetic Beat', freq: [329.63, 392.00, 440.00, 523.25] },
  intense: { bpm: 170, duration: 35, name: 'Intense Rush', freq: [440.00, 523.25, 587.33, 659.25] }
};

let audioCtx, notes, score, combo, maxCombo, startTime, gameState;
let activeKeys = new Set();
let judgeTimeout;
let songData;
let hitFlashes = []; // {lane, time, alpha}

// ===== 오디오 =====
function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}

function playNote(freq, time, duration) {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  osc.type = 'sine';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0.15, time);
  gain.gain.exponentialRampToValueAtTime(0.001, time + duration);

  osc.start(time);
  osc.stop(time + duration);
}

function playHitSound() {
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'triangle';
  osc.frequency.value = 800;
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.05);
}

// ===== 노트 생성 =====
function generateNotes(song) {
  const beatInterval = 60 / song.bpm;
  const totalBeats = Math.floor(song.duration / beatInterval);
  const generated = [];

  for (let i = 0; i < totalBeats; i++) {
    const time = i * beatInterval + 2; // 2초 오프셋

    // 패턴 생성
    if (i % 4 === 0) {
      // 강박: 1~2개 노트
      const lane = Math.floor(Math.random() * LANES);
      generated.push({ lane, time, hit: false, missed: false });
      if (Math.random() < 0.3) {
        const lane2 = (lane + 2) % LANES;
        generated.push({ lane: lane2, time, hit: false, missed: false });
      }
    } else if (i % 2 === 0) {
      // 약박: 60% 확률
      if (Math.random() < 0.6) {
        generated.push({ lane: Math.floor(Math.random() * LANES), time, hit: false, missed: false });
      }
    } else {
      // 16분음표: 난이도에 따라
      const prob = song.bpm >= 160 ? 0.4 : song.bpm >= 130 ? 0.25 : 0.15;
      if (Math.random() < prob) {
        generated.push({ lane: Math.floor(Math.random() * LANES), time, hit: false, missed: false });
      }
    }

    // 음악 재생
    if (i % 2 === 0) {
      const freq = song.freq[i % song.freq.length];
      playNote(freq, audioCtx.currentTime + time, beatInterval * 0.8);
    }
    // 베이스
    if (i % 4 === 0) {
      playNote(song.freq[0] / 2, audioCtx.currentTime + time, beatInterval * 1.5);
    }
    // 하이햇
    if (song.bpm >= 130 || i % 2 === 0) {
      const hihat = audioCtx.createOscillator();
      const hGain = audioCtx.createGain();
      hihat.connect(hGain);
      hGain.connect(audioCtx.destination);
      hihat.type = 'square';
      hihat.frequency.value = 1200;
      hGain.gain.setValueAtTime(0.02, audioCtx.currentTime + time);
      hGain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + time + 0.03);
      hihat.start(audioCtx.currentTime + time);
      hihat.stop(audioCtx.currentTime + time + 0.03);
    }
  }

  return generated;
}

// ===== 게임 =====
function startGame(songKey) {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();

  songData = SONGS[songKey];
  notes = generateNotes(songData);
  score = 0;
  combo = 0;
  maxCombo = 0;
  hitFlashes = [];
  startTime = audioCtx.currentTime;
  gameState = 'playing';
  overlayEl.classList.add('hidden');
  updateUI();
  gameLoop();
}

function getCurrentTime() {
  return audioCtx.currentTime - startTime;
}

function hitLane(lane) {
  if (gameState !== 'playing') return;

  const now = getCurrentTime();
  let bestNote = null, bestDist = Infinity;

  notes.forEach(n => {
    if (n.lane !== lane || n.hit || n.missed) return;
    const dist = Math.abs(n.time - now) * 1000;
    if (dist < bestDist) {
      bestDist = dist;
      bestNote = n;
    }
  });

  if (!bestNote) return;

  for (const j of JUDGE_WINDOWS) {
    if (bestDist <= j.window) {
      bestNote.hit = true;
      score += j.score * (1 + combo * 0.1);
      combo++;
      if (combo > maxCombo) maxCombo = combo;
      showJudge(j.name, j.class);
      playHitSound();
      hitFlashes.push({ lane: lane, time: performance.now(), alpha: 1 });
      updateUI();
      return;
    }
  }
}

function showJudge(text, cls) {
  judgeEl.textContent = text;
  judgeEl.className = cls;
  clearTimeout(judgeTimeout);
  judgeTimeout = setTimeout(() => { judgeEl.textContent = ''; }, 500);
}

function updateUI() {
  scoreEl.textContent = Math.floor(score);
  comboEl.textContent = combo;
  maxComboEl.textContent = maxCombo;
}

// ===== 렌더링 =====
function draw() {
  const now = getCurrentTime();
  const sp = GameSprites.sprites;

  // 배경 (sprite with fallback)
  if (sp.background) {
    ctx.drawImage(sp.background, 0, 0);
  } else {
    ctx.fillStyle = '#0a0014';
    ctx.fillRect(0, 0, W, H);
    for (let i = 1; i < LANES; i++) {
      ctx.strokeStyle = '#1a1a30';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(i * LANE_W, 0);
      ctx.lineTo(i * LANE_W, H);
      ctx.stroke();
    }
  }

  // 키 누름 이펙트 (behind notes)
  activeKeys.forEach(lane => {
    if (sp.keyPress && sp.keyPress[lane]) {
      ctx.drawImage(sp.keyPress[lane], lane * LANE_W, 0);
    } else {
      ctx.fillStyle = LANE_COLORS[lane] + '30';
      ctx.fillRect(lane * LANE_W, 0, LANE_W, H);
    }
  });

  // 히트 라인
  if (sp.hitZone) {
    const hitZoneH = NOTE_H + 16;
    ctx.drawImage(sp.hitZone, 0, HIT_Y - hitZoneH/2);
  } else {
    ctx.fillStyle = '#ffffff15';
    ctx.fillRect(0, HIT_Y - NOTE_H/2, W, NOTE_H + 10);
    for (let i = 0; i < LANES; i++) {
      ctx.strokeStyle = LANE_COLORS[i] + '40';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(i * LANE_W, HIT_Y);
      ctx.lineTo((i + 1) * LANE_W, HIT_Y);
      ctx.stroke();
    }
  }

  // 노트
  const speed = 400; // px per second
  notes.forEach(n => {
    if (n.hit) return;
    const y = HIT_Y - (n.time - now) * speed;

    if (y > H + 50) {
      if (!n.missed) {
        n.missed = true;
        combo = 0;
        showJudge('MISS', 'miss');
        updateUI();
      }
      return;
    }
    if (y < -50) return;

    const x = n.lane * LANE_W;

    if (sp.notes && sp.notes[n.lane]) {
      const noteSprite = sp.notes[n.lane];
      ctx.drawImage(noteSprite, x + 4 - 2, y - NOTE_H/2 - 2);
    } else {
      const color = LANE_COLORS[n.lane];
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 10;
      ctx.fillRect(x + 4, y - NOTE_H/2, LANE_W - 8, NOTE_H);
      ctx.shadowBlur = 0;
      ctx.fillStyle = color + '80';
      ctx.fillRect(x + 4, y - NOTE_H/2, LANE_W - 8, 3);
    }
  });

  // 히트 플래시 이펙트
  const pNow = performance.now();
  for (let i = hitFlashes.length - 1; i >= 0; i--) {
    const hf = hitFlashes[i];
    const elapsed = pNow - hf.time;
    const duration = 300;
    if (elapsed > duration) {
      hitFlashes.splice(i, 1);
      continue;
    }
    const alpha = 1 - elapsed / duration;
    const scale = 0.5 + (elapsed / duration) * 0.8;
    if (sp.hitFlash && sp.hitFlash[hf.lane]) {
      const flashSprite = sp.hitFlash[hf.lane];
      const fw = flashSprite.width * scale;
      const fh = flashSprite.height * scale;
      const fx = hf.lane * LANE_W + LANE_W/2 - fw/2;
      const fy = HIT_Y - fh/2;
      ctx.globalAlpha = alpha;
      ctx.drawImage(flashSprite, fx, fy, fw, fh);
      ctx.globalAlpha = 1;
    }
  }

  // 레인 키 표시
  for (let i = 0; i < 4; i++) {
    const isActive = activeKeys.has(i);
    const labelSize = 30;
    const lx = i * LANE_W + LANE_W/2 - labelSize/2;
    const ly = H - 15 - labelSize/2;
    if (isActive && sp.keyLabelsActive && sp.keyLabelsActive[i]) {
      ctx.drawImage(sp.keyLabelsActive[i], lx, ly);
    } else if (!isActive && sp.keyLabelsInactive && sp.keyLabelsInactive[i]) {
      ctx.drawImage(sp.keyLabelsInactive[i], lx, ly);
    } else {
      ctx.fillStyle = isActive ? LANE_COLORS[i] : '#333';
      ctx.font = 'bold 16px Arial';
      ctx.textAlign = 'center';
      ctx.fillText(LANE_KEYS[i].toUpperCase(), i * LANE_W + LANE_W/2, H - 15);
    }
  }
}

function gameLoop() {
  if (gameState !== 'playing') return;

  const now = getCurrentTime();
  draw();

  // 곡 끝 체크
  if (now > songData.duration + 3) {
    endGame();
    return;
  }

  requestAnimationFrame(gameLoop);
}

function endGame() {
  gameState = 'ended';

  const totalNotes = notes.length;
  const hitNotes = notes.filter(n => n.hit).length;
  const accuracy = totalNotes > 0 ? Math.floor(hitNotes / totalNotes * 100) : 0;

  let rank = 'D';
  if (accuracy >= 95) rank = 'S';
  else if (accuracy >= 90) rank = 'A';
  else if (accuracy >= 80) rank = 'B';
  else if (accuracy >= 70) rank = 'C';

  overlayEl.classList.remove('hidden');
  overlayEl.innerHTML = `
    <h2>RESULT</h2>
    <p style="color:#ff6bdf;font-size:48px;font-weight:bold">${rank}</p>
    <p style="color:#fff;font-size:18px">점수: ${Math.floor(score)}</p>
    <p>정확도: ${accuracy}% | 최대 콤보: ${maxCombo} | ${hitNotes}/${totalNotes} 노트</p>
    <button class="obtn" onclick="location.reload()">곡 선택</button>
  `;
}

// ===== 입력 =====
document.addEventListener('keydown', (e) => {
  const lane = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (lane >= 0 && !activeKeys.has(lane)) {
    activeKeys.add(lane);
    hitLane(lane);
  }
});

document.addEventListener('keyup', (e) => {
  const lane = LANE_KEYS.indexOf(e.key.toLowerCase());
  if (lane >= 0) activeKeys.delete(lane);
});

// 모바일
document.querySelectorAll('.touch-key').forEach(btn => {
  const lane = parseInt(btn.dataset.lane);
  btn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    activeKeys.add(lane);
    hitLane(lane);
  }, { passive: false });
  btn.addEventListener('touchend', () => activeKeys.delete(lane));
});

// 스프라이트 초기화
GameSprites.init();

// 곡 선택
document.querySelectorAll('.song-btn').forEach(btn => {
  btn.addEventListener('click', () => startGame(btn.dataset.song));
});
</script>
</body>
</html>
