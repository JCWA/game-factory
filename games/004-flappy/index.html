<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Flappy Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #4ec0ca;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Arial', sans-serif;
  overflow: hidden;
  touch-action: none;
}

canvas {
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  max-width: 100vw;
  max-height: 100vh;
}
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// 캔버스 크기
const W = 400;
const H = 600;
canvas.width = W;
canvas.height = H;

// ===== 스프라이트 에셋 =====
const GameSprites = (function() {
  const sprites = {};

  function createCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    return c;
  }

  // --- 새 스프라이트 (3 프레임: 날개 위/중간/아래) ---
  function makeBird(wingPhase) {
    const size = 40;
    const c = createCanvas(size + 16, size + 4);
    const x = c.getContext('2d');
    const cx = 18, cy = size / 2;
    const r = 15;

    // 그림자
    x.fillStyle = 'rgba(0,0,0,0.10)';
    x.beginPath();
    x.ellipse(cx + 2, cy + 3, r + 1, r - 2, 0, 0, Math.PI * 2);
    x.fill();

    // 몸통 그라디언트
    const bg = x.createRadialGradient(cx - 3, cy - 5, 2, cx, cy, r);
    bg.addColorStop(0, '#FFE066');
    bg.addColorStop(0.5, '#F5C542');
    bg.addColorStop(1, '#D4A017');
    x.fillStyle = bg;
    x.beginPath();
    x.arc(cx, cy, r, 0, Math.PI * 2);
    x.fill();

    // 몸통 윤곽
    x.strokeStyle = '#B8860B';
    x.lineWidth = 1.5;
    x.stroke();

    // 하이라이트
    x.fillStyle = 'rgba(255,255,255,0.35)';
    x.beginPath();
    x.ellipse(cx - 4, cy - 7, 8, 5, -0.4, 0, Math.PI * 2);
    x.fill();

    // 배
    const bellyG = x.createRadialGradient(cx + 2, cy + 5, 1, cx + 2, cy + 4, r * 0.6);
    bellyG.addColorStop(0, '#FFF3B0');
    bellyG.addColorStop(1, '#FCE38A');
    x.fillStyle = bellyG;
    x.beginPath();
    x.ellipse(cx + 2, cy + 4, r * 0.55, r * 0.45, 0, 0, Math.PI * 2);
    x.fill();

    // 날개
    const wingOffsets = [-5, 0, 5]; // 위, 중간, 아래
    const wingY = cy + wingOffsets[wingPhase];
    const wingG = x.createRadialGradient(cx - 7, wingY, 1, cx - 7, wingY, 11);
    wingG.addColorStop(0, '#F0C030');
    wingG.addColorStop(1, '#C8900A');
    x.fillStyle = wingG;
    x.beginPath();
    x.ellipse(cx - 7, wingY, 11, 6, -0.3, 0, Math.PI * 2);
    x.fill();
    x.strokeStyle = '#A07008';
    x.lineWidth = 1;
    x.stroke();

    // 눈 (흰자)
    x.fillStyle = '#fff';
    x.beginPath();
    x.arc(cx + 7, cy - 5, 6.5, 0, Math.PI * 2);
    x.fill();
    x.strokeStyle = '#555';
    x.lineWidth = 0.8;
    x.stroke();

    // 눈 (동공)
    x.fillStyle = '#1a1a1a';
    x.beginPath();
    x.arc(cx + 9, cy - 5, 3.2, 0, Math.PI * 2);
    x.fill();

    // 눈 하이라이트
    x.fillStyle = '#fff';
    x.beginPath();
    x.arc(cx + 10, cy - 6.5, 1.3, 0, Math.PI * 2);
    x.fill();

    // 부리
    const beakG = x.createLinearGradient(cx + r - 2, cy - 3, cx + r + 10, cy + 4);
    beakG.addColorStop(0, '#FF6B35');
    beakG.addColorStop(1, '#C0392B');
    x.fillStyle = beakG;
    x.beginPath();
    x.moveTo(cx + r - 2, cy - 2);
    x.quadraticCurveTo(cx + r + 12, cy + 1, cx + r - 2, cy + 6);
    x.closePath();
    x.fill();
    x.strokeStyle = '#922B21';
    x.lineWidth = 0.7;
    x.stroke();

    // 부리 구분선
    x.strokeStyle = '#922B21';
    x.lineWidth = 0.8;
    x.beginPath();
    x.moveTo(cx + r - 2, cy + 2);
    x.lineTo(cx + r + 9, cy + 2);
    x.stroke();

    return c;
  }

  // --- 파이프 (상단/하단) ---
  function makePipeBody(w, h, isTop) {
    const c = createCanvas(w, h);
    const x = c.getContext('2d');

    // 파이프 몸통 그라디언트
    const bodyG = x.createLinearGradient(0, 0, w, 0);
    bodyG.addColorStop(0, '#4A8A1A');
    bodyG.addColorStop(0.15, '#6BBF2E');
    bodyG.addColorStop(0.35, '#8CD44A');
    bodyG.addColorStop(0.5, '#73BF2E');
    bodyG.addColorStop(0.75, '#5DA524');
    bodyG.addColorStop(1, '#3D7A12');
    x.fillStyle = bodyG;
    x.fillRect(0, 0, w, h);

    // 하이라이트 줄
    x.fillStyle = 'rgba(255,255,255,0.12)';
    x.fillRect(w * 0.2, 0, w * 0.1, h);

    // 왼쪽 어두운 테두리
    x.fillStyle = 'rgba(0,0,0,0.15)';
    x.fillRect(0, 0, 2, h);

    // 오른쪽 어두운 테두리
    x.fillStyle = 'rgba(0,0,0,0.2)';
    x.fillRect(w - 2, 0, 2, h);

    return c;
  }

  function makePipeCap(w, h) {
    const c = createCanvas(w, h);
    const x = c.getContext('2d');
    const r = 3;

    // 캡 그라디언트
    const capG = x.createLinearGradient(0, 0, w, 0);
    capG.addColorStop(0, '#3D7A12');
    capG.addColorStop(0.1, '#5DA524');
    capG.addColorStop(0.3, '#8CD44A');
    capG.addColorStop(0.5, '#7CC83A');
    capG.addColorStop(0.7, '#5DA524');
    capG.addColorStop(1, '#2E6B0A');

    // 둥근 사각형
    x.beginPath();
    x.moveTo(r, 0);
    x.lineTo(w - r, 0);
    x.quadraticCurveTo(w, 0, w, r);
    x.lineTo(w, h - r);
    x.quadraticCurveTo(w, h, w - r, h);
    x.lineTo(r, h);
    x.quadraticCurveTo(0, h, 0, h - r);
    x.lineTo(0, r);
    x.quadraticCurveTo(0, 0, r, 0);
    x.closePath();
    x.fillStyle = capG;
    x.fill();

    // 윤곽
    x.strokeStyle = '#2E5A0A';
    x.lineWidth = 1.5;
    x.stroke();

    // 하이라이트
    x.fillStyle = 'rgba(255,255,255,0.18)';
    x.fillRect(w * 0.18, 2, w * 0.12, h - 4);

    // 상단 밝은 줄
    x.fillStyle = 'rgba(255,255,255,0.15)';
    x.fillRect(2, 1, w - 4, 2);

    return c;
  }

  // --- 지면 타일 ---
  function makeGround(w, h) {
    const c = createCanvas(w * 2, h);
    const x = c.getContext('2d');
    const tw = w * 2;

    // 흙 그라디언트
    const groundG = x.createLinearGradient(0, 0, 0, h);
    groundG.addColorStop(0, '#C4A46C');
    groundG.addColorStop(0.3, '#DEB887');
    groundG.addColorStop(1, '#A08050');
    x.fillStyle = groundG;
    x.fillRect(0, 0, tw, h);

    // 자갈 텍스처
    x.fillStyle = 'rgba(0,0,0,0.06)';
    for (let i = 0; i < tw; i += 18) {
      for (let j = 20; j < h; j += 14) {
        const ox = (j % 28 === 0) ? 9 : 0;
        x.beginPath();
        x.arc(i + ox + Math.random() * 4, j + Math.random() * 3, 2 + Math.random() * 2, 0, Math.PI * 2);
        x.fill();
      }
    }

    // 빗금 패턴
    x.strokeStyle = 'rgba(0,0,0,0.08)';
    x.lineWidth = 1;
    for (let i = -10; i < tw + 20; i += 20) {
      x.beginPath();
      x.moveTo(i, 22);
      x.lineTo(i + 12, 40);
      x.stroke();
    }

    // 풀밭 (상단)
    const grassG = x.createLinearGradient(0, 0, 0, 16);
    grassG.addColorStop(0, '#5CBF2A');
    grassG.addColorStop(0.4, '#7EDB4A');
    grassG.addColorStop(1, '#90EE90');
    x.fillStyle = grassG;
    x.fillRect(0, 0, tw, 14);

    // 풀잎 디테일
    x.strokeStyle = '#3E9A14';
    x.lineWidth = 1.5;
    for (let i = 0; i < tw; i += 8) {
      const gh = 4 + Math.random() * 6;
      x.beginPath();
      x.moveTo(i, 14);
      x.quadraticCurveTo(i + 2, 14 - gh, i + 4, 14 - gh + 2);
      x.stroke();
    }

    // 풀 하이라이트
    x.fillStyle = 'rgba(255,255,255,0.15)';
    x.fillRect(0, 1, tw, 3);

    // 풀밭 하단 경계선
    x.fillStyle = 'rgba(0,0,0,0.12)';
    x.fillRect(0, 14, tw, 2);

    return c;
  }

  // --- 구름 ---
  function makeCloud(size) {
    const pad = 10;
    const w = size * 2.6 + pad * 2;
    const h = size * 1.6 + pad * 2;
    const c = createCanvas(w, h);
    const x = c.getContext('2d');
    const cx = w / 2, cy = h / 2 + 4;

    // 그림자
    x.fillStyle = 'rgba(0,0,0,0.04)';
    x.beginPath();
    x.arc(cx + 2, cy + 4, size * 0.95, 0, Math.PI * 2);
    x.arc(cx + size * 0.55 + 2, cy - size * 0.15 + 4, size * 0.65, 0, Math.PI * 2);
    x.arc(cx - size * 0.5 + 2, cy + size * 0.05 + 4, size * 0.55, 0, Math.PI * 2);
    x.fill();

    // 구름 본체
    const cloudG = x.createRadialGradient(cx - 5, cy - size * 0.3, size * 0.2, cx, cy, size * 1.2);
    cloudG.addColorStop(0, 'rgba(255,255,255,0.95)');
    cloudG.addColorStop(1, 'rgba(235,245,255,0.75)');
    x.fillStyle = cloudG;
    x.beginPath();
    x.arc(cx, cy, size * 0.9, 0, Math.PI * 2);
    x.arc(cx + size * 0.55, cy - size * 0.2, size * 0.65, 0, Math.PI * 2);
    x.arc(cx - size * 0.5, cy, size * 0.6, 0, Math.PI * 2);
    x.arc(cx + size * 0.2, cy - size * 0.45, size * 0.5, 0, Math.PI * 2);
    x.arc(cx - size * 0.25, cy - size * 0.3, size * 0.45, 0, Math.PI * 2);
    x.fill();

    // 하이라이트
    x.fillStyle = 'rgba(255,255,255,0.4)';
    x.beginPath();
    x.ellipse(cx - 3, cy - size * 0.35, size * 0.5, size * 0.25, -0.2, 0, Math.PI * 2);
    x.fill();

    return c;
  }

  // --- 하늘 배경 ---
  function makeSky(w, h) {
    const c = createCanvas(w, h);
    const x = c.getContext('2d');
    const grad = x.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, '#5BB8F5');
    grad.addColorStop(0.4, '#7ECBF0');
    grad.addColorStop(0.7, '#A0DCEA');
    grad.addColorStop(1, '#4ec0ca');
    x.fillStyle = grad;
    x.fillRect(0, 0, w, h);

    // 미세한 라디얼 하이라이트 (태양빛 느낌)
    const sunG = x.createRadialGradient(w * 0.75, 30, 10, w * 0.75, 40, h * 0.6);
    sunG.addColorStop(0, 'rgba(255,255,200,0.08)');
    sunG.addColorStop(1, 'rgba(255,255,200,0)');
    x.fillStyle = sunG;
    x.fillRect(0, 0, w, h);

    return c;
  }

  return {
    ready: false,
    bird: [],       // 3 wing frames
    pipeBody: null,
    pipeCap: null,
    ground: null,
    clouds: [],     // different sizes
    sky: null,

    init: function() {
      // Bird frames
      this.bird = [makeBird(0), makeBird(1), makeBird(2)];

      // Pipe assets
      this.pipeBody = makePipeBody(52, 64);  // tile-able vertically
      this.pipeCap = makePipeCap(60, 24);

      // Ground tile (double width for scrolling)
      this.ground = makeGround(W, 60);

      // Clouds of various sizes
      this.clouds = [makeCloud(60), makeCloud(45), makeCloud(50), makeCloud(35)];

      // Sky background
      this.sky = makeSky(W, H - 60);

      this.ready = true;
    }
  };
})();

// 설정
const GRAVITY = 0.4;
const JUMP = -7;
const PIPE_WIDTH = 52;
const PIPE_GAP = 140;
const PIPE_SPEED = 2.5;
const PIPE_INTERVAL = 100; // 프레임
const GROUND_H = 60;

// 상태
let bird, pipes, score, bestScore, gameState, frameCount, groundX;

bestScore = parseInt(localStorage.getItem('flappy-best') || '0');

function init() {
  bird = { x: 80, y: H / 2 - 20, vy: 0, radius: 15, angle: 0 };
  pipes = [];
  score = 0;
  frameCount = 0;
  groundX = 0;
  gameState = 'ready'; // ready, playing, dead
}

// ===== 그리기 =====
function drawSky() {
  if (GameSprites.ready) {
    ctx.drawImage(GameSprites.sky, 0, 0);
  } else {
    const grad = ctx.createLinearGradient(0, 0, 0, H - GROUND_H);
    grad.addColorStop(0, '#87CEEB');
    grad.addColorStop(1, '#4ec0ca');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H - GROUND_H);
  }
}

function drawClouds() {
  const cloudData = [[100, 80, 0], [280, 120, 1], [50, 200, 2], [350, 50, 3]];
  const offset = (frameCount * 0.3) % (W + 200);

  if (GameSprites.ready) {
    cloudData.forEach(([bx, by, idx]) => {
      const cx = ((bx - offset + W + 200) % (W + 200)) - 100;
      const spr = GameSprites.clouds[idx];
      ctx.drawImage(spr, cx - spr.width / 2, by - spr.height / 2);
    });
  } else {
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    const sizes = [60, 45, 50, 35];
    cloudData.forEach(([bx, by, idx]) => {
      const size = sizes[idx];
      const cx = ((bx - offset + W + 200) % (W + 200)) - 100;
      ctx.beginPath();
      ctx.arc(cx, by, size, 0, Math.PI * 2);
      ctx.arc(cx + size * 0.6, by - size * 0.3, size * 0.7, 0, Math.PI * 2);
      ctx.arc(cx - size * 0.5, by - size * 0.1, size * 0.6, 0, Math.PI * 2);
      ctx.fill();
    });
  }
}

function drawGround() {
  if (GameSprites.ready) {
    const gw = GameSprites.ground.width;
    const scrollX = -(groundX % (gw / 2));
    ctx.drawImage(GameSprites.ground, scrollX, H - GROUND_H);
    if (scrollX + gw < W) {
      ctx.drawImage(GameSprites.ground, scrollX + gw, H - GROUND_H);
    }
  } else {
    ctx.fillStyle = '#DEB887';
    ctx.fillRect(0, H - GROUND_H, W, GROUND_H);
    ctx.fillStyle = '#90EE90';
    ctx.fillRect(0, H - GROUND_H, W, 15);
    ctx.strokeStyle = '#C4A46C';
    ctx.lineWidth = 1;
    for (let i = 0; i < W + 20; i += 20) {
      const x = ((i - groundX % 20) + W + 20) % (W + 20) - 20;
      ctx.beginPath();
      ctx.moveTo(x, H - GROUND_H + 20);
      ctx.lineTo(x + 10, H - GROUND_H + 35);
      ctx.stroke();
    }
  }
}

function drawPipe(pipe) {
  const capH = 24;
  const capExtra = 4;
  const capW = PIPE_WIDTH + capExtra * 2;

  if (GameSprites.ready) {
    const body = GameSprites.pipeBody;
    const cap = GameSprites.pipeCap;

    // 윗 파이프 몸통 (타일링)
    const topBodyH = pipe.topH - capH;
    if (topBodyH > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(pipe.x, 0, PIPE_WIDTH, topBodyH);
      ctx.clip();
      for (let ty = 0; ty < topBodyH; ty += body.height) {
        ctx.drawImage(body, pipe.x, ty, PIPE_WIDTH, body.height);
      }
      ctx.restore();
    }
    // 윗 캡
    ctx.drawImage(cap, pipe.x - capExtra, pipe.topH - capH, capW, capH);

    // 아랫 파이프
    const botY = pipe.topH + PIPE_GAP;
    const botH = H - GROUND_H - botY;
    // 아랫 캡
    ctx.drawImage(cap, pipe.x - capExtra, botY, capW, capH);
    // 아랫 파이프 몸통
    const botBodyH = botH - capH;
    if (botBodyH > 0) {
      ctx.save();
      ctx.beginPath();
      ctx.rect(pipe.x, botY + capH, PIPE_WIDTH, botBodyH);
      ctx.clip();
      for (let ty = botY + capH; ty < botY + botH; ty += body.height) {
        ctx.drawImage(body, pipe.x, ty, PIPE_WIDTH, body.height);
      }
      ctx.restore();
    }
  } else {
    // 폴백: 원래 그리기 코드
    ctx.fillStyle = '#73BF2E';
    ctx.fillRect(pipe.x, 0, PIPE_WIDTH, pipe.topH);
    ctx.fillStyle = '#5DA524';
    ctx.fillRect(pipe.x + 4, 0, PIPE_WIDTH - 8, pipe.topH - capH);
    ctx.fillStyle = '#73BF2E';
    ctx.fillRect(pipe.x - capExtra, pipe.topH - capH, capW, capH);
    ctx.strokeStyle = '#4A8A1A';
    ctx.lineWidth = 2;
    ctx.strokeRect(pipe.x - capExtra, pipe.topH - capH, capW, capH);

    const botY = pipe.topH + PIPE_GAP;
    const botH = H - GROUND_H - botY;
    ctx.fillStyle = '#73BF2E';
    ctx.fillRect(pipe.x, botY, PIPE_WIDTH, botH);
    ctx.fillStyle = '#5DA524';
    ctx.fillRect(pipe.x + 4, botY + capH, PIPE_WIDTH - 8, botH - capH);
    ctx.fillStyle = '#73BF2E';
    ctx.fillRect(pipe.x - capExtra, botY, capW, capH);
    ctx.strokeStyle = '#4A8A1A';
    ctx.strokeRect(pipe.x - capExtra, botY, capW, capH);
  }
}

function drawBird() {
  ctx.save();
  ctx.translate(bird.x, bird.y);

  // 회전 (속도에 따라)
  bird.angle = Math.max(-25, Math.min(bird.vy * 3, 70));
  ctx.rotate(bird.angle * Math.PI / 180);

  if (GameSprites.ready) {
    // 날개 프레임 선택 (0→1→2→1→0 순환)
    const wingCycle = [0, 1, 2, 1];
    const frameIdx = wingCycle[Math.floor(frameCount * 0.3) % 4];
    const spr = GameSprites.bird[frameIdx];
    ctx.drawImage(spr, -spr.width / 2 + 2, -spr.height / 2);
  } else {
    // 폴백: 원래 그리기 코드
    ctx.fillStyle = '#F5C542';
    ctx.beginPath();
    ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#D4A017';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.fillStyle = '#FCE38A';
    ctx.beginPath();
    ctx.arc(2, 4, bird.radius * 0.6, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(7, -5, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(9, -5, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#E8572A';
    ctx.beginPath();
    ctx.moveTo(bird.radius - 2, -2);
    ctx.lineTo(bird.radius + 10, 2);
    ctx.lineTo(bird.radius - 2, 6);
    ctx.closePath();
    ctx.fill();

    const wingY = Math.sin(frameCount * 0.3) * 4;
    ctx.fillStyle = '#E8AD15';
    ctx.beginPath();
    ctx.ellipse(-6, wingY, 10, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
}

function drawScore() {
  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.font = 'bold 48px Arial';
  ctx.textAlign = 'center';
  ctx.strokeText(score, W / 2, 70);
  ctx.fillText(score, W / 2, 70);
}

function drawOverlay(text, sub) {
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fillRect(0, 0, W, H);

  ctx.fillStyle = '#fff';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 3;
  ctx.font = 'bold 40px Arial';
  ctx.textAlign = 'center';
  ctx.strokeText(text, W / 2, H / 2 - 30);
  ctx.fillText(text, W / 2, H / 2 - 30);

  ctx.font = '20px Arial';
  ctx.lineWidth = 2;
  ctx.strokeText(sub, W / 2, H / 2 + 15);
  ctx.fillText(sub, W / 2, H / 2 + 15);
}

// ===== 로직 =====
function jump() {
  if (gameState === 'ready') {
    gameState = 'playing';
    bird.vy = JUMP;
  } else if (gameState === 'playing') {
    bird.vy = JUMP;
  } else if (gameState === 'dead') {
    init();
  }
}

function update() {
  if (gameState !== 'playing') return;

  frameCount++;
  groundX += PIPE_SPEED;

  // 새 물리
  bird.vy += GRAVITY;
  bird.y += bird.vy;

  // 파이프 생성
  if (frameCount % PIPE_INTERVAL === 0) {
    const minTop = 60;
    const maxTop = H - GROUND_H - PIPE_GAP - 60;
    const topH = Math.floor(Math.random() * (maxTop - minTop)) + minTop;
    pipes.push({ x: W, topH, scored: false });
  }

  // 파이프 이동 + 충돌
  for (let i = pipes.length - 1; i >= 0; i--) {
    const p = pipes[i];
    p.x -= PIPE_SPEED;

    // 제거
    if (p.x + PIPE_WIDTH < -10) {
      pipes.splice(i, 1);
      continue;
    }

    // 점수
    if (!p.scored && p.x + PIPE_WIDTH < bird.x) {
      p.scored = true;
      score++;
    }

    // 충돌 판정 (사각형 근사)
    const bL = bird.x - bird.radius + 4;
    const bR = bird.x + bird.radius - 4;
    const bT = bird.y - bird.radius + 4;
    const bB = bird.y + bird.radius - 4;

    const pL = p.x;
    const pR = p.x + PIPE_WIDTH;

    if (bR > pL && bL < pR) {
      if (bT < p.topH || bB > p.topH + PIPE_GAP) {
        die();
        return;
      }
    }
  }

  // 바닥/천장 충돌
  if (bird.y + bird.radius > H - GROUND_H || bird.y - bird.radius < 0) {
    die();
  }
}

function die() {
  gameState = 'dead';
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('flappy-best', bestScore.toString());
  }
}

function render() {
  drawSky();
  drawClouds();
  pipes.forEach(drawPipe);
  drawGround();
  drawBird();
  drawScore();

  if (gameState === 'ready') {
    drawOverlay('FLAPPY BIRD', '클릭 또는 스페이스바');
  } else if (gameState === 'dead') {
    drawOverlay('GAME OVER', `점수: ${score}  최고: ${bestScore}`);
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

// ===== 입력 =====
document.addEventListener('keydown', (e) => {
  if (e.key === ' ' || e.key === 'ArrowUp') {
    e.preventDefault();
    jump();
  }
});

canvas.addEventListener('click', jump);
canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  jump();
}, { passive: false });

// 시작
GameSprites.init();
init();
loop();
</script>
</body>
</html>
