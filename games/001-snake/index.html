<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake Game</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  background: #0a0a1a;
  color: #e0e0e0;
  font-family: 'Courier New', monospace;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  touch-action: none;
}

#game-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  padding: 16px;
  max-width: 500px;
  width: 100%;
}

#header {
  display: flex;
  justify-content: space-between;
  width: 100%;
  padding: 8px 4px;
  font-size: 16px;
  letter-spacing: 2px;
}

#score { color: #00ff41; }
#best { color: #ff0040; }

#game-canvas {
  border: 2px solid #00ff4133;
  border-radius: 4px;
  background: #1a1a2e;
  width: 100%;
  aspect-ratio: 1;
  max-width: 460px;
}

#controls {
  display: flex;
  gap: 12px;
  margin-top: 8px;
}

.btn {
  background: transparent;
  color: #00ff41;
  border: 1px solid #00ff41;
  padding: 10px 24px;
  font-family: 'Courier New', monospace;
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  letter-spacing: 1px;
  transition: all 0.2s;
}

.btn:hover {
  background: #00ff4120;
  box-shadow: 0 0 10px #00ff4140;
}

.btn:active {
  background: #00ff4130;
}

/* 오버레이 화면 */
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  background: rgba(10, 10, 26, 0.85);
  z-index: 10;
  gap: 16px;
}

#overlay.hidden { display: none; }

#overlay h1 {
  font-size: 32px;
  color: #00ff41;
  text-shadow: 0 0 20px #00ff4180;
  letter-spacing: 4px;
}

#overlay .sub {
  font-size: 14px;
  color: #888;
  letter-spacing: 1px;
}

#overlay .final-score {
  font-size: 48px;
  color: #ff0040;
  text-shadow: 0 0 20px #ff004080;
}

#game-wrapper {
  position: relative;
  width: 100%;
  max-width: 460px;
  aspect-ratio: 1;
}
</style>
</head>
<body>
<div id="game-container">
  <div id="header">
    <span>SCORE: <span id="score">0</span></span>
    <span>BEST: <span id="best">0</span></span>
  </div>
  <div id="game-wrapper">
    <canvas id="game-canvas"></canvas>
    <div id="overlay">
      <h1>SNAKE</h1>
      <p class="sub">방향키 또는 스와이프로 조작</p>
      <button class="btn" id="start-btn">시작</button>
    </div>
  </div>
  <div id="controls">
    <button class="btn" id="restart-btn">다시하기</button>
    <button class="btn" id="pause-btn">일시정지</button>
  </div>
</div>

<script>
// ===== 스프라이트 시스템 =====
const GameSprites = (function() {
  const cache = {};
  let cellSize = 0;

  function createCanvas(w, h) {
    const c = document.createElement('canvas');
    c.width = w;
    c.height = h;
    return c;
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function makeHead(cs, dirKey) {
    const c = createCanvas(cs, cs);
    const g = c.getContext('2d');
    const pad = 1;
    const s = cs - pad * 2;
    const r = s * 0.25;

    // Body gradient fill
    const grad = g.createLinearGradient(pad, pad, pad + s, pad + s);
    grad.addColorStop(0, '#33ff77');
    grad.addColorStop(0.5, '#00dd44');
    grad.addColorStop(1, '#009933');
    g.fillStyle = grad;
    roundRect(g, pad, pad, s, s, r);
    g.fill();

    // Inner highlight
    const hiGrad = g.createRadialGradient(cs * 0.35, cs * 0.35, 0, cs * 0.5, cs * 0.5, s * 0.7);
    hiGrad.addColorStop(0, 'rgba(255,255,255,0.25)');
    hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = hiGrad;
    roundRect(g, pad, pad, s, s, r);
    g.fill();

    // Eyes
    const eyeR = cs * 0.1;
    const pupilR = cs * 0.05;
    let e1x, e1y, e2x, e2y;
    if (dirKey === 'right') {
      e1x = cs * 0.65; e1y = cs * 0.3;
      e2x = cs * 0.65; e2y = cs * 0.7;
    } else if (dirKey === 'left') {
      e1x = cs * 0.35; e1y = cs * 0.3;
      e2x = cs * 0.35; e2y = cs * 0.7;
    } else if (dirKey === 'up') {
      e1x = cs * 0.3; e1y = cs * 0.35;
      e2x = cs * 0.7; e2y = cs * 0.35;
    } else {
      e1x = cs * 0.3; e1y = cs * 0.65;
      e2x = cs * 0.7; e2y = cs * 0.65;
    }
    // Whites
    g.fillStyle = '#eeffee';
    g.beginPath(); g.arc(e1x, e1y, eyeR, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(e2x, e2y, eyeR, 0, Math.PI * 2); g.fill();
    // Pupils
    g.fillStyle = '#0a0a1a';
    g.beginPath(); g.arc(e1x, e1y, pupilR, 0, Math.PI * 2); g.fill();
    g.beginPath(); g.arc(e2x, e2y, pupilR, 0, Math.PI * 2); g.fill();

    return c;
  }

  function makeBody(cs, brightness) {
    const c = createCanvas(cs, cs);
    const g = c.getContext('2d');
    const pad = 1;
    const s = cs - pad * 2;
    const r = s * 0.2;

    const gv = Math.floor(200 * brightness);
    const bv = Math.floor(50 * brightness);
    const grad = g.createLinearGradient(pad, pad, pad + s, pad + s);
    grad.addColorStop(0, `rgb(10, ${gv + 40}, ${bv + 20})`);
    grad.addColorStop(0.5, `rgb(0, ${gv}, ${bv})`);
    grad.addColorStop(1, `rgb(0, ${Math.floor(gv * 0.7)}, ${Math.floor(bv * 0.7)})`);
    g.fillStyle = grad;
    roundRect(g, pad, pad, s, s, r);
    g.fill();

    // Scale pattern: subtle diamond highlight
    const hiGrad = g.createRadialGradient(cs * 0.4, cs * 0.4, 0, cs * 0.5, cs * 0.5, s * 0.5);
    hiGrad.addColorStop(0, `rgba(255,255,255,${0.15 * brightness})`);
    hiGrad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = hiGrad;
    roundRect(g, pad, pad, s, s, r);
    g.fill();

    // Subtle scale lines
    g.strokeStyle = `rgba(0,0,0,${0.15 * brightness})`;
    g.lineWidth = 0.5;
    g.save();
    g.clip(); // clip to rounded rect already on path
    roundRect(g, pad, pad, s, s, r);
    g.clip();
    for (let i = -1; i < 3; i++) {
      g.beginPath();
      g.moveTo(pad + s * i * 0.4, pad);
      g.lineTo(pad + s * (i * 0.4 + 0.5), pad + s);
      g.stroke();
    }
    g.restore();

    return c;
  }

  function makeTail(cs, brightness) {
    const c = createCanvas(cs, cs);
    const g = c.getContext('2d');
    const cx = cs / 2;
    const cy = cs / 2;
    const halfS = (cs - 2) / 2;

    const gv = Math.floor(160 * brightness);
    const bv = Math.floor(40 * brightness);
    const grad = g.createRadialGradient(cx, cy, 0, cx, cy, halfS);
    grad.addColorStop(0, `rgb(0, ${gv + 30}, ${bv + 10})`);
    grad.addColorStop(0.7, `rgb(0, ${gv}, ${bv})`);
    grad.addColorStop(1, `rgba(0, ${Math.floor(gv * 0.5)}, ${Math.floor(bv * 0.5)}, 0.3)`);

    g.fillStyle = grad;
    g.beginPath();
    // Tapered: wider at center, thin at edge
    const r = halfS * 0.85;
    const tipR = halfS * 0.35;
    g.ellipse(cx, cy, r, tipR < r ? Math.max(tipR, r * 0.5) : r, 0, 0, Math.PI * 2);
    g.fill();

    // highlight
    const hi = g.createRadialGradient(cx * 0.8, cy * 0.8, 0, cx, cy, halfS);
    hi.addColorStop(0, 'rgba(255,255,255,0.15)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = hi;
    g.beginPath();
    g.ellipse(cx, cy, r, Math.max(tipR, r * 0.5), 0, 0, Math.PI * 2);
    g.fill();

    return c;
  }

  function makeFood(cs) {
    // We create a slightly larger canvas for glow room
    const size = Math.ceil(cs * 1.4);
    const c = createCanvas(size, size);
    const g = c.getContext('2d');
    const cx = size / 2;
    const cy = size / 2;
    const radius = cs * 0.38;

    // Outer glow
    const glowGrad = g.createRadialGradient(cx, cy, radius * 0.5, cx, cy, radius * 2);
    glowGrad.addColorStop(0, 'rgba(255,0,64,0.3)');
    glowGrad.addColorStop(1, 'rgba(255,0,64,0)');
    g.fillStyle = glowGrad;
    g.fillRect(0, 0, size, size);

    // Main apple body
    const bodyGrad = g.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, 0, cx, cy, radius);
    bodyGrad.addColorStop(0, '#ff4466');
    bodyGrad.addColorStop(0.6, '#ee0040');
    bodyGrad.addColorStop(1, '#990022');
    g.fillStyle = bodyGrad;
    g.beginPath();
    g.arc(cx, cy, radius, 0, Math.PI * 2);
    g.fill();

    // Specular highlight
    const specGrad = g.createRadialGradient(cx - radius * 0.25, cy - radius * 0.3, 0, cx - radius * 0.2, cy - radius * 0.2, radius * 0.5);
    specGrad.addColorStop(0, 'rgba(255,255,255,0.55)');
    specGrad.addColorStop(1, 'rgba(255,255,255,0)');
    g.fillStyle = specGrad;
    g.beginPath();
    g.arc(cx, cy, radius, 0, Math.PI * 2);
    g.fill();

    // Stem
    g.strokeStyle = '#5a3a1a';
    g.lineWidth = Math.max(1, cs * 0.06);
    g.lineCap = 'round';
    g.beginPath();
    g.moveTo(cx, cy - radius * 0.85);
    g.quadraticCurveTo(cx + radius * 0.3, cy - radius * 1.3, cx + radius * 0.15, cy - radius * 1.15);
    g.stroke();

    // Leaf
    g.fillStyle = '#44bb44';
    g.beginPath();
    g.ellipse(cx + radius * 0.25, cy - radius * 1.05, radius * 0.25, radius * 0.1, 0.4, 0, Math.PI * 2);
    g.fill();

    return c;
  }

  function makeGridTile(cs) {
    const tileSize = cs * 2; // 2x2 tile for checkerboard
    const c = createCanvas(tileSize, tileSize);
    const g = c.getContext('2d');

    g.fillStyle = '#1a1a2e';
    g.fillRect(0, 0, tileSize, tileSize);
    g.fillStyle = '#1c1c32';
    g.fillRect(0, 0, cs, cs);
    g.fillRect(cs, cs, cs, cs);

    // Subtle grid lines
    g.strokeStyle = '#ffffff08';
    g.lineWidth = 0.5;
    for (let i = 0; i <= 2; i++) {
      g.beginPath();
      g.moveTo(i * cs, 0); g.lineTo(i * cs, tileSize); g.stroke();
      g.beginPath();
      g.moveTo(0, i * cs); g.lineTo(tileSize, i * cs); g.stroke();
    }

    return c;
  }

  return {
    init: function(newCellSize) {
      if (newCellSize === cellSize && cache.head_right) return; // already built at this size
      cellSize = newCellSize;
      if (cellSize < 2) return;

      cache.head_right = makeHead(cellSize, 'right');
      cache.head_left = makeHead(cellSize, 'left');
      cache.head_up = makeHead(cellSize, 'up');
      cache.head_down = makeHead(cellSize, 'down');

      // Pre-generate body sprites at several brightness levels
      cache.body = [];
      for (let i = 0; i < 20; i++) {
        const brightness = 1 - (i / 20) * 0.5;
        cache.body[i] = makeBody(cellSize, brightness);
      }

      cache.tail = makeTail(cellSize, 0.5);
      cache.food = makeFood(cellSize);
      cache.gridTile = makeGridTile(cellSize);
    },
    get: function(name) {
      return cache[name] || null;
    },
    getBody: function(index, total) {
      const slot = Math.min(Math.floor((index / Math.max(total, 1)) * 20), 19);
      return cache.body ? cache.body[slot] : null;
    },
    getCellSize: function() { return cellSize; }
  };
})();

// ===== 설정 =====
const GRID_SIZE = 20;
const INITIAL_SPEED = 150; // ms per tick
const SPEED_INCREMENT = 10;
const FOOD_SPEED_THRESHOLD = 5;

// ===== DOM =====
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const startBtn = document.getElementById('start-btn');
const restartBtn = document.getElementById('restart-btn');
const pauseBtn = document.getElementById('pause-btn');

// ===== 상태 =====
let snake, direction, nextDirection, food, score, bestScore, speed;
let gameRunning = false;
let gamePaused = false;
let lastTick = 0;
let animationId = null;

// ===== 초기화 =====
function resizeCanvas() {
  const wrapper = document.getElementById('game-wrapper');
  const size = wrapper.clientWidth;
  canvas.width = size;
  canvas.height = size;
}

function init() {
  bestScore = parseInt(localStorage.getItem('snake-best') || '0');
  bestEl.textContent = bestScore;
  resizeCanvas();
  GameSprites.init(canvas.width / GRID_SIZE);
  drawGrid();
}

function resetGame() {
  const mid = Math.floor(GRID_SIZE / 2);
  snake = [
    { x: mid, y: mid },
    { x: mid - 1, y: mid },
    { x: mid - 2, y: mid }
  ];
  direction = { x: 1, y: 0 };
  nextDirection = { x: 1, y: 0 };
  score = 0;
  speed = INITIAL_SPEED;
  scoreEl.textContent = '0';
  spawnFood();
}

// ===== 그리드 =====
function drawGrid() {
  const cellSize = canvas.width / GRID_SIZE;
  const tile = GameSprites.get('gridTile');
  if (tile) {
    const tileSize = cellSize * 2;
    for (let y = 0; y < canvas.height; y += tileSize) {
      for (let x = 0; x < canvas.width; x += tileSize) {
        ctx.drawImage(tile, x, y, tileSize, tileSize);
      }
    }
  } else {
    // Fallback: original rendering
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.strokeStyle = '#ffffff08';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID_SIZE; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize, 0);
      ctx.lineTo(i * cellSize, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize);
      ctx.lineTo(canvas.width, i * cellSize);
      ctx.stroke();
    }
  }
}

// ===== 뱀 렌더링 =====
function drawSnake() {
  const cellSize = canvas.width / GRID_SIZE;
  const hasSprites = GameSprites.get('head_right') !== null;

  snake.forEach((seg, i) => {
    const dx = seg.x * cellSize;
    const dy = seg.y * cellSize;

    if (hasSprites) {
      let sprite;
      if (i === 0) {
        // Head: direction-aware
        let dirKey = 'right';
        if (direction.x === -1) dirKey = 'left';
        else if (direction.y === -1) dirKey = 'up';
        else if (direction.y === 1) dirKey = 'down';
        sprite = GameSprites.get('head_' + dirKey);
        // Glow effect for head
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = 12;
        ctx.drawImage(sprite, dx, dy, cellSize, cellSize);
        ctx.shadowBlur = 0;
      } else if (i === snake.length - 1 && snake.length > 2) {
        // Tail
        sprite = GameSprites.get('tail');
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = 4;
        ctx.drawImage(sprite, dx, dy, cellSize, cellSize);
        ctx.shadowBlur = 0;
      } else {
        // Body
        sprite = GameSprites.getBody(i, snake.length);
        ctx.shadowColor = '#00ff41';
        ctx.shadowBlur = 6;
        ctx.drawImage(sprite, dx, dy, cellSize, cellSize);
        ctx.shadowBlur = 0;
      }
    } else {
      // Fallback: original rendering
      const brightness = 1 - (i / snake.length) * 0.5;
      const gVal = Math.floor(255 * brightness);
      ctx.fillStyle = `rgb(0, ${gVal}, ${Math.floor(65 * brightness)})`;
      ctx.shadowColor = '#00ff41';
      ctx.shadowBlur = i === 0 ? 12 : 6;
      const padding = 1;
      ctx.fillRect(dx + padding, dy + padding, cellSize - padding * 2, cellSize - padding * 2);
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#1a1a2e';
        const eyeSize = cellSize * 0.15;
        const eyeOffset = cellSize * 0.25;
        if (direction.x === 1) {
          ctx.fillRect(dx + cellSize * 0.6, dy + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(dx + cellSize * 0.6, dy + cellSize - eyeOffset - eyeSize, eyeSize, eyeSize);
        } else if (direction.x === -1) {
          ctx.fillRect(dx + cellSize * 0.25, dy + eyeOffset, eyeSize, eyeSize);
          ctx.fillRect(dx + cellSize * 0.25, dy + cellSize - eyeOffset - eyeSize, eyeSize, eyeSize);
        } else if (direction.y === -1) {
          ctx.fillRect(dx + eyeOffset, dy + cellSize * 0.25, eyeSize, eyeSize);
          ctx.fillRect(dx + cellSize - eyeOffset - eyeSize, dy + cellSize * 0.25, eyeSize, eyeSize);
        } else {
          ctx.fillRect(dx + eyeOffset, dy + cellSize * 0.6, eyeSize, eyeSize);
          ctx.fillRect(dx + cellSize - eyeOffset - eyeSize, dy + cellSize * 0.6, eyeSize, eyeSize);
        }
      }
    }
  });
  ctx.shadowBlur = 0;
}

// ===== 먹이 =====
function spawnFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * GRID_SIZE),
      y: Math.floor(Math.random() * GRID_SIZE)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function drawFood() {
  const cellSize = canvas.width / GRID_SIZE;
  const pulse = 0.8 + Math.sin(Date.now() / 200) * 0.2;
  const foodSprite = GameSprites.get('food');

  if (foodSprite) {
    const spriteSize = cellSize * 1.4 * pulse;
    const offset = (cellSize - spriteSize) / 2;
    ctx.shadowColor = '#ff0040';
    ctx.shadowBlur = 12 * pulse;
    ctx.drawImage(
      foodSprite,
      food.x * cellSize + offset,
      food.y * cellSize + offset,
      spriteSize,
      spriteSize
    );
    ctx.shadowBlur = 0;
  } else {
    // Fallback: original rendering
    ctx.shadowColor = '#ff0040';
    ctx.shadowBlur = 15 * pulse;
    ctx.fillStyle = '#ff0040';
    const padding = 2;
    const size = (cellSize - padding * 2) * pulse;
    ctx.beginPath();
    ctx.arc(
      food.x * cellSize + cellSize / 2,
      food.y * cellSize + cellSize / 2,
      size / 2,
      0,
      Math.PI * 2
    );
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ===== 게임 로직 =====
function update() {
  direction = { ...nextDirection };

  const head = {
    x: snake[0].x + direction.x,
    y: snake[0].y + direction.y
  };

  // 벽 충돌
  if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
    gameOver();
    return;
  }

  // 자기 몸 충돌
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver();
    return;
  }

  snake.unshift(head);

  // 먹이 먹기
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = score;
    spawnFood();

    // 난이도 상승
    if (score % FOOD_SPEED_THRESHOLD === 0) {
      speed = Math.max(50, speed - SPEED_INCREMENT);
    }
  } else {
    snake.pop();
  }
}

function gameOver() {
  gameRunning = false;
  if (animationId) cancelAnimationFrame(animationId);

  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('snake-best', bestScore.toString());
    bestEl.textContent = bestScore;
  }

  overlay.classList.remove('hidden');
  overlay.innerHTML = `
    <h1>GAME OVER</h1>
    <p class="final-score">${score}</p>
    <p class="sub">최고 점수: ${bestScore}</p>
    <button class="btn" onclick="startGame()">다시하기</button>
  `;
}

// ===== 게임 루프 =====
function gameLoop(timestamp) {
  if (!gameRunning || gamePaused) {
    animationId = requestAnimationFrame(gameLoop);
    return;
  }

  if (timestamp - lastTick >= speed) {
    update();
    lastTick = timestamp;
  }

  if (gameRunning) {
    drawGrid();
    drawSnake();
    drawFood();
    animationId = requestAnimationFrame(gameLoop);
  }
}

function startGame() {
  resetGame();
  overlay.classList.add('hidden');
  gameRunning = true;
  gamePaused = false;
  pauseBtn.textContent = '일시정지';
  lastTick = 0;
  animationId = requestAnimationFrame(gameLoop);
}

// ===== 입력 처리 =====
document.addEventListener('keydown', (e) => {
  if (!gameRunning) return;

  switch (e.key) {
    case 'ArrowUp': case 'w': case 'W':
      if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
      e.preventDefault();
      break;
    case 'ArrowDown': case 's': case 'S':
      if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
      e.preventDefault();
      break;
    case 'ArrowLeft': case 'a': case 'A':
      if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
      e.preventDefault();
      break;
    case 'ArrowRight': case 'd': case 'D':
      if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
      e.preventDefault();
      break;
    case ' ':
      togglePause();
      e.preventDefault();
      break;
  }
});

// 모바일 스와이프
let touchStartX = 0, touchStartY = 0;

canvas.addEventListener('touchstart', (e) => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, { passive: false });

canvas.addEventListener('touchend', (e) => {
  if (!gameRunning) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx);
  const absDy = Math.abs(dy);

  if (Math.max(absDx, absDy) < 20) return; // 너무 짧은 스와이프 무시

  if (absDx > absDy) {
    if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
    else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
  } else {
    if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
    else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
  }
  e.preventDefault();
}, { passive: false });

// ===== 버튼 =====
startBtn.addEventListener('click', startGame);
restartBtn.addEventListener('click', startGame);

function togglePause() {
  if (!gameRunning) return;
  gamePaused = !gamePaused;
  pauseBtn.textContent = gamePaused ? '계속하기' : '일시정지';
}
pauseBtn.addEventListener('click', togglePause);

// 화면 리사이즈
window.addEventListener('resize', () => {
  resizeCanvas();
  GameSprites.init(canvas.width / GRID_SIZE);
  if (!gameRunning) drawGrid();
});

// 시작
init();
</script>
