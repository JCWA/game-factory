<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>우주 표류기</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:#000;color:#e0e0e0;}
#app{width:100%;height:100%;display:flex;flex-direction:column;position:relative;}

/* Background scene */
#scene{flex:1;position:relative;overflow:hidden;min-height:0;}
#scene-bg{position:absolute;inset:0;transition:opacity 1s;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle 2s infinite alternate;}
@keyframes twinkle{0%{opacity:0.2;}100%{opacity:1;}}
@keyframes blink-red{0%,100%{opacity:0.3;}50%{opacity:1;}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 8px currentColor;}50%{box-shadow:0 0 20px currentColor;}}
@keyframes scanline{0%{top:0;}100%{top:100%;}}
.scene-element{position:absolute;transition:all 1s;}
#scene-overlay{position:absolute;inset:0;background:#000;opacity:0;pointer-events:none;transition:opacity 1s;}

/* Resource bar */
#resource-bar{background:#0a0a1acc;padding:8px 12px;display:flex;flex-wrap:wrap;align-items:center;gap:4px 16px;border-top:1px solid #333;border-bottom:1px solid #333;font-size:0.85rem;}
#day-label{font-weight:bold;color:#00d4ff;margin-right:8px;white-space:nowrap;}
.res-group{display:flex;align-items:center;gap:4px;white-space:nowrap;}
.res-label{font-size:0.75rem;min-width:28px;}
.res-track{width:80px;height:10px;background:#222;border-radius:5px;overflow:hidden;position:relative;}
.res-fill{height:100%;border-radius:5px;transition:width 0.6s ease;}
.res-fill.oxygen{background:linear-gradient(90deg,#005f73,#00d4ff);}
.res-fill.food{background:linear-gradient(90deg,#2d6a4f,#52b788);}
.res-fill.power{background:linear-gradient(90deg,#b08800,#ffd60a);}
.res-val{font-size:0.7rem;min-width:28px;text-align:right;}

/* Text box */
#text-box{background:#000000cc;padding:16px 20px;min-height:140px;max-height:40vh;position:relative;overflow-y:auto;border-top:1px solid #1a1a3e;}
#text-content{line-height:1.8;font-size:1rem;min-height:60px;white-space:pre-wrap;}
#text-content .speaker{color:#00d4ff;font-weight:bold;}
#tap-hint{position:absolute;bottom:6px;right:12px;font-size:0.65rem;color:#555;animation:pulse-glow 2s infinite;pointer-events:none;}

/* Choices */
#choices{display:flex;flex-direction:column;gap:6px;padding:8px 16px 12px;background:#000000ee;}
.choice-btn{background:#111a2ecc;border:1px solid #1a3a5e;color:#c0d0e0;padding:12px 16px;border-radius:8px;font-size:0.95rem;text-align:left;cursor:pointer;transition:all 0.2s;outline:none;position:relative;}
.choice-btn:hover,.choice-btn.focused{border-color:#00d4ff;color:#fff;background:#0d2040;box-shadow:0 0 12px #00d4ff33;}
.choice-btn:active{transform:scale(0.98);}
.choice-btn .effect-hint{font-size:0.7rem;color:#888;margin-top:2px;}
@keyframes choice-pulse{0%{box-shadow:0 0 0 0 #00d4ff66;}100%{box-shadow:0 0 0 12px transparent;}}

/* Title screen */
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#0a0a2e,#000005);z-index:100;}
#title-screen h1{font-size:2.5rem;color:#00d4ff;text-shadow:0 0 30px #00d4ff55;margin-bottom:8px;letter-spacing:4px;}
#title-screen .subtitle{color:#667;font-size:0.9rem;margin-bottom:40px;}
#title-screen .menu-btn{background:transparent;border:1px solid #335;color:#aac;padding:12px 40px;margin:6px;border-radius:6px;font-size:1rem;cursor:pointer;transition:all 0.3s;min-width:200px;}
#title-screen .menu-btn:hover{border-color:#00d4ff;color:#fff;box-shadow:0 0 16px #00d4ff33;}

/* Ending screen */
#ending-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:20px;text-align:center;}
#ending-screen h2{font-size:1.8rem;margin-bottom:16px;}
#ending-screen .ending-text{max-width:500px;line-height:1.8;margin-bottom:30px;font-size:1rem;color:#bbb;}
#ending-screen .menu-btn{background:transparent;border:1px solid #335;color:#aac;padding:10px 30px;margin:6px;border-radius:6px;font-size:0.9rem;cursor:pointer;transition:all 0.3s;}
#ending-screen .menu-btn:hover{border-color:#00d4ff;color:#fff;}

/* Ending gallery */
#gallery-screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;z-index:100;background:#05050f;padding:20px;overflow-y:auto;}
#gallery-screen h2{font-size:1.5rem;color:#00d4ff;margin-bottom:20px;}
.gallery-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;width:100%;max-width:600px;margin-bottom:20px;}
.ending-card{background:#111a2e;border:1px solid #1a2a4e;border-radius:8px;padding:16px;text-align:center;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.ending-card.unlocked{border-color:#00d4ff44;}
.ending-card .icon{font-size:2rem;margin-bottom:8px;}
.ending-card .name{font-size:0.85rem;}
.ending-card.locked .name{color:#444;}

/* Settings overlay */
#settings-overlay{position:absolute;inset:0;background:#000c;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:120;padding:20px;}
#settings-overlay .panel{background:#111a2e;border:1px solid #2a3a5e;border-radius:12px;padding:24px;max-width:400px;width:100%;}
#settings-overlay h3{color:#00d4ff;margin-bottom:16px;text-align:center;}
#settings-overlay .setting-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;}
#settings-overlay label{font-size:0.9rem;}
#settings-overlay input[type=range]{width:120px;}
#settings-overlay .menu-btn{width:100%;margin-top:8px;background:transparent;border:1px solid #335;color:#aac;padding:8px;border-radius:6px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
#settings-overlay .menu-btn:hover{border-color:#00d4ff;color:#fff;}

/* Notification */
#notification{position:absolute;top:20px;left:50%;transform:translateX(-50%);background:#00d4ff22;border:1px solid #00d4ff44;color:#00d4ff;padding:8px 20px;border-radius:6px;font-size:0.85rem;opacity:0;transition:opacity 0.5s;z-index:200;pointer-events:none;}

/* Mobile adjustments */
@media(max-width:480px){
  #text-content{font-size:0.9rem;}
  .choice-btn{font-size:0.85rem;padding:10px 12px;}
  .res-track{width:60px;}
  #title-screen h1{font-size:1.8rem;}
}
</style>
</head>
<body>
<div id="app">
  <!-- Scene background -->
  <div id="scene">
    <div id="scene-bg"></div>
    <div id="scene-overlay"></div>
  </div>

  <!-- Resource bar -->
  <div id="resource-bar" style="display:none;">
    <span id="day-label">Day 1/10</span>
    <div class="res-group">
      <span class="res-label">산소</span>
      <div class="res-track"><div class="res-fill oxygen" id="bar-oxygen"></div></div>
      <span class="res-val" id="val-oxygen">100%</span>
    </div>
    <div class="res-group">
      <span class="res-label">식량</span>
      <div class="res-track"><div class="res-fill food" id="bar-food"></div></div>
      <span class="res-val" id="val-food">100%</span>
    </div>
    <div class="res-group">
      <span class="res-label">전력</span>
      <div class="res-track"><div class="res-fill power" id="bar-power"></div></div>
      <span class="res-val" id="val-power">100%</span>
    </div>
  </div>

  <!-- Text box -->
  <div id="text-box" style="display:none;">
    <div id="text-content"></div>
    <div id="tap-hint">탭하여 계속 ▼</div>
  </div>

  <!-- Choices -->
  <div id="choices" style="display:none;"></div>

  <!-- Title screen -->
  <div id="title-screen">
    <h1>우주 표류기</h1>
    <p class="subtitle">10일간의 생존 - 인터랙티브 픽션</p>
    <button class="menu-btn" onclick="startNewGame()">새 게임</button>
    <button class="menu-btn" id="btn-continue" onclick="loadGame()" style="display:none;">이어하기</button>
    <button class="menu-btn" onclick="showGallery()">엔딩 도감</button>
  </div>

  <!-- Ending screen -->
  <div id="ending-screen">
    <h2 id="ending-title"></h2>
    <div class="ending-text" id="ending-text"></div>
    <button class="menu-btn" onclick="returnToTitle()">타이틀로</button>
    <button class="menu-btn" onclick="startNewGame()">다시 시작</button>
    <button class="menu-btn" onclick="showGallery()">엔딩 도감</button>
  </div>

  <!-- Gallery screen -->
  <div id="gallery-screen">
    <h2>엔딩 도감</h2>
    <div class="gallery-grid" id="gallery-grid"></div>
    <button class="menu-btn" style="background:transparent;border:1px solid #335;color:#aac;padding:10px 30px;border-radius:6px;cursor:pointer;margin-top:10px;" onclick="returnToTitle()">돌아가기</button>
  </div>

  <!-- Settings overlay -->
  <div id="settings-overlay">
    <div class="panel">
      <h3>설정</h3>
      <div class="setting-row"><label>텍스트 속도</label><input type="range" min="10" max="80" value="30" id="speed-slider" oninput="settings.textSpeed=+this.value"></div>
      <button class="menu-btn" onclick="saveGame();notify('저장 완료!');">수동 저장</button>
      <button class="menu-btn" onclick="returnToTitle()">타이틀로</button>
      <button class="menu-btn" onclick="closeSettings()">닫기</button>
    </div>
  </div>

  <!-- Notification -->
  <div id="notification" id="notification"></div>
</div>

<script>
// ===================== SETTINGS =====================
const settings = { textSpeed: 30 };

// ===================== ENDINGS =====================
const ENDINGS = [
  { id:'ending_suffocation', name:'질식 엔딩', icon:'💀', desc:'산소가 바닥났다. 점점 의식이 흐려지고... 차가운 우주의 정적 속에서, 마지막 숨이 끊어졌다.' },

// ===================== BACKGROUNDS =====================
function renderBackground(bgId) {
  $scene.innerHTML = '';
  $scene.style.transition = 'opacity 0.3s';

  if (bgId === 'ship_interior') {
    $scene.style.background = 'linear-gradient(180deg, #0a0a1a 0%, #1a1a2e 50%, #16213e 100%)';
    // panels
    addElement('rect','8%','25%','25%','35%','#1a1a3a','#2a2a5a');
    addElement('rect','38%','20%','24%','40%','#151530','#252555');
    addElement('rect','67%','30%','25%','30%','#1a1a3a','#2a2a5a');
    // emergency light
    const light = document.createElement('div');
    light.style.cssText = 'position:absolute;left:85%;top:12%;width:12px;height:12px;background:#ff3333;border-radius:50%;box-shadow:0 0 20px #ff3333,0 0 40px #ff333366;animation:blink-red 2s infinite;';
    $scene.appendChild(light);
    // floor line
    addElement('rect','0','75%','100%','2px','#2a2a5a','transparent');
    // small details
    addElement('rect','12%','32%','8%','3%','#0a3a3a','#0ff3');
    addElement('rect','42%','28%','10%','2%','#0a3a0a','#0f03');
  } else if (bgId === 'space_exterior') {
    $scene.style.background = 'radial-gradient(ellipse at 30% 50%, #0a0a2e 0%, #000005 70%)';
    // Stars
    for (let i = 0; i < 60; i++) {
      const star = document.createElement('div');
      star.className = 'star';
      star.style.left = Math.random()*100+'%';
      star.style.top = Math.random()*100+'%';
      star.style.width = (Math.random()*2+1)+'px';
      star.style.height = star.style.width;
      star.style.animationDelay = Math.random()*3+'s';
      star.style.animationDuration = (1.5+Math.random()*2)+'s';
      $scene.appendChild(star);
    }
    // Planet
    const planet = document.createElement('div');
    planet.style.cssText = 'position:absolute;left:65%;top:30%;width:20%;padding-top:20%;border-radius:50%;background:radial-gradient(circle at 35% 35%,#4466aa,#223366,#111833);box-shadow:0 0 30px #2244660a,inset -10px -5px 20px #00000088;';
    $scene.appendChild(planet);
    // Nebula glow
    const nebula = document.createElement('div');
    nebula.style.cssText = 'position:absolute;left:10%;top:60%;width:30%;padding-top:15%;border-radius:50%;background:radial-gradient(ellipse,#33115544,#22005522,transparent);filter:blur(10px);';
    $scene.appendChild(nebula);
  } else if (bgId === 'comm_room') {
    $scene.style.background = 'linear-gradient(180deg, #0a0a12 0%, #0a1a15 50%, #0a1510 100%)';
    // Monitor glow
    addElement('rect','20%','15%','60%','50%','#0a1a10','#1a4a2a');
    const glow = document.createElement('div');
    glow.style.cssText = 'position:absolute;left:22%;top:17%;width:56%;height:46%;background:radial-gradient(ellipse,#00ff4410,transparent);';
    $scene.appendChild(glow);
    // Scan line
    const scan = document.createElement('div');
    scan.style.cssText = 'position:absolute;left:22%;width:56%;height:2px;background:#00ff4422;animation:scanline 3s linear infinite;';
    $scene.appendChild(scan);
    // Monitor text lines
    for (let i = 0; i < 5; i++) {
      const line = document.createElement('div');
      line.style.cssText = `position:absolute;left:25%;top:${22+i*7}%;width:${30+Math.random()*20}%;height:2px;background:#00ff4433;border-radius:1px;`;
      $scene.appendChild(line);
    }
    // Small indicator lights
    addElement('circle','15%','70%','6px','#00ff44','');
    addElement('circle','85%','70%','6px','#ffaa00','');
  }
}

function addElement(type, x, y, w, h, color, border) {
  const el = document.createElement('div');
  el.className = 'scene-element';
  if (type === 'rect') {
    el.style.cssText = `left:${x};top:${y};width:${w};height:${h};background:${color};border:1px solid ${border||'transparent'};`;
  } else if (type === 'circle') {
    el.style.cssText = `left:${x};top:${y};width:${w};height:${w};background:${color};border-radius:50%;box-shadow:0 0 10px ${color};`;
  }
  $scene.appendChild(el);
}

// ===================== RESOURCE DISPLAY =====================
function updateResourceBars() {
  if (!gameState) return;
  const clamp = v => Math.max(0, Math.min(100, v));
  const o = clamp(gameState.oxygen), f = clamp(gameState.food), p = clamp(gameState.power);
  document.getElementById('bar-oxygen').style.width = o+'%';
  document.getElementById('bar-food').style.width = f+'%';
  document.getElementById('bar-power').style.width = p+'%';
  document.getElementById('val-oxygen').textContent = o+'%';
  document.getElementById('val-food').textContent = f+'%';
  document.getElementById('val-power').textContent = p+'%';
  $dayLabel.textContent = 'Day ' + gameState.day + '/10';

  // Color warnings
  ['oxygen','food','power'].forEach(r => {
    const bar = document.getElementById('bar-'+r);
    const val = clamp(gameState[r]);
    if (val <= 20) bar.style.filter = 'saturate(0.5) brightness(1.5)';
    else bar.style.filter = '';
  });
}

// ===================== DAILY CONSUMPTION =====================
function dailyConsumption() {
  gameState.oxygen -= gameState.flags.recyclerFixed ? 5 : 10;
  gameState.food -= gameState.flags.gardenActive ? 5 : 10;
  gameState.power -= 8;
  if (gameState.flags.solarFixed) gameState.power += 5;

  // Crew bonuses
  if (gameState.flags.jieunSaved) gameState.oxygen += 2;
  if (gameState.flags.minsuSaved) gameState.power += 2;

  // Clamp
  gameState.oxygen = Math.max(0, Math.min(100, gameState.oxygen));
  gameState.food = Math.max(0, Math.min(100, gameState.food));
  gameState.power = Math.max(0, Math.min(100, gameState.power));

  // Check depletion
  if (gameState.oxygen <= 0) return 'ending_suffocation_scene';
  if (gameState.food <= 0) return 'ending_starvation_scene';
  if (gameState.power <= 0) return 'ending_darkness_scene';
  return null;
}

// ===================== TYPING EFFECT =====================
let typingInterval = null;
let currentTextLines = [];
let currentLineCharIndex = 0;

function stopTyping() {
  if (typingInterval) { clearInterval(typingInterval); typingInterval = null; }
}

function showCurrentText() {
  stopTyping();
  const node = STORY[gameState.currentNode];
  if (!node) return;

  let lines = typeof node.text === 'function' ? node.text(gameState) : node.text;
  currentTextLines = lines;

  if (gameState.textIndex >= lines.length) {
    // All text shown, show choices
    gameState.typingDone = true;
    showChoices();
    $tapHint.style.display = 'none';
    return;
  }

  const line = lines[gameState.textIndex];
  currentLineCharIndex = 0;
  $textContent.innerHTML = '';
  $tapHint.style.display = 'block';
  gameState.typingDone = false;

  typingInterval = setInterval(() => {
    currentLineCharIndex++;
    const displayed = line.substring(0, currentLineCharIndex);
    // Parse speaker tags
    $textContent.innerHTML = parseSpeaker(displayed);

    if (currentLineCharIndex >= line.length) {
      stopTyping();
      gameState.typingDone = true;
    }
  }, settings.textSpeed);
}

function parseSpeaker(text) {
  return text.replace(/\{([^}]+)\}/g, '<span class="speaker">[$1] </span>');
}

function advanceText() {
  if (!gameState || !STORY[gameState.currentNode]) return;

  const node = STORY[gameState.currentNode];
  const lines = typeof node.text === 'function' ? node.text(gameState) : node.text;

  if (!gameState.typingDone) {
    // Skip typing, show full line
    stopTyping();
    $textContent.innerHTML = parseSpeaker(lines[gameState.textIndex]);
    gameState.typingDone = true;
    return;
  }

  // Move to next line
  gameState.textIndex++;
  if (gameState.textIndex >= lines.length) {
    // Show choices
    $tapHint.style.display = 'none';
    showChoices();
    return;
  }

  showCurrentText();
}

// ===================== CHOICES =====================
let focusedChoice = -1;

function showChoices() {
  const node = STORY[gameState.currentNode];
  if (!node) return;

  let choices = typeof node.choices === 'function' ? node.choices(gameState) : node.choices;

  // Filter by conditions
  choices = choices.filter(c => !c.condition || c.condition(gameState));

  if (choices.length === 0) {
    // Ending scene
    if (node.isEnding) {
      triggerEnding(node.endingId);
    }
    return;
  }

  $choices.style.display = 'flex';
  $choices.innerHTML = '';
  focusedChoice = -1;

  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = '▶ ' + c.text + (c.hint ? '<div class="effect-hint">(' + c.hint + ')</div>' : '');
    btn.addEventListener('click', () => selectChoice(c, btn));
    btn.dataset.index = i;
    $choices.appendChild(btn);
  });
}

function selectChoice(choice, btn) {
  // Pulse animation
  btn.style.animation = 'choice-pulse 0.4s ease-out';

  // Apply effects
  applyEffects(choice.effects);

  // Clear choices
  setTimeout(() => {
    $choices.style.display = 'none';
    $choices.innerHTML = '';

    // Check if current node has endOfDay
    const node = STORY[gameState.currentNode];
    if (node && node.endOfDay) {
      // Apply daily consumption before moving to next day
      const depletionEnding = dailyConsumption();
      if (depletionEnding) {
        gameState.currentNode = depletionEnding;
        gameState.textIndex = 0;
        gameState.typingDone = false;
        transitionToNode();
        return;
      }
    }

    // Move to next node
    gameState.currentNode = choice.next;
    gameState.textIndex = 0;
    gameState.typingDone = false;

    const nextNode = STORY[gameState.currentNode];
    if (nextNode && nextNode.day) gameState.day = nextNode.day;

    transitionToNode();
    autoSave();
  }, 200);
}

function applyEffects(effects) {
  if (!effects) return;
  if (typeof effects === 'function') effects = effects(gameState);

  if (effects.oxygen) gameState.oxygen = Math.max(0, Math.min(100, gameState.oxygen + effects.oxygen));
  if (effects.food) gameState.food = Math.max(0, Math.min(100, gameState.food + effects.food));
  if (effects.power) gameState.power = Math.max(0, Math.min(100, gameState.power + effects.power));
  if (effects.trustAria) gameState.flags.trustAria = Math.max(-3, Math.min(3, gameState.flags.trustAria + effects.trustAria));
  if (effects.crewFound) gameState.flags.crewFound = Math.min(3, gameState.flags.crewFound + effects.crewFound);

  if (effects.flags) {
    for (const [k,v] of Object.entries(effects.flags)) {
      if (k === 'crewFound') {
        gameState.flags.crewFound = Math.min(3, gameState.flags.crewFound + v);
      } else {
        gameState.flags[k] = v;
      }
    }
  }

  updateResourceBars();
}

function transitionToNode() {
  // Fade transition
  $overlay.style.opacity = '1';
  setTimeout(() => {
    const node = STORY[gameState.currentNode];
    if (node) {
      if (node.bg) renderBackground(node.bg);
      updateResourceBars();
      showCurrentText();
    }
    $overlay.style.opacity = '0';
  }, 500);
}

// ===================== ENDINGS =====================
function triggerEnding(endingId) {
  // Save to gallery
  const gallery = getGallery();
  if (!gallery.includes(endingId)) {
    gallery.push(endingId);
    localStorage.setItem('spaceOdyssey_gallery', JSON.stringify(gallery));
  }

  // Show ending screen
  const ending = ENDINGS.find(e => e.id === endingId);
  gameState.endingReached = endingId;

  setTimeout(() => {
    $resBar.style.display = 'none';
    $textBox.style.display = 'none';
    $choices.style.display = 'none';

    $endingScreen.style.display = 'flex';
    $endingScreen.style.background = endingId.includes('perfect') ?
      'radial-gradient(ellipse,#1a1a3e,#0a0a2e,#050510)' :
      endingId.includes('rescue') || endingId.includes('selfreturn') ?
      'radial-gradient(ellipse,#0a1a2e,#050f1e,#020810)' :
      endingId.includes('mystery') ?
      'radial-gradient(ellipse,#1a0a2e,#0f0520,#050010)' :
      'radial-gradient(ellipse,#1a0a0a,#100505,#050000)';

    document.getElementById('ending-title').textContent = ending ? ending.icon + ' ' + ending.name : 'END';
    document.getElementById('ending-title').style.color =
      endingId.includes('perfect') ? '#ffd700' :
      endingId.includes('rescue') || endingId.includes('selfreturn') ? '#00d4ff' :
      endingId.includes('mystery') ? '#aa66ff' : '#ff4444';
    document.getElementById('ending-text').textContent = ending ? ending.desc : '';

    // Clear save
    localStorage.removeItem('spaceOdyssey_save');
  }, 1000);
}

function getGallery() {
  try { return JSON.parse(localStorage.getItem('spaceOdyssey_gallery')) || []; }
  catch { return []; }
}

// ===================== GALLERY =====================
function showGallery() {
  hideAllScreens();
  $galleryScreen.style.display = 'flex';

  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '';
  const gallery = getGallery();

  ENDINGS.forEach(e => {
    const card = document.createElement('div');
    const unlocked = gallery.includes(e.id);
    card.className = 'ending-card ' + (unlocked ? 'unlocked' : 'locked');
    card.innerHTML = `<div class="icon">${unlocked ? e.icon : '?'}</div><div class="name">${unlocked ? e.name : '???'}</div>`;
    if (unlocked) {
      card.style.cursor = 'pointer';
      card.title = e.desc;
    }
    grid.appendChild(card);
  });

  // Count
  const countDiv = document.createElement('div');
  countDiv.style.cssText = 'color:#667;font-size:0.8rem;margin-top:10px;';
  countDiv.textContent = `수집: ${gallery.length} / ${ENDINGS.length}`;
  grid.after(countDiv);
}

// ===================== SAVE/LOAD =====================
function autoSave() {
  if (gameState && !gameState.endingReached) {
    localStorage.setItem('spaceOdyssey_save', JSON.stringify(gameState));
  }
}

function saveGame() {
  if (gameState) localStorage.setItem('spaceOdyssey_save', JSON.stringify(gameState));
}

function loadGame() {
  try {
    const data = JSON.parse(localStorage.getItem('spaceOdyssey_save'));
    if (data) {
      gameState = data;
      hideAllScreens();
      $resBar.style.display = 'flex';
      $textBox.style.display = 'block';
      const node = STORY[gameState.currentNode];
      if (node && node.bg) renderBackground(node.bg);
      updateResourceBars();
      gameState.textIndex = 0;
      gameState.typingDone = false;
      showCurrentText();
    }
  } catch(e) { notify('저장 데이터를 불러올 수 없습니다.'); }
}

function hasSave() {
  return !!localStorage.getItem('spaceOdyssey_save');
}

// ===================== GAME FLOW =====================
function startNewGame() {
  gameState = createNewState();
  hideAllScreens();
  $resBar.style.display = 'flex';
  $textBox.style.display = 'block';
  renderBackground('ship_interior');
  updateResourceBars();
  showCurrentText();
  autoSave();
}

function returnToTitle() {
  stopTyping();
  hideAllScreens();
  gameState = null;
  $titleScreen.style.display = 'flex';
  renderBackground('space_exterior');
  if (hasSave()) document.getElementById('btn-continue').style.display = 'inline-block';
  else document.getElementById('btn-continue').style.display = 'none';
}

function hideAllScreens() {
  $titleScreen.style.display = 'none';
  $endingScreen.style.display = 'none';
  $galleryScreen.style.display = 'none';
  $settingsOverlay.style.display = 'none';
  $resBar.style.display = 'none';
  $textBox.style.display = 'none';
  $choices.style.display = 'none';
}

function closeSettings() {
  $settingsOverlay.style.display = 'none';
}

function notify(msg) {
  $notification.textContent = msg;
  $notification.style.opacity = '1';
  setTimeout(() => $notification.style.opacity = '0', 2000);
}

// ===================== INPUT HANDLING =====================
// Click/tap on text box to advance
$textBox.addEventListener('click', (e) => {
  if ($choices.style.display === 'flex' && $choices.children.length > 0) return;
  advanceText();
});

// Keyboard
document.addEventListener('keydown', (e) => {
  if ($titleScreen.style.display === 'flex' || $endingScreen.style.display !== 'none' ||
      $galleryScreen.style.display !== 'none' || $settingsOverlay.style.display !== 'none') return;

  if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    if ($choices.style.display === 'flex' && $choices.children.length > 0) {
      if (focusedChoice >= 0) {
        $choices.children[focusedChoice].click();
      }
    } else {
      advanceText();
    }
  } else if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    e.preventDefault();
    if ($choices.style.display === 'flex' && $choices.children.length > 0) {
      const btns = $choices.querySelectorAll('.choice-btn');
      btns.forEach(b => b.classList.remove('focused'));
      if (e.key === 'ArrowDown') focusedChoice = Math.min(focusedChoice + 1, btns.length - 1);
      else focusedChoice = Math.max(focusedChoice - 1, 0);
      btns[focusedChoice].classList.add('focused');
      btns[focusedChoice].scrollIntoView({block:'nearest'});
    }
  } else if (e.key === 'Escape') {
    if ($settingsOverlay.style.display === 'flex') closeSettings();
    else { $settingsOverlay.style.display = 'flex'; }
  }
});

// ===================== INIT =====================
function init() {
  renderBackground('space_exterior');
  if (hasSave()) document.getElementById('btn-continue').style.display = 'inline-block';

  // Create title stars
  for (let i = 0; i < 40; i++) {
    const star = document.createElement('div');
    star.className = 'star';
    star.style.left = Math.random()*100+'%';
    star.style.top = Math.random()*100+'%';
    star.style.animationDelay = Math.random()*3+'s';
    $titleScreen.insertBefore(star, $titleScreen.firstChild);
  }
}

init();
</script>
